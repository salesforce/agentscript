[build-system]
requires = ["setuptools>=62.4.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tree-sitter-agentscript"
description = "Salesforce Agent Script grammar for tree-sitter"
version = "1.1.0"
keywords = ["incremental", "parsing", "tree-sitter", "agentscript"]
classifiers = [
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Compilers",
  "Topic :: Text Processing :: Linguistic",
  "Typing :: Typed",
]
authors = [{ name = "AgentScript Team", email = "agentscript@salesforce.com" }]
requires-python = ">=3.10"
license = {text = "MIT"}
readme = "README.md"

[project.urls]
Homepage = "https://github.com/tree-sitter/tree-sitter-agentscript"
Repository = "https://github.com/tree-sitter/tree-sitter-agentscript"

[project.optional-dependencies]
core = ["tree-sitter>=0.24,<0.26"]

[tool.cibuildwheel]
build = "cp310-* cp311-* cp312-*"
build-frontend = "build"
skip = "*-musllinux_*"