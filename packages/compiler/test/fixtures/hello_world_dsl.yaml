      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
  initial_node: hello_world
  nodes:
    - type: subagent
      reasoning_type: salesforce.default
      description: you do things
      instructions: ''
      focus_prompt: respond to whatever the user says! Make sure to speak in iambic
        pentameter
      tools: []
      developer_name: hello_world
      label: hello_world
      action_definitions: []
