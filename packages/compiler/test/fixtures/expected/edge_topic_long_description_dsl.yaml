schema_version: '2.0'
global_configuration:
  developer_name: Long_Description_Agent
  label: Long Description Agent
  description: Agent testing very long multi-line descriptions across blocks for complex
    customer service scenarios
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: user@test.com
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! I'm here to help with any customer service needs.
      message_type: Welcome
    - message: An error occurred. Please try again.
      message_type: Error
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! I''m here to help with any customer service
      needs.", "messageType": "Welcome"}, {"message": "An error occurred. Please try
      again.", "messageType": "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                You are a comprehensive customer service agent.

                Handle all customer inquiries with care and professionalism.

                Route to specialized topics when appropriate.'
      instructions: You are a comprehensive customer service agent designed to handle
        complex scenarios.
      type: subagent
      reasoning_type: salesforce.default
      description: Main entry point for handling order tracking, billing, technical
        support, account management, returns, refunds, shipping, loyalty program,
        and general feedback
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"detailed_topic"'
          name: go_to_detailed
          description: Handles detailed and complex customer inquiries requiring extensive
            context, multi-step resolution, identity verification, account history
            checks, and comprehensive solutions
      after_all_tool_calls:
        - type: handoff
          target: detailed_topic
          enabled: state.AgentScriptInternal_next_topic=="detailed_topic"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: main
      label: Main
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Handle complex inquiries step by step.

                First verify identity, then gather details,

                then propose a solution.'
      instructions: You are a comprehensive customer service agent designed to handle
        complex scenarios.
      type: subagent
      reasoning_type: salesforce.default
      description: Handles detailed and complex customer inquiries requiring extensive
        context, multi-step resolution, identity verification, account history checks,
        and comprehensive solutions
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '''__human__'''
          name: escalate_to_human
          description: Escalate to a human agent
      after_all_tool_calls:
        - type: handoff
          target: __human__
          enabled: state.AgentScriptInternal_next_topic == '__human__'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: detailed_topic
      label: Detailed Topic
      action_definitions: []
  surfaces: []
