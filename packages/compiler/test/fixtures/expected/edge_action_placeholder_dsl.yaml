schema_version: "2.0"
global_configuration:
  developer_name: Placeholder_Actions_Agent
  label: Placeholder Actions Agent
  description: Agent demonstrating placeholder action support
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables: []
  default_agent_user: user@test.com
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! Some of my actions are still being developed.
      message_type: Welcome
    - message: An error occurred while processing your request.
      message_type: Error
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: "''"
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
  initial_node: main
  nodes:
    - type: subagent
      reasoning_type: salesforce.default
      description: Agent with both real and placeholder actions
      tools:
        - type: action
          target: Real_Action
          bound_inputs: {}
          llm_inputs:
            - input_val
          state_updates: []
          name: Use_Real
          description: Use Real
        - type: action
          target: Placeholder_Action
          bound_inputs: {}
          llm_inputs:
            - future_input
          state_updates: []
          name: Use_Placeholder
          description: Use Placeholder
        - type: action
          target: Another_Placeholder
          bound_inputs: {}
          llm_inputs:
            - stub_input
          state_updates: []
          name: Use_Another_Stub
          description: Use Another Stub
      developer_name: main
      label: Main
      action_definitions:
        - developer_name: Real_Action
          label: Real Action
          description: A real implemented action
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: RealAction
          input_type:
            - developer_name: input_val
              label: Input Value
              description: Input Value
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: real_result
              label: Real Result
              description: Real Result
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: Placeholder_Action
          label: Placeholder Action
          description: A placeholder action for future implementation
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: stub
          invocation_target_name: Placeholder_Action
          input_type:
            - developer_name: future_input
              label: Future Input
              description: Future Input
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: future_result
              label: Future Result
              description: Future Result
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: Another_Placeholder
          label: Another Placeholder
          description: Another stub action
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: stub
          invocation_target_name: Another_Placeholder
          input_type:
            - developer_name: stub_input
              label: Stub Input
              description: Stub Input
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: stub_result
              label: Stub Result
              description: Stub Result
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
      instructions: You are a helpful assistant with placeholder actions for future implementation.
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                You have access to both real and placeholder actions.
                Placeholder actions will be implemented in future releases.
  surfaces: []
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! Some of my actions are still being developed.", "messageType": "Welcome"}, {"message": "An error occurred while processing your request.", "messageType": "Error"}]'
