schema_version: '2.0'
global_configuration:
  developer_name: Knowledge_Bot_v1
  label: Knowledge Bot V 1
  description: A simple bot that answers questions using knowledge base
  enable_enhanced_event_logs: false
  agent_type: AgentforceServiceAgent
  default_agent_user: test@example.com
  context_variables: []
agent_version:
  developer_name: null
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
  - message: Hello! I can answer your questions using our knowledge base. What would
      you like to know?
    message_type: Welcome
  - message: I'm having trouble accessing the knowledge base. Please try again later.
    message_type: Error
  modality_parameters:
    voice: null
    language:
      default_locale: en_US
      additional_locales: []
      all_additional_locales: false
  additional_parameters:
    reset_to_initial_node: true
  state_variables:
  - developer_name: AgentScriptInternal_next_topic
    label: Next Topic
    description: The next topic to be visited
    data_type: string
    is_list: false
    default: '"__EMPTY__"'
    visibility: Internal
  - developer_name: AgentScriptInternal_agent_instructions
    label: Agent Instructions
    description: The agent instructions
    data_type: string
    is_list: false
    default: ''''''
    visibility: Internal
  - developer_name: AgentScriptInternal_condition
    label: Runtime Condition
    description: Runtime condition evaluation for if statements
    data_type: boolean
    is_list: false
    default: null
    visibility: Internal
  - developer_name: user_query
    label: User Query
    description: The user's question
    data_type: string
    is_list: false
    default: ''''''
    visibility: Internal
  initial_node: main
  nodes:
  - type: subagent
    reasoning_type: salesforce.default
    description: Main topic that handles knowledge-based Q&A
    before_reasoning:
    - type: action
      target: __state_update_action__
      enabled: 'True'
      state_updates:
      - AgentScriptInternal_agent_instructions: ''''''
    - type: action
      target: __state_update_action__
      enabled: 'True'
      state_updates:
      - AgentScriptInternal_next_topic: '"__EMPTY__"'
    - type: action
      target: __state_update_action__
      enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
      state_updates:
      - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

          You will use the knowledge search action to answer any users questions.'
    instructions: You are a helpful knowledge assistant. Use the knowledge base to
      answer user questions accurately.
    focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
    tools:
    - type: action
      target: AnswerQuestionsWithKnowledge
      bound_inputs: {}
      llm_inputs:
      - query
      state_updates:
      - user_query: '"Knowledge search completed"'
      name: search_knowledge
    - type: action
      target: __state_update_action__
      state_updates:
      - AgentScriptInternal_next_topic: '"followup"'
      name: ask_followup
      description: Ask if the user has more questions
    after_all_tool_calls:
    - type: handoff
      target: followup
      enabled: state.AgentScriptInternal_next_topic=="followup"
      state_updates:
      - AgentScriptInternal_next_topic: '"__EMPTY__"'
    after_reasoning: null
    developer_name: main
    label: Main
    action_definitions: []
  - type: subagent
    reasoning_type: salesforce.default
    description: Follow-up questions and additional assistance
    before_reasoning:
    - type: action
      target: __state_update_action__
      enabled: 'True'
      state_updates:
      - AgentScriptInternal_agent_instructions: ''''''
    - type: action
      target: __state_update_action__
      enabled: 'True'
      state_updates:
      - AgentScriptInternal_next_topic: '"__EMPTY__"'
    - type: action
      target: __state_update_action__
      enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
      state_updates:
      - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

          You will assist user with any followup questions'
    instructions: You are a helpful knowledge assistant. Use the knowledge base to
      answer user questions accurately.
    focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
    tools:
    - type: action
      target: __state_update_action__
      state_updates:
      - AgentScriptInternal_next_topic: '"main"'
      name: search_again
      description: Search for another question
    after_all_tool_calls:
    - type: handoff
      target: main
      enabled: state.AgentScriptInternal_next_topic=="main"
      state_updates:
      - AgentScriptInternal_next_topic: '"__EMPTY__"'
    after_reasoning: null
    developer_name: followup
    label: Followup
    action_definitions: []
  surfaces: []
