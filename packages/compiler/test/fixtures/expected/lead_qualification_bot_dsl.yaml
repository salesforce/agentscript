schema_version: '2.0'
global_configuration:
  developer_name: Lead_Qualification_Bot_v1
  label: Lead Qualification Bot V 1
  description: Qualifies leads using BANT methodology with deterministic scoring and
    progressive assessment
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: defaultagentuser@example.com
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! I'm here to help understand how our solutions might fit your
        business needs. I'd like to ask a few questions to better understand your
        requirements and see how we can help.
      message_type: Welcome
    - message: I'm experiencing some technical difficulties. Let me try to reconnect
        with our systems.
      message_type: Error
  modality_parameters:
    language:
      default_locale: en_US
      additional_locales: []
      all_additional_locales: false
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! I''m here to help understand how our solutions
      might fit your business needs. I''d like to ask a few questions to better understand
      your requirements and see how we can help.", "messageType": "Welcome"}, {"message":
      "I''m experiencing some technical difficulties. Let me try to reconnect with
      our systems.", "messageType": "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: company_name
      label: Company Name
      description: Company name of the lead
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: contact_name
      label: Contact Name
      description: Contact person name
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: email
      label: Email
      description: Contact email address
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: phone
      label: Phone
      description: Contact phone number
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: job_title
      label: Job Title
      description: Contact's job title
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: budget_range
      label: Budget Range
      description: Budget range for the solution
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: decision_authority
      label: Decision Authority
      description: Level of decision-making authority
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: business_need
      label: Business Need
      description: Specific business need or pain point
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: timeline
      label: Timeline
      description: Implementation timeline
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: budget_score
      label: Budget Score
      description: Budget qualification score (0-25)
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: authority_score
      label: Authority Score
      description: Authority qualification score (0-25)
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: need_score
      label: Need Score
      description: Need qualification score (0-25)
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: timeline_score
      label: Timeline Score
      description: Timeline qualification score (0-25)
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: total_bant_score
      label: Total Bant Score
      description: Total BANT qualification score (0-100)
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: lead_status
      label: Lead Status
      description: Current lead status
      data_type: string
      is_list: false
      default: '''new'''
      visibility: Internal
    - developer_name: lead_priority
      label: Lead Priority
      description: Lead priority level
      data_type: string
      is_list: false
      default: '''medium'''
      visibility: Internal
    - developer_name: next_step
      label: Next Step
      description: Recommended next step
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: assigned_rep
      label: Assigned Rep
      description: Assigned sales representative
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: qualification_complete
      label: Qualification Complete
      description: Whether BANT qualification is complete
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: current_question_index
      label: Current Question Index
      description: Current question being asked (0-3)
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
  initial_node: lead_intake
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Hello! I''m here to help understand how our solutions might fit your
                business needs.


                To get started, I''d like to gather some basic information about you
                and your company.


                **What I''ll need:**

                - Your name and job title

                - Company name

                - Contact information

                - Brief overview of what brings you to us today


                This helps me understand your situation better and ask the right questions
                to see how we can help.'
      instructions: You are a lead qualification specialist for a B2B marketing team.
        Your role is to assess potential customers using BANT criteria (Budget, Authority,
        Need, Timeline) and qualify leads for the sales team.
      type: subagent
      reasoning_type: salesforce.default
      description: Captures initial lead information and begins qualification process
      before_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.contact_name == ""
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - current_question_index: '0'
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - qualification_complete: 'False'
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - total_bant_score: '0'
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: Create_Lead_Record
          bound_inputs:
            company_name: state.company_name
            contact_name: state.contact_name
            email: state.email
            phone: state.phone
            job_title: state.job_title
          llm_inputs: []
          state_updates:
            - lead_status: '"contacted"'
          name: create_lead
          description: Create Lead
        - type: action
          target: Enrich_Company_Data
          bound_inputs:
            company_name: state.company_name
            contact_email: state.email
          llm_inputs: []
          state_updates: []
          name: enrich_data
          description: Enrich Data
        - type: action
          target: __state_update_action__
          bound_inputs: {}
          llm_inputs: []
          state_updates:
            - company_name: state.company_name
            - contact_name: state.contact_name
            - email: state.email
            - phone: state.phone
            - job_title: state.job_title
          name: capture_lead_info
          description: Capture initial lead information
          input_parameters: []
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"bant_qualification"'
          name: start_qualification
          description: Begin BANT qualification process
      after_all_tool_calls:
        - type: handoff
          target: bant_qualification
          enabled: state.AgentScriptInternal_next_topic=="bant_qualification"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      after_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.company_name != "" and (state.contact_name
                != "" and state.email != "")
        - type: action
          target: Create_Lead_Record
          bound_inputs:
            company_name: state.company_name
            contact_name: state.contact_name
            email: state.email
            phone: state.phone
            job_title: state.job_title
          llm_inputs: []
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - lead_status: '"contacted"'
        - type: action
          target: Enrich_Company_Data
          bound_inputs:
            company_name: state.company_name
            contact_email: state.email
          llm_inputs: []
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates: []
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - AgentScriptInternal_next_topic: '"bant_qualification"'
        - type: handoff
          target: bant_qualification
          enabled: state.AgentScriptInternal_next_topic=="bant_qualification"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: lead_intake
      label: Lead Intake
      action_definitions:
        - developer_name: Create_Lead_Record
          label: Create Lead Record
          description: Creates a new lead record in CRM system
          require_user_confirmation: false
          include_in_progress_indicator: true
          invocation_target_type: flow
          invocation_target_name: CreateLeadRecord
          input_type:
            - developer_name: company_name
              label: Company Name
              description: Name of the prospect's company
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: contact_name
              label: Contact Name
              description: Name of the primary contact
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: email
              label: Email Address
              description: Contact's email address
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: phone
              label: Phone Number
              description: Contact's phone number
              data_type: String
              is_list: false
              required: false
              is_user_input: false
            - developer_name: job_title
              label: Job Title
              description: Contact's position/title
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: lead_id
              label: Lead ID
              description: Lead Id
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: lead_source
              label: Lead Source
              description: Lead Source
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: company_profile
              label: Company Profile
              description: Company Profile
              data_type: LightningTypes
              complex_data_type_name: lightning__objectType
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: contact_verified
              label: Contact Verified
              description: Contact Verified
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: Enrich_Company_Data
          label: Enrich Company Data
          description: Enriches lead data with company information and technographics
          require_user_confirmation: false
          include_in_progress_indicator: true
          invocation_target_type: flow
          invocation_target_name: EnrichCompanyData
          input_type:
            - developer_name: company_name
              label: Company Name
              description: Company to research
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: contact_email
              label: Contact Email
              description: Email domain for company matching
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: company_size
              label: Company Size
              description: Company Size
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: true
            - developer_name: industry
              label: Industry
              description: Industry
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: true
            - developer_name: annual_revenue
              label: Annual Revenue
              description: Annual Revenue
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: technology_stack
              label: Technology Stack
              description: Technology Stack
              data_type: String
              is_list: true
              is_used_by_planner: true
              is_displayable: false
            - developer_name: fit_score
              label: Company Fit Score
              description: Fit Score
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Great! Now I''d like to understand your specific situation better
                through a few targeted questions.


                This helps me determine if and how our solution might be a good fit
                for {{state.company_name}}.


                **BANT Qualification Progress:**

                - Budget: {{state.budget_score}}/25 points

                - Authority: {{state.authority_score}}/25 points

                - Need: {{state.need_score}}/25 points

                - Timeline: {{state.timeline_score}}/25 points

                **Total Score: {{state.total_bant_score}}/100**


                **Current Question ({{state.current_question_index + 1}}/4):**


                Based on where we are in the qualification, let me ask about the most
                relevant aspect next.'
      instructions: You are a lead qualification specialist for a B2B marketing team.
        Your role is to assess potential customers using BANT criteria (Budget, Authority,
        Need, Timeline) and qualify leads for the sales team.
      type: subagent
      reasoning_type: salesforce.default
      description: Conducts systematic BANT qualification with progressive scoring
      before_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.current_question_index < 4
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - qualification_complete: 'False'
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: Score_Budget_Response
          bound_inputs:
            budget_range: state.budget_range
            urgency_indicators: '""'
          llm_inputs: []
          state_updates:
            - budget_score: result.budget_score
          name: score_budget
          description: Score Budget
        - type: action
          target: Assess_Decision_Authority
          bound_inputs:
            job_title: state.job_title
            decision_process: state.decision_authority
            stakeholders_involved: '""'
          llm_inputs: []
          state_updates:
            - authority_score: result.authority_score
          name: assess_authority
          description: Assess Authority
        - type: action
          target: Evaluate_Business_Need
          bound_inputs:
            business_need: state.business_need
            current_solution: '""'
            pain_level: '"medium"'
          llm_inputs: []
          state_updates:
            - need_score: result.need_score
          name: evaluate_need
          description: Evaluate Need
        - type: action
          target: Analyze_Timeline
          bound_inputs:
            timeline: state.timeline
            urgency_drivers: '""'
            competing_priorities: '""'
          llm_inputs: []
          state_updates:
            - timeline_score: result.timeline_score
          name: analyze_timeline
          description: Analyze Timeline
        - type: action
          target: __state_update_action__
          bound_inputs: {}
          llm_inputs: []
          state_updates:
            - budget_range: state.budget_range
            - decision_authority: state.decision_authority
            - business_need: state.business_need
            - timeline: state.timeline
          name: capture_bant_responses
          description: Capture BANT qualification responses
          input_parameters: []
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"qualification_results"'
          name: show_results
          description: Show qualification results and next steps
      after_all_tool_calls:
        - type: handoff
          target: qualification_results
          enabled: state.AgentScriptInternal_next_topic=="qualification_results"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      after_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.budget_range != "" and state.current_question_index
                == 0
        - type: action
          target: Score_Budget_Response
          bound_inputs:
            budget_range: state.budget_range
            company_size: '"medium"'
            urgency_indicators: '""'
          llm_inputs: []
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - budget_score: result.budget_score
            - current_question_index: '1'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.decision_authority != "" and state.current_question_index
                == 1
        - type: action
          target: Assess_Decision_Authority
          bound_inputs:
            job_title: state.job_title
            decision_process: state.decision_authority
            stakeholders_involved: '""'
          llm_inputs: []
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - authority_score: result.authority_score
            - current_question_index: '2'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.business_need != "" and state.current_question_index
                == 2
        - type: action
          target: Evaluate_Business_Need
          bound_inputs:
            business_need: state.business_need
            current_solution: '""'
            pain_level: '"medium"'
          llm_inputs: []
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - need_score: result.need_score
            - current_question_index: '3'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.timeline != "" and state.current_question_index
                == 3
        - type: action
          target: Analyze_Timeline
          bound_inputs:
            timeline: state.timeline
            urgency_drivers: '""'
            competing_priorities: '""'
          llm_inputs: []
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - timeline_score: result.timeline_score
            - current_question_index: '4'
            - qualification_complete: 'True'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.qualification_complete
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - total_bant_score: state.budget_score + state.authority_score + state.need_score
                + state.timeline_score
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - AgentScriptInternal_next_topic: '"qualification_results"'
        - type: handoff
          target: qualification_results
          enabled: state.AgentScriptInternal_next_topic=="qualification_results"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: bant_qualification
      label: Bant Qualification
      action_definitions:
        - developer_name: Score_Budget_Response
          label: Score Budget Response
          description: Analyzes budget response and assigns qualification score
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: ScoreBudgetResponse
          input_type:
            - developer_name: budget_range
              label: Budget Range
              description: Stated budget range or financial capacity
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: company_size
              label: Company Size
              description: Company size category
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: urgency_indicators
              label: Urgency Indicators
              description: Signals of budget availability
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: budget_score
              label: Budget Score
              description: Budget Score
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: budget_qualified
              label: Budget Qualified
              description: Budget Qualified
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: true
            - developer_name: recommended_pricing_tier
              label: Recommended Pricing Tier
              description: Recommended Pricing Tier
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: Assess_Decision_Authority
          label: Assess Decision Authority
          description: Evaluates contact's decision-making authority and influence
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: AssessDecisionAuthority
          input_type:
            - developer_name: job_title
              label: Job Title
              description: Contact's job title/position
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: decision_process
              label: Decision Process
              description: How decisions are made at their company
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: stakeholders_involved
              label: Stakeholders Involved
              description: Other people involved in decision
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: authority_score
              label: Authority Score
              description: Authority Score
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: decision_maker_type
              label: Decision Maker Type
              description: Decision Maker Type
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: true
            - developer_name: influencer_level
              label: Influencer Level
              description: Influencer Level
