    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Excellent! I''ve completed the qualification assessment for {{state.company_name}}.


                **🎯 BANT Qualification Results:**


                **Budget Qualification:** {{state.budget_score}}/25 points

                **Authority Assessment:** {{state.authority_score}}/25 points

                **Need Analysis:** {{state.need_score}}/25 points

                **Timeline Evaluation:** {{state.timeline_score}}/25 points


                **📊 Total BANT Score: {{state.total_bant_score}}/100**

                **🏷️ Lead Priority: {{state.lead_priority}}**

                **📋 Lead Status: {{state.lead_status}}**


                **🎯 Recommended Next Step: {{state.next_step}}**


                Based on your qualification score, here''s what I recommend as the
                best next step to move forward.'
      instructions: You are a lead qualification specialist for a B2B marketing team.
        Your role is to assess potential customers using BANT criteria (Budget, Authority,
        Need, Timeline) and qualify leads for the sales team.
      type: subagent
      reasoning_type: salesforce.default
      description: Presents qualification results and determines next steps
      before_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.total_bant_score >= 80
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - lead_priority: '"high"'
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - next_step: '"immediate_demo"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.total_bant_score >= 60
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - lead_priority: '"medium"'
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - next_step: '"sales_call"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.total_bant_score < 60
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - lead_priority: '"low"'
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - next_step: '"nurture_campaign"'
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: Generate_Lead_Score
          bound_inputs:
            bant_score: state.total_bant_score
            company_fit: '75'
            engagement_level: '"high"'
          llm_inputs: []
          state_updates:
            - lead_status: result.qualification_level
          name: calculate_final_score
          description: Calculate Final Score
        - type: action
          target: Assign_Sales_Rep
          bound_inputs:
            lead_score: state.total_bant_score
            company_size: '"medium"'
            industry: '"technology"'
            deal_value_estimate: '50000'
          llm_inputs: []
          state_updates:
            - assigned_rep: result.assigned_rep
          name: assign_rep
          description: Assign Rep
        - type: action
          target: Schedule_Demo
          bound_inputs:
            lead_id: '"LEAD-001"'
            preferred_demo_time: '""'
            demo_type: '"standard"'
            attendees: '""'
          llm_inputs: []
          state_updates: []
          name: book_demo
          description: Book Demo
        - type: action
          target: __state_update_action__
          bound_inputs: {}
          llm_inputs: []
          state_updates:
            - next_step: state.next_step
          name: capture_next_step_preferences
          description: Capture next step preferences
          input_parameters: []
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"lead_intake"'
          name: qualify_another
          description: Qualify another lead
      after_all_tool_calls:
        - type: handoff
          target: lead_intake
          enabled: state.AgentScriptInternal_next_topic=="lead_intake"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      after_reasoning:
