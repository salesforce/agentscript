schema_version: '2.0'
global_configuration:
  developer_name: Loan_Application_Assistant_v1
  label: Loan Application Assistant V 1
  description: Processes loan applications with deterministic eligibility assessment
    and routing
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: defaultagentuser@example.com
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Welcome to our loan application system! I'll help you through the application
        process. Let's start by gathering some basic information.
      message_type: Welcome
    - message: I'm experiencing technical difficulties. Please contact our loan office
        directly.
      message_type: Error
  modality_parameters:
    language:
      default_locale: en_US
      additional_locales: []
      all_additional_locales: false
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Welcome to our loan application system! I''ll
      help you through the application process. Let''s start by gathering some basic
      information.", "messageType": "Welcome"}, {"message": "I''m experiencing technical
      difficulties. Please contact our loan office directly.", "messageType": "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: applicant_name
      label: Applicant Name
      description: Applicant's name
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: ssn
      label: Ssn
      description: Social Security Number
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: date_of_birth
      label: Date Of Birth
      description: Date of birth
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: phone_number
      label: Phone Number
      description: Contact phone number
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: email
      label: Email
      description: Email address
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: address
      label: Address
      description: Home address
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: employment_status
      label: Employment Status
      description: Current employment status
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: employer_name
      label: Employer Name
      description: Current employer
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: annual_income
      label: Annual Income
      description: Annual income
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: employment_duration
      label: Employment Duration
      description: Length of employment
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: additional_income
      label: Additional Income
      description: Additional income sources
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: credit_score
      label: Credit Score
      description: Credit score
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: existing_debt
      label: Existing Debt
      description: Current debt obligations
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: monthly_expenses
      label: Monthly Expenses
      description: Monthly living expenses
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: savings_amount
      label: Savings Amount
      description: Current savings
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: assets_value
      label: Assets Value
      description: Total asset value
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: loan_type
      label: Loan Type
      description: Type of loan requested
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: loan_amount
      label: Loan Amount
      description: Requested loan amount
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: loan_purpose
      label: Loan Purpose
      description: Purpose of the loan
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: collateral_offered
      label: Collateral Offered
      description: Collateral being offered
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: loan_term
      label: Loan Term
      description: Requested loan term in months
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: eligibility_score
      label: Eligibility Score
      description: Loan eligibility score (0-100)
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: debt_to_income_ratio
      label: Debt To Income Ratio
      description: Debt-to-income ratio percentage
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: risk_level
      label: Risk Level
      description: Risk assessment level
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: application_status
      label: Application Status
      description: Current application status
      data_type: string
      is_list: false
      default: '''pending'''
      visibility: Internal
    - developer_name: approved_amount
      label: Approved Amount
      description: Approved loan amount
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: interest_rate
      label: Interest Rate
      description: Offered interest rate
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: documents_required
      label: Documents Required
      description: Required documentation list
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: documents_received
      label: Documents Received
      description: Documents already submitted
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: application_complete
      label: Application Complete
      description: Whether application is complete
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: identity_verified
      label: Identity Verified
      description: Whether applicant identity has been verified
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
  initial_node: application_intake
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Welcome to our loan application system! I''ll help you through the
                application process step by step.


                **Getting Started:**

                To begin your loan application, I''ll need to collect some personal
                information and verify your identity.


                **Information I''ll Need:**

                - Personal details (name, SSN, date of birth, address)

                - Contact information (phone and email)

                - Employment information

                - Income details

                - Loan requirements


                **Privacy & Security:**

                All information is encrypted and handled according to banking regulations.
                I''ll need your consent before running any credit checks.


                Let''s start with your basic information.'
      instructions: You are a loan application processing assistant for a financial
        institution. Guide customers through the loan application process, collect
        documentation, and perform eligibility assessments.
      type: subagent
      reasoning_type: salesforce.default
      description: Collects initial loan application information and applicant details
      before_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.applicant_name == ""
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - eligibility_score: '0'
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - application_status: '"pending"'
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - application_complete: 'False'
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: Verify_Identity
          bound_inputs:
            ssn: state.ssn
            full_name: state.applicant_name
            date_of_birth: state.date_of_birth
            address: state.address
          llm_inputs: []
          state_updates:
            - identity_verified: result.identity_verified
          name: verify_applicant
          description: Verify Applicant
        - type: action
          target: Pull_Credit_Report
          bound_inputs:
            ssn: state.ssn
            consent_given: 'True'
          llm_inputs: []
          state_updates:
            - credit_score: result.credit_score
            - existing_debt: result.total_debt
          name: get_credit_report
          description: Get Credit Report
        - type: action
          target: Validate_Income
          bound_inputs:
            employer_name: state.employer_name
            annual_income: state.annual_income
            employment_duration: state.employment_duration
            employment_type: state.employment_status
          llm_inputs: []
          state_updates:
            - annual_income: result.verified_income
          name: verify_income
          description: Verify Income
        - type: action
          target: __state_update_action__
          bound_inputs: {}
          llm_inputs: []
          state_updates:
            - applicant_name: state.applicant_name
            - ssn: state.ssn
            - date_of_birth: state.date_of_birth
            - phone_number: state.phone_number
            - email: state.email
            - address: state.address
            - loan_type: state.loan_type
            - loan_amount: state.loan_amount
            - loan_purpose: state.loan_purpose
          name: capture_application_info
          description: Capture loan application details
          input_parameters: []
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"financial_assessment"'
          name: assess_finances
          description: Assess financial eligibility
      after_all_tool_calls:
        - type: handoff
          target: financial_assessment
          enabled: state.AgentScriptInternal_next_topic=="financial_assessment"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      after_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.applicant_name != "" and state.ssn
                != ""
        - type: action
          target: Verify_Identity
          bound_inputs:
            ssn: state.ssn
            full_name: state.applicant_name
            date_of_birth: state.date_of_birth
            address: state.address
          llm_inputs: []
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates: []
        - type: action
          target: Pull_Credit_Report
          bound_inputs:
            ssn: state.ssn
            consent_given: 'True'
          llm_inputs: []
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - credit_score: result.credit_score
            - existing_debt: result.total_debt
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.employer_name != "" and state.annual_income
                > 0
        - type: action
          target: Validate_Income
          bound_inputs:
            employer_name: state.employer_name
            annual_income: state.annual_income
            employment_duration: state.employment_duration
            employment_type: state.employment_status
          llm_inputs: []
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - annual_income: result.verified_income
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - AgentScriptInternal_next_topic: '"financial_assessment"'
        - type: handoff
          target: financial_assessment
          enabled: state.AgentScriptInternal_next_topic=="financial_assessment"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: application_intake
      label: Application Intake
      action_definitions:
        - developer_name: Verify_Identity
          label: Verify Identity
          description: Verifies applicant identity using SSN and personal information
          require_user_confirmation: false
          include_in_progress_indicator: true
          invocation_target_type: flow
          invocation_target_name: VerifyIdentity
          input_type:
            - developer_name: ssn
              label: Social Security Number
              description: Applicant's SSN for identity verification
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: full_name
              label: Full Name
              description: Applicant's legal name
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: date_of_birth
              label: Date of Birth
              description: Date of birth (MM/DD/YYYY)
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: address
              label: Address
              description: Current home address
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: identity_verified
              label: Identity Verified
              description: Identity Verified
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: true
            - developer_name: applicant_id
              label: Applicant ID
              description: Applicant Id
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: existing_customer
              label: Existing Customer
              description: Existing Customer
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: fraud_alert
              label: Fraud Alert
              description: Fraud Alert
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: Pull_Credit_Report
          label: Pull Credit Report
          description: Retrieves comprehensive credit report and score
          require_user_confirmation: true
          include_in_progress_indicator: true
          invocation_target_type: flow
          invocation_target_name: PullCreditReport
          input_type:
            - developer_name: ssn
              label: SSN
              description: Social Security Number for credit check
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: consent_given
              label: Credit Check Consent
              description: Applicant consent for credit check
              data_type: Boolean
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: credit_score
              label: Credit Score
              description: Credit Score
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: true
            - developer_name: credit_history_length
              label: Credit History Length
              description: Credit History Length
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: payment_history
              label: Payment History
              description: Payment History
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: existing_accounts
              label: Existing Accounts
              description: Existing Accounts
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: total_debt
              label: Total Existing Debt
              description: Total Debt
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: true
            - developer_name: derogatory_marks
              label: Derogatory Marks
              description: Derogatory Marks
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: Validate_Income
          label: Validate Income
          description: Validates employment and income information
          require_user_confirmation: false
          include_in_progress_indicator: true
          invocation_target_type: flow
          invocation_target_name: ValidateIncome
          input_type:
            - developer_name: employer_name
              label: Employer Name
              description: Current employer
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: annual_income
              label: Annual Income
              description: Stated annual income
              data_type: Double
              is_list: false
              required: true
              is_user_input: false
            - developer_name: employment_duration
              label: Employment Duration
              description: Length of current employment
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: employment_type
              label: Employment Type
              description: Type of employment (full-time, part-time, etc.)
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: income_verified
              label: Income Verified
              description: Income Verified
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: true
            - developer_name: verified_income
              label: Verified Income
              description: Verified Income
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: true
            - developer_name: employment_stable
              label: Employment Stable
              description: Employment Stable
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: income_documentation_required
              label: Income Docs Required
              description: Income Documentation Required
              data_type: String
              is_list: true
              is_used_by_planner: true
              is_displayable: true
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                **Financial Assessment in Progress**


                **Applicant:** {{state.applicant_name}}

                **Loan Request:** ${{state.loan_amount}} {{state.loan_type}}

                **Purpose:** {{state.loan_purpose}}


                **Financial Profile:**

                - Annual Income: ${{state.annual_income}}

                - Credit Score: {{state.credit_score}}

                - Existing Debt: ${{state.existing_debt}}

                - Debt-to-Income Ratio: {{state.debt_to_income_ratio}}%

                - Risk Level: {{state.risk_level}}


                **Assessment Progress:** {{state.eligibility_score}}/100


                I''m analyzing your financial profile to determine the best loan options
                available to you.'
      instructions: You are a loan application processing assistant for a financial
        institution. Guide customers through the loan application process, collect
        documentation, and perform eligibility assessments.
      type: subagent
      reasoning_type: salesforce.default
      description: Performs comprehensive financial analysis and eligibility scoring
      before_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.annual_income > 0 and state.existing_debt
                >= 0
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - debt_to_income_ratio: '0.5'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.credit_score >= 750
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - risk_level: '"low"'
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - eligibility_score: state.eligibility_score + 25
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.credit_score >= 650 and state.credit_score
                < 750
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - risk_level: '"medium"'
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - eligibility_score: state.eligibility_score + 15
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.credit_score < 650
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - risk_level: '"high"'
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - eligibility_score: state.eligibility_score + 5
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: Calculate_DTI_Ratio
          bound_inputs:
            monthly_income: state.annual_income
            existing_monthly_debt: state.existing_debt
            new_loan_payment: state.loan_amount
            monthly_expenses: state.monthly_expenses
          llm_inputs: []
          state_updates:
            - debt_to_income_ratio: result.new_dti_ratio
          name: calculate_dti
          description: Calculate Dti
        - type: action
          target: Assess_Risk_Profile
          bound_inputs:
            credit_score: state.credit_score
            dti_ratio: state.debt_to_income_ratio
            employment_stability: state.employment_duration
            loan_to_value: '80'
            savings_ratio: '10'
          llm_inputs: []
          state_updates:
            - risk_level: result.risk_category
            - eligibility_score: result.approval_probability
          name: assess_risk
          description: Assess Risk
        - type: action
          target: Generate_Loan_Options
          bound_inputs:
            requested_amount: state.loan_amount
            risk_profile: state.risk_level
            loan_type: state.loan_type
            max_affordable_payment: '5000'
          llm_inputs: []
          state_updates:
            - approved_amount: result.approved_amount
            - interest_rate: result.interest_rate
          name: create_options
          description: Create Options
        - type: action
          target: __state_update_action__
          bound_inputs: {}
          llm_inputs: []
          state_updates:
            - employment_status: state.employment_status
            - employer_name: state.employer_name
            - annual_income: state.annual_income
            - monthly_expenses: state.monthly_expenses
            - savings_amount: state.savings_amount
          name: capture_financial_details
          description: Capture additional financial information
          input_parameters: []
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"application_decision"'
          name: make_decision
          description: Make loan decision
      after_all_tool_calls:
        - type: handoff
          target: application_decision
