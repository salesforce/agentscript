schema_version: '2.0'
global_configuration:
  developer_name: ConstantValuesMixed
  label: Constant Values Mixed
  description: Constant Values Mixed
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages: []
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    rag_feature_config_id: WorldKnowledge
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Test mixed constant value types'
      type: subagent
      reasoning_type: salesforce.default
      description: Test mixed constant value types
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: api_call
          bound_inputs: {}
          llm_inputs: []
          state_updates: []
          name: call_api
          description: Call Api
      developer_name: main
      label: Main
      action_definitions:
        - developer_name: api_call
          label: Api Call
          description: API call with mixed constant types
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: APICall
          input_type:
            - developer_name: url
              label: Url
              description: Url
              data_type: String
              is_list: false
              required: false
              is_user_input: false
              constant_value: 'https://api.example.com'
            - developer_name: enabled
              label: Enabled
              description: Enabled
              data_type: Boolean
              is_list: false
              required: false
              is_user_input: false
              constant_value: true
            - developer_name: rag_id
              label: Rag Id
              description: Rag Id
              data_type: String
              is_list: false
              required: false
              is_user_input: false
              constant_value: WorldKnowledge
            - developer_name: custom_header
              label: Custom Header
              description: Custom Header
              data_type: String
              is_list: false
              required: false
              is_user_input: false
              constant_value: "User-Agent: TestBot"
            - developer_name: verify_ssl
              label: Verify Ssl
              description: Verify Ssl
              data_type: Boolean
              is_list: false
              required: false
              is_user_input: false
              constant_value: false
          output_type:
            - developer_name: response
              label: Response
              description: Response
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
  surfaces: []
