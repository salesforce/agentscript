schema_version: '2.0'
global_configuration:
  developer_name: Edge_Cond_After_Reasoning
  label: Edge Cond After Reasoning
  description: Tests after_reasoning with conditionals controlling transitions
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: test_user
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello!
      message_type: Welcome
    - message: Error occurred.
      message_type: Error
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello!", "messageType": "Welcome"}, {"message":
      "Error occurred.", "messageType": "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: status
      label: Status
      description: Status
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: score
      label: Score
      description: Score
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: handled
      label: Handled
      description: Handled
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Help the user and determine the appropriate next step.'
      instructions: You are an assistant that routes users after reasoning.
      type: subagent
      reasoning_type: salesforce.default
      description: Tests conditional transitions in after_reasoning
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      after_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.status == "done"
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - AgentScriptInternal_next_topic: '"completed"'
        - type: handoff
          target: completed
          enabled: state.AgentScriptInternal_next_topic=="completed"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.status == "escalate"
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - handled: 'False'
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - AgentScriptInternal_next_topic: '"escalation"'
        - type: handoff
          target: escalation
          enabled: state.AgentScriptInternal_next_topic=="escalation"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.score > 80
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - AgentScriptInternal_next_topic: '"high_priority"'
        - type: handoff
          target: high_priority
          enabled: state.AgentScriptInternal_next_topic=="high_priority"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: main
      label: Main
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                The interaction has been completed successfully.'
      instructions: You are an assistant that routes users after reasoning.
      type: subagent
      reasoning_type: salesforce.default
      description: Handles completed interactions
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      developer_name: completed
      label: Completed
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                This interaction has been escalated to a human agent.'
      instructions: You are an assistant that routes users after reasoning.
      type: subagent
      reasoning_type: salesforce.default
      description: Handles escalated interactions
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      developer_name: escalation
      label: Escalation
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                This is a high priority case requiring immediate attention.'
      instructions: You are an assistant that routes users after reasoning.
      type: subagent
      reasoning_type: salesforce.default
      description: Handles high priority cases
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      developer_name: high_priority
      label: High Priority
      action_definitions: []
  surfaces: []
