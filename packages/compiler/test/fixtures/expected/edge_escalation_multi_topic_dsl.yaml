schema_version: '2.0'
global_configuration:
  developer_name: Edge_Escalation_Multi_Topic
  label: Edge Escalation Multi Topic
  description: Tests multiple topics each with their own escalation action
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: test_user
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Welcome! How can I help you today?
      message_type: Welcome
    - message: Something went wrong.
      message_type: Error
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Welcome! How can I help you today?", "messageType":
      "Welcome"}, {"message": "Something went wrong.", "messageType": "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: department
      label: Department
      description: Department
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: issue
      label: Issue
      description: Issue
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
  initial_node: router
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                I can help route you to the right department.

                What do you need help with: billing, technical, or general?'
      instructions: You are a support agent with multiple escalation paths.
      type: subagent
      reasoning_type: salesforce.default
      description: Routes users to the appropriate department
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"billing_support"'
          name: go_billing
          description: Handles billing inquiries with escalation
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"technical_support"'
          name: go_technical
          description: Handles technical issues with escalation
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"general_support"'
          name: go_general
          description: Handles general inquiries with escalation
      after_all_tool_calls:
        - type: handoff
          target: billing_support
          enabled: state.AgentScriptInternal_next_topic=="billing_support"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: technical_support
          enabled: state.AgentScriptInternal_next_topic=="technical_support"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: general_support
          enabled: state.AgentScriptInternal_next_topic=="general_support"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: router
      label: Router
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                I can help with billing questions. If I can''t resolve your issue,
                I''ll transfer you to a billing specialist.'
      instructions: You are a support agent with multiple escalation paths.
      type: subagent
      reasoning_type: salesforce.default
      description: Handles billing inquiries with escalation
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '''__human__'''
          name: escalate_billing
          description: Escalate to billing specialist
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"router"'
          name: back_to_router
          description: Routes users to the appropriate department
      after_all_tool_calls:
        - type: handoff
          target: __human__
          enabled: state.AgentScriptInternal_next_topic == '__human__'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: router
          enabled: state.AgentScriptInternal_next_topic=="router"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: billing_support
      label: Billing Support
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                I can help with technical issues. If this requires deeper investigation,
                I''ll transfer you to a tech specialist.'
      instructions: You are a support agent with multiple escalation paths.
      type: subagent
      reasoning_type: salesforce.default
      description: Handles technical issues with escalation
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '''__human__'''
          name: escalate_technical
          description: Escalate to technical specialist
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"router"'
          name: back_to_router
          description: Routes users to the appropriate department
      after_all_tool_calls:
        - type: handoff
          target: __human__
          enabled: state.AgentScriptInternal_next_topic == '__human__'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: router
          enabled: state.AgentScriptInternal_next_topic=="router"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: technical_support
      label: Technical Support
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                I can help with general questions. If you need more specialized help,
                I can transfer you.'
      instructions: You are a support agent with multiple escalation paths.
      type: subagent
      reasoning_type: salesforce.default
      description: Handles general inquiries with escalation
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '''__human__'''
          name: escalate_general
          description: Escalate to general support agent
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"router"'
          name: back_to_router
          description: Routes users to the appropriate department
      after_all_tool_calls:
        - type: handoff
          target: __human__
          enabled: state.AgentScriptInternal_next_topic == '__human__'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: router
          enabled: state.AgentScriptInternal_next_topic=="router"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: general_support
      label: General Support
      action_definitions: []
  surfaces: []
