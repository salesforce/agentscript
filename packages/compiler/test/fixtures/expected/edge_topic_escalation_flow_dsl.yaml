# NOTE: Differs from Python compiler — TS uses explicit label for input descriptions
# when no description is set. Python uses normalizeDeveloperName(name) instead,
# which discards the author's explicit label.
schema_version: "2.0"
global_configuration:
  developer_name: Escalation_Flow_Agent
  label: Escalation Flow Agent
  description: Agent demonstrating escalation flow pattern with happy path and
    off-topic handling
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables: []
  default_agent_user: user@test.com
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! I can help you with your support case.
      message_type: Welcome
    - message: An error occurred while processing your case.
      message_type: Error
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: "''"
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: case_id
      label: Case Id
      description: The support case identifier
      data_type: string
      is_list: false
      visibility: Internal
      default: "''"
    - developer_name: severity
      label: Severity
      description: Issue severity level
      data_type: string
      is_list: false
      visibility: Internal
      default: "''"
  initial_node: main
  nodes:
    - type: subagent
      reasoning_type: salesforce.default
      description: Agent demonstrating escalation flow pattern with happy path and
        off-topic handling
      tools:
        - type: action
          target: Create_Case
          bound_inputs: {}
          llm_inputs:
            - details
          state_updates:
            - case_id: result.case_id
          name: Create_Case_Action
          description: Create Case Action
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"happy_path"'
          name: go_to_happy_path
          description: Standard resolution path for common issues
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"escalation"'
          name: go_to_escalation
          description: Escalation path for complex issues requiring human intervention
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"off_topic"'
          name: go_to_off_topic
          description: Handle off-topic or unrelated requests
      developer_name: main
      label: Main
      action_definitions:
        - developer_name: Create_Case
          label: Create Case
          description: Create a new support case
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Create_Support_Case
          input_type:
            - developer_name: details
              label: Case Description
              description: Case Description
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: case_id
              label: Case ID
              description: Case Id
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
      instructions: You are a support case management agent.
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                Welcome the user. Determine if their issue can be resolved
                in the happy path, needs escalation, or is off-topic.
      after_all_tool_calls:
        - type: handoff
          target: happy_path
          enabled: state.AgentScriptInternal_next_topic=="happy_path"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: escalation
          enabled: state.AgentScriptInternal_next_topic=="escalation"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: off_topic
          enabled: state.AgentScriptInternal_next_topic=="off_topic"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
    - type: subagent
      reasoning_type: salesforce.default
      description: Standard resolution path for common issues
      tools:
        - type: action
          target: Resolve_Case
          bound_inputs:
            case_id: state.case_id
          llm_inputs:
            - resolution
          state_updates: []
          name: Resolve_Action
          description: Resolve Action
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"escalation"'
          name: go_to_escalation
          description: Escalation path for complex issues requiring human intervention
      developer_name: happy_path
      label: Happy Path
      action_definitions:
        - developer_name: Resolve_Case
          label: Resolve Case
          description: Resolve the support case
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Resolve_Case_Flow
          input_type:
            - developer_name: case_id
              label: Case ID
              description: Case ID
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: resolution
              label: Resolution
              description: Resolution
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: success
              label: Resolution Success
              description: Success
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
      instructions: You are a support case management agent.
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                Try to resolve the user's issue using standard procedures.
                If the issue is too complex, escalate.
      after_all_tool_calls:
        - type: handoff
          target: escalation
          enabled: state.AgentScriptInternal_next_topic=="escalation"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
    - type: subagent
      reasoning_type: salesforce.default
      description: Escalation path for complex issues requiring human intervention
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: "'__human__'"
          name: escalate_to_human
          description: Escalate to a human agent
      developer_name: escalation
      label: Escalation
      action_definitions: []
      instructions: You are a support case management agent.
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                The issue requires human intervention.
                Collect all relevant details and escalate to a human agent.
                Apologize for the inconvenience.
      after_all_tool_calls:
        - type: handoff
          target: __human__
          enabled: state.AgentScriptInternal_next_topic == '__human__'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
    - type: subagent
      reasoning_type: salesforce.default
      description: Handle off-topic or unrelated requests
      tools: []
      developer_name: off_topic
      label: Off Topic
      action_definitions: []
      instructions: You are a support case management agent.
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                The user's request is not related to our services.
                Politely redirect them back to the main topic.
  surfaces: []
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! I can help you with your support case.",
      "messageType": "Welcome"}, {"message": "An error occurred while processing
      your case.", "messageType": "Error"}]'
