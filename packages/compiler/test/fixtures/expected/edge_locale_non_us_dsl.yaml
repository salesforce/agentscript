schema_version: '2.0'
global_configuration:
  developer_name: French_Agent
  label: French Agent
  description: Agent with French default locale
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Bonjour! Comment puis-je vous aider?
      message_type: Welcome
    - message: Desole, une erreur s'est produite.
      message_type: Error
  modality_parameters:
    language:
      default_locale: fr
      additional_locales: []
      all_additional_locales: true
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Bonjour! Comment puis-je vous aider?", "messageType":
      "Welcome"}, {"message": "Desole, une erreur s''est produite.", "messageType":
      "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Traiter la demande de l''utilisateur en francais'
      instructions: Vous etes un agent de service client francais.
      type: subagent
      reasoning_type: salesforce.default
      description: Point d'entree pour l'agent francais
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      developer_name: main
      label: Main
      action_definitions: []
  surfaces: []
