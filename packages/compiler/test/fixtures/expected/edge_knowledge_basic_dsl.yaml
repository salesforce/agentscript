schema_version: "2.0"
global_configuration:
  developer_name: Edge_Knowledge_Basic
  label: Edge Knowledge Basic
  description: Tests basic knowledge block with citations_enabled
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables: []
  default_agent_user: test_user
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! I can search our knowledge base for you.
      message_type: Welcome
    - message: An error occurred.
      message_type: Error
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: "''"
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
  initial_node: main
  nodes:
    - type: subagent
      reasoning_type: salesforce.default
      description: Agent with basic knowledge block
      tools: []
      developer_name: main
      label: Main
      action_definitions: []
      instructions: You are a knowledge-enabled assistant.
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                I can help you find information from our knowledge base.
                What would you like to know?
  surfaces: []
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! I can search our knowledge base for
      you.", "messageType": "Welcome"}, {"message": "An error occurred.",
      "messageType": "Error"}]'
