schema_version: '2.0'
global_configuration:
  developer_name: Edge_Cond_Before_Reasoning
  label: Edge Cond Before Reasoning
  description: Tests complex before_reasoning with multiple if/else, set, and run
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: test_user
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Welcome to support!
      message_type: Welcome
    - message: Something went wrong.
      message_type: Error
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Welcome to support!", "messageType": "Welcome"},
      {"message": "Something went wrong.", "messageType": "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: user_tier
      label: User Tier
      description: User Tier
      data_type: string
      is_list: false
      default: '''standard'''
      visibility: Internal
    - developer_name: is_verified
      label: Is Verified
      description: Is Verified
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: priority
      label: Priority
      description: Priority
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: greeting
      label: Greeting
      description: Greeting
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: needs_auth
      label: Needs Auth
      description: Needs Auth
      data_type: boolean
      is_list: false
      default: true
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                {{state.greeting}}

                How can I assist you today?'
      instructions: You are a support assistant with complex pre-processing logic.
      type: subagent
      reasoning_type: salesforce.default
      description: Complex before_reasoning with multiple conditionals and actions
      before_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.is_verified == False
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - needs_auth: 'True'
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - greeting: '"Please verify your identity."'
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (not (state.AgentScriptInternal_condition))
          state_updates:
            - needs_auth: 'False'
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (not (state.AgentScriptInternal_condition))
          state_updates:
            - greeting: '"Welcome back!"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.user_tier == "premium"
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - priority: '10'
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (not (state.AgentScriptInternal_condition))
          state_updates:
            - priority: '1'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.is_verified == True and state.user_tier
                == "premium"
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - greeting: '"Welcome back, valued premium member!"'
        - type: action
          target: check_auth
          bound_inputs:
            user_tier: state.user_tier
          llm_inputs: []
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - is_verified: result.verified
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      developer_name: main
      label: Main
      action_definitions:
        - developer_name: check_auth
          label: Check Auth
          description: Checks user authentication status
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: CheckAuth
          input_type:
            - developer_name: user_tier
              label: User Tier
              description: User Tier
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: verified
              label: Verified
              description: Verified
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
  surfaces: []
