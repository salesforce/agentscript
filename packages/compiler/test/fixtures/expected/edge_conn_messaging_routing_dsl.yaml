schema_version: '2.0'
global_configuration:
  developer_name: EdgeConnMessagingRouting
  label: Routing Messaging Agent
  description: Messaging connection with routing fields
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: routing_bot@example.com
  context_variables:
    - developer_name: EndUserId
      label: End User Id
      description: End user ID
      data_type: string
      field_mapping: MessagingSession.MessagingEndUserId
    - developer_name: RoutableId
      label: Routable Id
      description: Session ID
      data_type: string
      field_mapping: MessagingSession.Id
    - developer_name: ContactId
      label: Contact Id
      description: Contact ID
      data_type: string
      field_mapping: MessagingEndUser.ContactId
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! I'll connect you with the right team.
      message_type: Welcome
    - message: Something went wrong with routing.
      message_type: Error
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! I''ll connect you with the right team.",
      "messageType": "Welcome"}, {"message": "Something went wrong with routing.",
      "messageType": "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Determine the customer''s need and route appropriately.'
      instructions: You are a messaging agent with advanced routing configuration.
      type: subagent
      reasoning_type: salesforce.default
      description: Route messaging requests to appropriate teams
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"billing"'
          name: go_to_billing
          description: Route to billing support
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"technical"'
          name: go_to_technical
          description: Route to technical support
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '''__human__'''
          name: escalate_to_human
          description: Escalate to human agent
      after_all_tool_calls:
        - type: handoff
          target: billing
          enabled: state.AgentScriptInternal_next_topic=="billing"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: technical
          enabled: state.AgentScriptInternal_next_topic=="technical"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: __human__
          enabled: state.AgentScriptInternal_next_topic == '__human__'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: main
      label: Main
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Help the customer with billing questions.'
      instructions: You are a messaging agent with advanced routing configuration.
      type: subagent
      reasoning_type: salesforce.default
      description: Handle billing inquiries
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      developer_name: billing
      label: Billing
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Help the customer with technical issues.'
      instructions: You are a messaging agent with advanced routing configuration.
      type: subagent
      reasoning_type: salesforce.default
      description: Handle technical support
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      developer_name: technical
      label: Technical
      action_definitions: []
  surfaces:
    - surface_type: messaging
      adaptive_response_allowed: true
      outbound_route_configs: []
