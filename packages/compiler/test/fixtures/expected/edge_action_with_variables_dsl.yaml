schema_version: '2.0'
global_configuration:
  developer_name: EdgeActionWithVariables
  label: Edge Action With Variables
  description: Tests with clauses using @variables references
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: admin@example.com
  context_variables:
    - developer_name: customer_id
      label: Customer Id
      description: The customer ID from context
      data_type: string
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages: []
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: customer_name
      label: Customer Name
      description: The customer name
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: customer_email
      label: Customer Email
      description: The customer email
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: preferred_language
      label: Preferred Language
      description: Customer preferred language
      data_type: string
      is_list: false
      default: '''en_US'''
      visibility: Internal
    - developer_name: case_number
      label: Case Number
      description: Active case number
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: priority
      label: Priority
      description: Case priority
      data_type: string
      is_list: false
      default: '''medium'''
      visibility: Internal
    - developer_name: response
      label: Response
      description: Action response
      data_type: string
      is_list: false
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Help the customer with their request using their personal information.

                Create cases and send emails as needed.'
      instructions: You are a personalized service agent.
      type: subagent
      reasoning_type: salesforce.default
      description: Personalized service using variable references
      before_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: lookup_customer
          bound_inputs:
            customer_ref: variables.customer_id
          llm_inputs: []
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - customer_name: result.name
            - customer_email: result.email
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: create_case
          bound_inputs:
            customer_name: state.customer_name
            customer_email: state.customer_email
            customer_id: variables.customer_id
            priority: state.priority
            locale: state.preferred_language
          llm_inputs: []
          state_updates:
            - case_number: result.case_number
          name: create_case
          description: Create Case
        - type: action
          target: send_email
          bound_inputs:
            to_address: state.customer_email
          llm_inputs:
            - subject
            - body
          state_updates: []
          name: send_email
          description: Send Email
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '''__human__'''
          name: escalate_to_human
          description: Escalate to human agent
      after_all_tool_calls:
        - type: handoff
          target: __human__
          enabled: state.AgentScriptInternal_next_topic == '__human__'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: main
      label: Main
      action_definitions:
        - developer_name: lookup_customer
          label: Lookup Customer
          description: Look up customer by ID
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Lookup_Customer
          input_type:
            - developer_name: customer_ref
              label: Customer Ref
              description: Customer Ref
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: name
              label: Name
              description: Name
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: email
              label: Email
              description: Email
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: create_case
          label: Create Case
          description: Create a support case
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Create_Case
          input_type:
            - developer_name: customer_name
              label: Customer Name
              description: Customer Name
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: customer_email
              label: Customer Email
              description: Customer Email
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: customer_id
              label: Customer Id
              description: Customer Id
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: priority
              label: Priority
              description: Priority
              data_type: String
              is_list: false
              required: false
              is_user_input: false
            - developer_name: locale
              label: Locale
              description: Locale
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: case_number
              label: Case Number
              description: Case Number
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: send_email
          label: Send Email
          description: Send email to customer
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Send_Email
          input_type:
            - developer_name: to_address
              label: To Address
              description: To Address
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: subject
              label: Subject
              description: Subject
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: body
              label: Body
              description: Body
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: sent
              label: Sent
              description: Sent
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
  surfaces: []
