schema_version: '2.0'
global_configuration:
  developer_name: Circular_Topics_Agent
  label: Circular Topics Agent
  description: Agent with two topics that transition back and forth
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: user@test.com
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! I can help with sales or technical support.
      message_type: Welcome
    - message: An error occurred. Please try again.
      message_type: Error
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! I can help with sales or technical support.",
      "messageType": "Welcome"}, {"message": "An error occurred. Please try again.",
      "messageType": "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: current_topic
      label: Current Topic
      description: Tracks which topic is active
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Route the user to the appropriate topic.

                Sales and support work together to help the user.'
      instructions: You are a helpful sales and support agent.
      type: subagent
      reasoning_type: salesforce.default
      description: Agent with two topics that transition back and forth
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"sales"'
          name: go_to_sales
          description: Handle sales inquiries and product recommendations
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"support"'
          name: go_to_support
          description: Handle technical support questions
      after_all_tool_calls:
        - type: handoff
          target: sales
          enabled: state.AgentScriptInternal_next_topic=="sales"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: support
          enabled: state.AgentScriptInternal_next_topic=="support"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: main
      label: Main
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Help the user with sales inquiries.

                If they have a technical question about a product,

                transition to support. Support can send them back here.'
      instructions: You are a helpful sales and support agent.
      type: subagent
      reasoning_type: salesforce.default
      description: Handle sales inquiries and product recommendations
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"support"'
          name: go_to_support
          description: Handle technical support questions
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '''__human__'''
          name: escalate_to_human
          description: Escalate to a human agent
      after_all_tool_calls:
        - type: handoff
          target: support
          enabled: state.AgentScriptInternal_next_topic=="support"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: __human__
          enabled: state.AgentScriptInternal_next_topic == '__human__'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: sales
      label: Sales
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Help the user with technical support.

                If they want to purchase a product or upgrade,

                transition back to sales.'
      instructions: You are a helpful sales and support agent.
      type: subagent
      reasoning_type: salesforce.default
      description: Handle technical support questions
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"sales"'
          name: go_to_sales
          description: Handle sales inquiries and product recommendations
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '''__human__'''
          name: escalate_to_human
          description: Escalate to a human agent
      after_all_tool_calls:
        - type: handoff
          target: sales
          enabled: state.AgentScriptInternal_next_topic=="sales"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: __human__
          enabled: state.AgentScriptInternal_next_topic == '__human__'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: support
      label: Support
      action_definitions: []
  surfaces: []
