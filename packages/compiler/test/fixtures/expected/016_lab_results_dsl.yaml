schema_version: '2.0'
global_configuration:
  developer_name: lab_results_agent_v16
  label: Lab Results Agent V 16
  description: Assists users with lab management through the lab results coordinator
    workflow.
  enable_enhanced_event_logs: true
  agent_type: EinsteinServiceAgent
  default_agent_user: lab_results@example.com
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! I am your Lab Results Coordinator Assistant. How can I help
        you today?
      message_type: Welcome
    - message: I apologize, something went wrong on my end. Could you please rephrase
        your request?
      message_type: Error
  modality_parameters:
    language:
      default_locale: en_US
      additional_locales: []
      all_additional_locales: false
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! I am your Lab Results Coordinator Assistant.
      How can I help you today?", "messageType": "Welcome"}, {"message": "I apologize,
      something went wrong on my end. Could you please rephrase your request?", "messageType":
      "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: lab_record_id
      label: Lab Record Id
      description: Record ID of the lab
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: lab_status
      label: Lab Status
      description: Current status of the lab
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: lab_tier
      label: Lab Tier
      description: Tier classification for the lab
      data_type: string
      is_list: false
      default: '''standard'''
      visibility: Internal
    - developer_name: lab_category
      label: Lab Category
      description: Category of the lab
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: contact_name
      label: Contact Name
      description: Full name of the contact
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: contact_email
      label: Contact Email
      description: Email address of the contact
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: contact_phone
      label: Contact Phone
      description: Phone number of the contact
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: is_verified
      label: Is Verified
      description: Whether the user identity is verified
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: eligibility_score
      label: Eligibility Score
      description: Calculated eligibility score
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: step_counter
      label: Step Counter
      description: Current step in the process
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: attempt_count
      label: Attempt Count
      description: Number of attempts made
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: total_items_count
      label: Total Items Count
      description: Total number of items to process
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: sample_tracking_complete
      label: Sample Tracking Complete
      description: Whether the sample_tracking stage is complete
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: sample_tracking_result
      label: Sample Tracking Result
      description: Result from the sample_tracking stage
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: result_processing_complete
      label: Result Processing Complete
      description: Whether the result_processing stage is complete
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: result_processing_result
      label: Result Processing Result
      description: Result from the result_processing stage
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: notification_complete
      label: Notification Complete
      description: Whether the notification stage is complete
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: notification_result
      label: Notification Result
      description: Result from the notification stage
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: archival_complete
      label: Archival Complete
      description: Whether the archival stage is complete
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: archival_result
      label: Archival Result
      description: Result from the archival stage
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: priority_level
      label: Priority Level
      description: Priority level of the request
      data_type: string
      is_list: false
      default: '''normal'''
      visibility: Internal
    - developer_name: notes_text
      label: Notes Text
      description: Notes and comments
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: assigned_agent
      label: Assigned Agent
      description: Assigned agent name
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: resolution_summary
      label: Resolution Summary
      description: Summary of the resolution
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: escalation_requested
      label: Escalation Requested
      description: Whether escalation was requested
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: is_business_hours
      label: Is Business Hours
      description: Whether it is currently business hours
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: case_ref_number
      label: Case Ref Number
      description: Reference number for the support case
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: next_available_slot
      label: Next Available Slot
      description: Next available time slot
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
  initial_node: topic_selector
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                You are a topic selector for a lab results coordinator assistant.

                Analyze the user''s input and determine the most appropriate topic.

                Current lab status: {{state.lab_status}}

                Eligibility score: {{state.eligibility_score}}

                Steps completed: {{state.step_counter}}

                Priority: {{state.priority_level}}

                Use action.go_to_sample_tracking for sample tracking requests.

                Use action.go_to_result_processing for result processing requests.

                Use action.go_to_notification for notification requests.

                Use action.go_to_archival for archival requests.

                Use action.go_to_escalation to escalate if the user is upset or requests
                a human.'
      instructions: 'You are a professional lab results coordinator assistant.

        Help users manage their lab requests efficiently and accurately.

        Always verify the user''s identity before proceeding with sensitive operations.

        Follow the established workflow: sample_tracking -> result_processing -> notification
        -> archival.

        Be concise, professional, and confirm next steps at the end of each exchange.

        If the user is upset or asks for a human, escalate immediately.

        Never reveal internal record IDs or system identifiers to the user.'
      type: subagent
      reasoning_type: salesforce.default
      description: Welcome the user and route to the appropriate lab management topic
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"sample_tracking"'
          name: go_to_sample_tracking
          description: Transition to sample tracking topic.
        - type: action
          target: __state_update_action__
          enabled: state.is_verified == True
          state_updates:
            - AgentScriptInternal_next_topic: '"result_processing"'
          name: go_to_result_processing
          description: Transition to result processing topic.
        - type: action
          target: __state_update_action__
          enabled: state.is_verified == True
          state_updates:
            - AgentScriptInternal_next_topic: '"notification"'
          name: go_to_notification
          description: Transition to notification topic.
        - type: action
          target: __state_update_action__
          enabled: state.is_verified == True
          state_updates:
            - AgentScriptInternal_next_topic: '"archival"'
          name: go_to_archival
          description: Transition to archival topic.
        - type: action
          target: __state_update_action__
          enabled: state.is_verified == True
          state_updates:
            - AgentScriptInternal_next_topic: '"escalation_handling"'
          name: go_to_escalation
          description: Escalate to a human agent for assistance.
      after_all_tool_calls:
        - type: handoff
          target: sample_tracking
          enabled: state.AgentScriptInternal_next_topic=="sample_tracking"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: result_processing
          enabled: state.AgentScriptInternal_next_topic=="result_processing"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: notification
          enabled: state.AgentScriptInternal_next_topic=="notification"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: archival
          enabled: state.AgentScriptInternal_next_topic=="archival"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: escalation_handling
          enabled: state.AgentScriptInternal_next_topic=="escalation_handling"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: topic_selector
      label: Topic Selector
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Handle the sample tracking stage for the lab.

                Current lab status: {{state.lab_status}}

                Step {{state.step_counter + 1}} of the process.

                Attempts so far: {{state.attempt_count}}

                Contact: {{state.contact_name}} ({{state.contact_email}})

                Sample Tracking result: {{state.sample_tracking_result}}

                Priority level: {{state.priority_level}}

                Current tier: {{state.lab_tier}}

                If the contact information is missing, ask the user to provide their
                name and email.

                After collecting information, use action.run_sample_tracking to begin
                processing.'
      instructions: 'You are a professional lab results coordinator assistant.

        Help users manage their lab requests efficiently and accurately.

        Always verify the user''s identity before proceeding with sensitive operations.

        Follow the established workflow: sample_tracking -> result_processing -> notification
        -> archival.

        Be concise, professional, and confirm next steps at the end of each exchange.

        If the user is upset or asks for a human, escalate immediately.

        Never reveal internal record IDs or system identifiers to the user.'
      type: subagent
      reasoning_type: salesforce.default
      description: Handles the sample tracking stage of the lab process
      before_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.is_verified == False
        - type: action
          target: validate_sample_tracking_info
          bound_inputs:
            record_ref: state.lab_record_id
            contact_ref: state.contact_email
          llm_inputs: []
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - lab_status: result.updated_status
            - is_verified: result.is_valid
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: process_sample_tracking_data
          bound_inputs:
            record_ref: state.lab_record_id
            step_num: state.step_counter
            category_val: state.lab_category
          llm_inputs: []
          state_updates:
            - sample_tracking_result: result.result_code
            - eligibility_score: result.score_value
            - sample_tracking_complete: result.is_passed
          name: run_sample_tracking
          description: Run Sample Tracking
        - type: action
          target: fetch_sample_tracking_details
          bound_inputs:
            record_ref: state.lab_record_id
            include_history: 'False'
          llm_inputs: []
          state_updates:
            - total_items_count: result.item_count
            - lab_tier: result.tier_value
          name: fetch_sample_tracking_info
          description: Fetch Sample Tracking Info
        - type: action
          target: __state_update_action__
          enabled: state.sample_tracking_complete == True and state.eligibility_score
            >= 50
          state_updates:
            - AgentScriptInternal_next_topic: '"result_processing"'
          name: go_to_result_processing
          description: Move to result processing stage.
        - type: action
          target: __state_update_action__
          enabled: state.escalation_requested == True
          state_updates:
            - AgentScriptInternal_next_topic: '"escalation_handling"'
          name: escalate_now
          description: Escalate if issues arise.
      after_all_tool_calls:
        - type: handoff
          target: result_processing
          enabled: state.AgentScriptInternal_next_topic=="result_processing"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: escalation_handling
          enabled: state.AgentScriptInternal_next_topic=="escalation_handling"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      after_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - step_counter: state.step_counter + 1
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - attempt_count: state.attempt_count + 1
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.eligibility_score >= 70
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - lab_tier: '"premium"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.eligibility_score >= 40 and state.eligibility_score
                < 70
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - lab_tier: '"standard"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.eligibility_score < 40
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - lab_tier: '"basic"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.attempt_count >= 3 and state.sample_tracking_complete
                == False
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - priority_level: '"high"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.attempt_count >= 5
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - escalation_requested: 'True'
      developer_name: sample_tracking
      label: Sample Tracking
      action_definitions:
        - developer_name: process_sample_tracking_data
          label: Process Sample Tracking Data
          description: Process sample tracking stage data for the lab
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Process_SampleTracking_Data
          input_type:
            - developer_name: record_ref
              label: Record Ref
              description: Record Ref
              data_type: String
              is_list: false
              required: false
              is_user_input: false
            - developer_name: step_num
              label: Step Num
              description: Step Num
              data_type: Double
              is_list: false
              required: false
              is_user_input: false
            - developer_name: category_val
              label: Category Val
              description: Category Val
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: result_code
              label: Result Code
              description: Result Code
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: result_message
              label: Result Message
              description: Result Message
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: score_value
              label: Score Value
              description: Score Value
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: is_passed
              label: Is Passed
              description: Is Passed
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: validate_sample_tracking_info
          label: Validate Sample Tracking Info
          description: Validate sample tracking information for the lab
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Validate_SampleTracking_Info
          input_type:
            - developer_name: record_ref
              label: Record Ref
              description: Record Ref
              data_type: String
              is_list: false
              required: false
              is_user_input: false
            - developer_name: contact_ref
              label: Contact Ref
              description: Contact Ref
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: is_valid
              label: Is Valid
              description: Is Valid
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: error_msg
              label: Error Msg
              description: Error Msg
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: updated_status
              label: Updated Status
              description: Updated Status
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: fetch_sample_tracking_details
          label: Fetch Sample Tracking Details
          description: Fetch sample tracking details for the lab
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Fetch_SampleTracking_Details
          input_type:
            - developer_name: record_ref
              label: Record Ref
              description: Record Ref
              data_type: String
              is_list: false
              required: false
              is_user_input: false
            - developer_name: include_history
              label: Include History
              description: Include History
              data_type: Boolean
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: detail_data
              label: Detail Data
              description: Detail Data
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: item_count
              label: Item Count
              description: Item Count
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: tier_value
              label: Tier Value
              description: Tier Value
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: last_updated
              label: Last Updated
              description: Last Updated
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Handle the result processing stage for the lab.

                Current lab status: {{state.lab_status}}

                Step {{state.step_counter + 1}} of the process.

                Attempts so far: {{state.attempt_count}}

                Contact: {{state.contact_name}} ({{state.contact_email}})

                Result Processing result: {{state.result_processing_result}}

                Priority level: {{state.priority_level}}

                Current tier: {{state.lab_tier}}

                Review the result processing results and determine next steps.

                Eligibility score: {{state.eligibility_score}}

                If the score is sufficient, proceed to the next stage.

                If the user has concerns, address them before proceeding.'
      instructions: 'You are a professional lab results coordinator assistant.

        Help users manage their lab requests efficiently and accurately.

        Always verify the user''s identity before proceeding with sensitive operations.

        Follow the established workflow: sample_tracking -> result_processing -> notification
        -> archival.

        Be concise, professional, and confirm next steps at the end of each exchange.

        If the user is upset or asks for a human, escalate immediately.

        Never reveal internal record IDs or system identifiers to the user.'
      type: subagent
      reasoning_type: salesforce.default
      description: Handles the result processing stage of the lab process
      before_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.attempt_count > 5
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - escalation_requested: 'True'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.sample_tracking_complete == False
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - AgentScriptInternal_next_topic: '"sample_tracking"'
        - type: handoff
          target: sample_tracking
          enabled: state.AgentScriptInternal_next_topic=="sample_tracking"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: process_result_processing_data
          bound_inputs:
            record_ref: state.lab_record_id
            step_num: state.step_counter
            category_val: state.lab_category
          llm_inputs: []
          state_updates:
            - result_processing_result: result.result_code
            - eligibility_score: result.score_value
            - result_processing_complete: result.is_passed
          name: run_result_processing
          description: Run Result Processing
        - type: action
          target: fetch_result_processing_details
          bound_inputs:
            record_ref: state.lab_record_id
            include_history: 'False'
          llm_inputs: []
          enabled: state.lab_record_id is not None
          state_updates:
            - total_items_count: result.item_count
            - lab_tier: result.tier_value
          name: fetch_result_processing_info
          description: Fetch Result Processing Info
