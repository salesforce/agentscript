schema_version: '2.0'
global_configuration:
  developer_name: Order_Tracking_Assistant_v1
  label: Order Tracking Assistant V 1
  description: Assists customers with order tracking, delivery updates, shipping issues,
    returns processing, and provides comprehensive order management support.
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: defaultagentuser@example.com
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! I'm here to help you track your orders, check delivery status,
        and assist with any shipping or return questions. Please provide your order
        number or email address to get started.
      message_type: Welcome
    - message: I'm having trouble accessing the order system right now. Please try
        again in a moment or contact customer service directly.
      message_type: Error
  modality_parameters:
    language:
      default_locale: en_US
      additional_locales: []
      all_additional_locales: false
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! I''m here to help you track your orders,
      check delivery status, and assist with any shipping or return questions. Please
      provide your order number or email address to get started.", "messageType":
      "Welcome"}, {"message": "I''m having trouble accessing the order system right
      now. Please try again in a moment or contact customer service directly.", "messageType":
      "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: customer_email
      label: Customer Email
      description: Customer's email address
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: customer_verified
      label: Customer Verified
      description: Whether customer identity has been verified
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: customer_name
      label: Customer Name
      description: Customer's name from lookup
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: customer_id
      label: Customer Id
      description: Internal customer ID
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: order_number
      label: Order Number
      description: Order number provided by customer
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: order_found
      label: Order Found
      description: Whether order was successfully found
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: order_status
      label: Order Status
      description: Current order status
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: order_total
      label: Order Total
      description: Order total amount
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: tracking_number
      label: Tracking Number
      description: Shipping tracking number
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: delivery_date
      label: Delivery Date
      description: Expected delivery date
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: shipping_address
      label: Shipping Address
      description: Shipping address
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: issue_type
      label: Issue Type
      description: Type of shipping issue reported
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: return_eligible
      label: Return Eligible
      description: Whether order is eligible for return
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: case_number
      label: Case Number
      description: Support case number for issues
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
  initial_node: order_locator
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Welcome! I''m here to help you with your order.


                To locate your order, I can search by:

                1. Order number (fastest option)

                2. Email address used for the order


                Which would you prefer to use? Please provide either your order number
                or the email address you used when placing the order.'
      instructions: You are an order tracking and fulfillment assistant for an e-commerce
        platform. Your role is to help customers track their orders, resolve shipping
        issues, process returns, and provide real-time updates on order status and
        delivery information.
      type: subagent
      reasoning_type: salesforce.default
      description: Locates and validates customer order information by order number
        or email address
      before_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.order_number == "" and state.customer_email
                == ""
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - order_found: 'False'
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - customer_verified: 'False'
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: Get_Customer_Info
          bound_inputs:
            email: state.customer_email
          llm_inputs: []
          state_updates:
            - customer_verified: result.customer_found
            - customer_name: result.customer_name
            - customer_id: result.customer_id
          name: lookup_customer
          description: Lookup Customer
        - type: action
          target: Find_Order_By_Number
          bound_inputs:
            order_number: state.order_number
            customer_id: state.customer_id
          llm_inputs: []
          state_updates:
            - order_found: result.order_found
          name: find_order
          description: Find Order
        - type: action
          target: __state_update_action__
          bound_inputs: {}
          llm_inputs: []
          state_updates:
            - order_number: state.order_number
            - customer_email: state.customer_email
          name: capture_order_info
          description: Capture order search information from customer
          input_parameters: []
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"order_details"'
          name: show_order_details
          description: Show detailed order information
      after_all_tool_calls:
        - type: handoff
          target: order_details
          enabled: state.AgentScriptInternal_next_topic=="order_details"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      after_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.customer_email != ""
        - type: action
          target: Get_Customer_Info
          bound_inputs:
            email: state.customer_email
          llm_inputs: []
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - customer_verified: result.customer_found
            - customer_name: result.customer_name
            - customer_id: result.customer_id
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.order_number != ""
        - type: action
          target: Find_Order_By_Number
          bound_inputs:
            order_number: state.order_number
            customer_id: state.customer_id
          llm_inputs: []
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - order_found: result.order_found
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.order_found or state.customer_verified
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - AgentScriptInternal_next_topic: '"order_details"'
        - type: handoff
          target: order_details
          enabled: state.AgentScriptInternal_next_topic=="order_details"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: order_locator
      label: Order Locator
      action_definitions:
        - developer_name: Get_Customer_Info
          label: Get Customer Info
          description: Retrieves customer information using email address
          require_user_confirmation: false
          include_in_progress_indicator: true
          invocation_target_type: flow
          invocation_target_name: GetCustomerInfo
          input_type:
            - developer_name: email
              label: Email Address
              description: Customer's email address
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: customer_found
              label: Customer Found
              description: Customer Found
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: customer_name
              label: Customer Name
              description: Customer Name
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: true
            - developer_name: customer_id
              label: Customer ID
              description: Customer Id
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: verified
              label: Customer Verified
              description: Verified
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: Find_Order_By_Number
          label: Find Order
          description: Locates order using order number
          require_user_confirmation: false
          include_in_progress_indicator: true
          invocation_target_type: flow
          invocation_target_name: FindOrderByNumber
          input_type:
            - developer_name: order_number
              label: Order Number
              description: Customer's order number
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: customer_id
              label: Customer ID
              description: Customer identifier for validation
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: order_found
              label: Order Found
              description: Order Found
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: order_data
              label: Order Data
              description: Order Data
              data_type: LightningTypes
              complex_data_type_name: lightning__objectType
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: valid_customer
              label: Valid Customer
              description: Valid Customer
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Great! I found your order. Here are the current details:


                **Order Information:**

                - Customer: {{state.customer_name}}

                - Order Number: {{state.order_number}}

                - Order Status: {{state.order_status}}

                - Order Total: ${{state.order_total}}


                **Shipping Details:**

                - Tracking Number: {{state.tracking_number}}

                - Expected Delivery: {{state.delivery_date}}

                - Shipping Address: {{state.shipping_address}}


                Would you like me to:

                1. Get real-time tracking updates

                2. Help with a return or exchange

                3. Report a shipping issue

                4. Look up another order'
      instructions: You are an order tracking and fulfillment assistant for an e-commerce
        platform. Your role is to help customers track their orders, resolve shipping
        issues, process returns, and provide real-time updates on order status and
        delivery information.
      type: subagent
      reasoning_type: salesforce.default
      description: Shows detailed order information including status, tracking, and
        delivery updates
      before_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.order_found and state.order_status
                == ""
        - type: action
          target: Get_Order_Details
          bound_inputs:
            order_number: state.order_number
            customer_id: state.customer_id
          llm_inputs: []
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - order_status: result.order_status
            - tracking_number: result.tracking_number
            - delivery_date: result.delivery_date
            - order_total: result.order_total
            - shipping_address: result.shipping_address
            - return_eligible: result.return_eligible
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: Get_Order_Details
          bound_inputs:
            order_number: state.order_number
            customer_id: state.customer_id
          llm_inputs: []
          state_updates:
            - order_status: result.order_status
            - tracking_number: result.tracking_number
            - delivery_date: result.delivery_date
            - order_total: result.order_total
            - shipping_address: result.shipping_address
            - return_eligible: result.return_eligible
          name: load_order_details
          description: Load Order Details
        - type: action
          target: Get_Tracking_Updates
          bound_inputs:
            tracking_number: state.tracking_number
          llm_inputs: []
          state_updates:
            - delivery_date: result.updated_delivery_date
          name: get_live_tracking
          description: Get Live Tracking
        - type: action
          target: __state_update_action__
          bound_inputs: {}
          llm_inputs: []
          state_updates:
            - issue_type: state.issue_type
          name: capture_next_action
          description: Capture customer's next requested action
          input_parameters: []
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"issue_resolver"'
          name: handle_issue
          description: Handle shipping issues or returns
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"order_locator"'
          name: search_another
          description: Search for another order
      after_all_tool_calls:
        - type: handoff
          target: issue_resolver
          enabled: state.AgentScriptInternal_next_topic=="issue_resolver"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: order_locator
          enabled: state.AgentScriptInternal_next_topic=="order_locator"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      after_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.tracking_number != ""
        - type: action
          target: Get_Tracking_Updates
          bound_inputs:
            tracking_number: state.tracking_number
          llm_inputs: []
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - delivery_date: result.updated_delivery_date
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.issue_type != ""
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - AgentScriptInternal_next_topic: '"issue_resolver"'
        - type: handoff
          target: issue_resolver
          enabled: state.AgentScriptInternal_next_topic=="issue_resolver"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: order_details
      label: Order Details
      action_definitions:
        - developer_name: Get_Order_Details
          label: Get Order Details
          description: Retrieves comprehensive order information
          require_user_confirmation: false
          include_in_progress_indicator: true
          invocation_target_type: flow
          invocation_target_name: GetOrderDetails
          input_type:
            - developer_name: order_number
              label: Order Number
              description: Order identifier
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: customer_id
              label: Customer ID
              description: Customer identifier
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: order_status
              label: Order Status
              description: Order Status
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: true
            - developer_name: tracking_number
              label: Tracking Number
              description: Tracking Number
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: true
            - developer_name: delivery_date
              label: Delivery Date
              description: Delivery Date
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: true
            - developer_name: order_total
              label: Order Total
              description: Order Total
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: true
            - developer_name: shipping_address
              label: Shipping Address
              description: Shipping Address
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: true
            - developer_name: return_eligible
              label: Return Eligible
              description: Return Eligible
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: Get_Tracking_Updates
          label: Get Tracking Updates
          description: Gets real-time tracking updates from shipping carrier
          require_user_confirmation: false
          include_in_progress_indicator: true
          invocation_target_type: flow
          invocation_target_name: GetTrackingUpdates
          input_type:
            - developer_name: tracking_number
              label: Tracking Number
              description: Shipping tracking number
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: current_status
              label: Current Status
              description: Current Status
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: true
            - developer_name: location
              label: Current Location
              description: Location
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: true
            - developer_name: updated_delivery_date
              label: Updated Delivery Date
              description: Updated Delivery Date
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: true
            - developer_name: delivery_attempts
              label: Delivery Attempts
              description: Delivery Attempts
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: true
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                I understand you''re having an issue with your order. Let me help
                you resolve this.


                **Issue Type:** {{state.issue_type}}

                **Order:** {{state.order_number}}

                **Return Eligible:** {{state.return_eligible}}


                Based on your issue, I can help you with:

                - Processing a return or exchange (if eligible)

                - Reporting shipping delays or damage

                - Contacting the carrier for delivery updates

                - Escalating to our customer service team


                What specific assistance do you need?'
      instructions: You are an order tracking and fulfillment assistant for an e-commerce
        platform. Your role is to help customers track their orders, resolve shipping
        issues, process returns, and provide real-time updates on order status and
        delivery information.
      type: subagent
      reasoning_type: salesforce.default
      description: Handles shipping issues, returns, and customer concerns
      before_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.issue_type == "return" and state.return_eligible
                == False
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - return_eligible: 'True'
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: Process_Return_Request
          bound_inputs:
            order_number: state.order_number
            return_reason: state.issue_type
            customer_id: state.customer_id
          llm_inputs: []
          state_updates:
            - return_eligible: result.return_authorized
          name: initiate_return
          description: Initiate Return
        - type: action
          target: Report_Shipping_Issue
          bound_inputs:
            tracking_number: state.tracking_number
            issue_description: state.issue_type
            customer_id: state.customer_id
          llm_inputs: []
          state_updates:
            - case_number: result.case_number
          name: report_issue
          description: Report Issue
        - type: action
          target: __state_update_action__
          bound_inputs: {}
          llm_inputs: []
          state_updates:
            - issue_type: state.issue_type
          name: capture_resolution_action
          description: Capture resolution action details
          input_parameters: []
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"order_details"'
          name: back_to_order
          description: Return to order details
      after_all_tool_calls:
        - type: handoff
          target: order_details
          enabled: state.AgentScriptInternal_next_topic=="order_details"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      after_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.issue_type == "return" and state.return_eligible
        - type: action
          target: Process_Return_Request
          bound_inputs:
            order_number: state.order_number
            return_reason: state.issue_type
            customer_id: state.customer_id
          llm_inputs: []
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates: []
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.issue_type == "shipping_delay"
                or state.issue_type == "damaged"
        - type: action
          target: Report_Shipping_Issue
          bound_inputs:
            tracking_number: state.tracking_number
            issue_description: state.issue_type
