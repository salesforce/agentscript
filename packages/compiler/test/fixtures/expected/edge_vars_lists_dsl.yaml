schema_version: '2.0'
global_configuration:
  developer_name: List_Vars_Agent
  label: List Vars Agent
  description: Agent focused on list variable types
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages: []
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: tags
      label: Tags
      description: List of tag strings
      data_type: string
      is_list: true
      visibility: Internal
    - developer_name: scores
      label: Scores
      description: List of numeric scores
      data_type: number
      is_list: true
      visibility: Internal
    - developer_name: flags
      label: Flags
      description: List of boolean flags
      data_type: boolean
      is_list: true
      visibility: Internal
    - developer_name: records
      label: Records
      description: List of object records
      data_type: object
      is_list: true
      visibility: Internal
    - developer_name: categories
      label: Categories
      description: List of category names
      data_type: string
      is_list: true
      visibility: Internal
    - developer_name: weights
      label: Weights
      description: List of weight values
      data_type: number
      is_list: true
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Handle list data for tags, scores, and records'
      instructions: You are an agent for testing list variable types.
      type: subagent
      reasoning_type: salesforce.default
      description: Process list variables
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      developer_name: main
      label: Main
      action_definitions: []
  surfaces: []
