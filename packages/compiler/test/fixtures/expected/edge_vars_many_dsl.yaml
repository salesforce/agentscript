schema_version: "2.0"
global_configuration:
  developer_name: Many_Vars_Agent
  label: Many Vars Agent
  description: Agent with many state variables
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages: []
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: "''"
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: first_name
      label: First Name
      description: Customer first name
      data_type: string
      is_list: false
      visibility: Internal
      default: "''"
    - developer_name: last_name
      label: Last Name
      description: Customer last name
      data_type: string
      is_list: false
      visibility: Internal
      default: "''"
    - developer_name: email
      label: Email
      description: Customer email
      data_type: string
      is_list: false
      visibility: Internal
      default: "''"
    - developer_name: phone
      label: Phone
      description: Customer phone number
      data_type: string
      is_list: false
      visibility: Internal
      default: "''"
    - developer_name: account_id
      label: Account Id
      description: Account identifier
      data_type: string
      is_list: false
      visibility: Internal
      default: "''"
    - developer_name: case_id
      label: Case Id
      description: Case identifier
      data_type: string
      is_list: false
      visibility: Internal
      default: "''"
    - developer_name: order_id
      label: Order Id
      description: Order identifier
      data_type: string
      is_list: false
      visibility: Internal
      default: "''"
    - developer_name: product_name
      label: Product Name
      description: Product name
      data_type: string
      is_list: false
      visibility: Internal
      default: "''"
    - developer_name: category
      label: Category
      description: Issue category
      data_type: string
      is_list: false
      visibility: Internal
      default: "''"
    - developer_name: priority
      label: Priority
      description: Issue priority
      data_type: string
      is_list: false
      visibility: Internal
      default: "'Medium'"
    - developer_name: status
      label: Status
      description: Case status
      data_type: string
      is_list: false
      visibility: Internal
      default: "'Open'"
    - developer_name: amount
      label: Amount
      description: Transaction amount
      data_type: number
      is_list: false
      visibility: Internal
      default: 0
    - developer_name: quantity
      label: Quantity
      description: Item quantity
      data_type: number
      is_list: false
      visibility: Internal
      default: 1
    - developer_name: discount
      label: Discount
      description: Applied discount
      data_type: number
      is_list: false
      visibility: Internal
      default: 0
    - developer_name: is_vip
      label: Is Vip
      description: VIP customer flag
      data_type: boolean
      is_list: false
      visibility: Internal
      default: false
    - developer_name: is_resolved
      label: Is Resolved
      description: Resolution flag
      data_type: boolean
      is_list: false
      visibility: Internal
      default: false
    - developer_name: is_escalated
      label: Is Escalated
      description: Escalation flag
      data_type: boolean
      is_list: false
      visibility: Internal
      default: false
    - developer_name: notes
      label: Notes
      description: Agent notes
      data_type: string
      is_list: false
      visibility: Internal
      default: "''"
    - developer_name: resolution
      label: Resolution
      description: Resolution description
      data_type: string
      is_list: false
      visibility: Internal
      default: "''"
    - developer_name: tags
      label: Tags
      description: Issue tags
      data_type: string
      is_list: true
      visibility: Internal
    - developer_name: history
      label: History
      description: Interaction history
      data_type: object
      is_list: true
      visibility: Internal
    - developer_name: metadata
      label: Metadata
      description: Additional metadata
      data_type: object
      is_list: false
      visibility: Internal
  initial_node: main
  nodes:
    - type: subagent
      reasoning_type: salesforce.default
      description: Handle customer with many variables
      tools: []
      developer_name: main
      label: Main
      action_definitions: []
      instructions: You are a customer service agent with many state variables.
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                Identify the customer and help them with their request
  surfaces: []
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
