schema_version: '2.0'
global_configuration:
  developer_name: Edge_Escalation_Basic
  label: Edge Escalation Basic
  description: Tests basic @utils.escalate in reasoning actions
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: test_user
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! How can I help?
      message_type: Welcome
    - message: An error occurred.
      message_type: Error
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! How can I help?", "messageType": "Welcome"},
      {"message": "An error occurred.", "messageType": "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                I''m here to help. If you need a human agent, I can transfer you.'
      instructions: You are a support assistant that can escalate to human agents.
      type: subagent
      reasoning_type: salesforce.default
      description: Main topic with escalation option
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '''__human__'''
          name: escalate_to_human
          description: Escalate to a human agent
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"faq"'
          name: go_to_faq
          description: Frequently asked questions
      after_all_tool_calls:
        - type: handoff
          target: __human__
          enabled: state.AgentScriptInternal_next_topic == '__human__'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: faq
          enabled: state.AgentScriptInternal_next_topic=="faq"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: main
      label: Main
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Here are some common questions I can help with.'
      instructions: You are a support assistant that can escalate to human agents.
      type: subagent
      reasoning_type: salesforce.default
      description: Frequently asked questions
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      developer_name: faq
      label: Faq
      action_definitions: []
  surfaces: []
