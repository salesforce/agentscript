schema_version: "2.0"
global_configuration:
  developer_name: Hyperclassifier_Actions
  label: Hyperclassifier Actions
  description: Hyperclassifier start_agent with standardInvocableAction actions and knowledge
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables: []
  default_agent_user: defaultagentuser@example.com
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! I can search our knowledge base and help with common tasks.
      message_type: Welcome
    - message: Sorry, I encountered an error.
      message_type: Error
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: "''"
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: search_result
      label: Search Result
      description: Result from knowledge search
      data_type: string
      is_list: false
      visibility: Internal
      default: "''"
    - developer_name: case_id
      label: Case Id
      description: Support case identifier
      data_type: string
      is_list: false
      visibility: Internal
      default: "''"
  initial_node: topic_selector
  nodes:
    - model_configuration:
        model_ref: sfdc_ai__DefaultEinsteinHyperClassifier
      type: router
      description: Routes with knowledge search and inline actions
      instructions: |-
        You are an AI assistant with knowledge search and inline actions on the start_agent.

        {{state.AgentScriptInternal_agent_instructions}}
      tools:
        - name: go_detailed_support
          target: detailed_support
          description: Route to detailed support
        - name: go_self_service
          target: self_service
          description: Route to self-service
      developer_name: topic_selector
      label: Topic Selector
      action_definitions:
        - developer_name: knowledge_search
          label: Knowledge Search
          description: Searches the knowledge base for relevant information
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: standardInvocableAction
          invocation_target_name: searchKnowledge
          input_type:
            - developer_name: query
              label: Query
              description: Query
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: result
              label: Result
              description: Result
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: create_quick_case
          label: Create Quick Case
          description: Creates a quick support case from the router
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: standardInvocableAction
          invocation_target_name: createCase
          input_type:
            - developer_name: subject
              label: Subject
              description: Subject
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: details
              label: Details
              description: Details
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: priority
              label: Priority
              description: Priority
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: case_id
              label: Case Id
              description: Case Id
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: case_number
              label: Case Number
              description: Case Number
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                Route the user to the best topic based on their intent.
    - type: subagent
      reasoning_type: salesforce.default
      description: Provides detailed support with agent assistance
      tools: []
      developer_name: detailed_support
      label: Detailed Support
      action_definitions: []
      instructions: You are an AI assistant with knowledge search and inline actions on the start_agent.
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                Provide detailed support for the user's issue.
                Reference any knowledge base results found during routing.
    - type: subagent
      reasoning_type: salesforce.default
      description: Guides users through self-service options
      tools: []
      developer_name: self_service
      label: Self Service
      action_definitions: []
      instructions: You are an AI assistant with knowledge search and inline actions on the start_agent.
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                Guide the user through self-service options.
                Provide step-by-step instructions based on knowledge base articles.
  surfaces: []
  modality_parameters:
    language:
      default_locale: en_US
      additional_locales: []
      all_additional_locales: false
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! I can search our knowledge base and help with common tasks.", "messageType": "Welcome"}, {"message": "Sorry, I encountered an error.", "messageType": "Error"}]'
