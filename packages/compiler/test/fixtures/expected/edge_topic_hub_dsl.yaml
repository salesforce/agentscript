schema_version: '2.0'
global_configuration:
  developer_name: Hub_Topics_Agent
  label: Hub Topics Agent
  description: Hub agent that routes to many specialized topics
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: user@test.com
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! How can I help you today?
      message_type: Welcome
    - message: An error occurred. Please try again.
      message_type: Error
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! How can I help you today?", "messageType":
      "Welcome"}, {"message": "An error occurred. Please try again.", "messageType":
      "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                You are a central routing agent. Determine the user''s need

                and route them to the appropriate specialized topic.'
      instructions: You are a central routing agent for customer service.
      type: subagent
      reasoning_type: salesforce.default
      description: Hub agent that routes to many specialized topics
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"orders"'
          name: go_to_orders
          description: Handle order-related inquiries
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"payments"'
          name: go_to_payments
          description: Handle payment-related inquiries
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"shipping"'
          name: go_to_shipping
          description: Handle shipping-related inquiries
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"returns"'
          name: go_to_returns
          description: Handle return requests
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"account"'
          name: go_to_account
          description: Handle account management
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"promotions"'
          name: go_to_promotions
          description: Handle promotions and discounts
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '''__human__'''
          name: escalate_to_human
          description: Escalate to a human agent
      after_all_tool_calls:
        - type: handoff
          target: orders
          enabled: state.AgentScriptInternal_next_topic=="orders"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: payments
          enabled: state.AgentScriptInternal_next_topic=="payments"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: shipping
          enabled: state.AgentScriptInternal_next_topic=="shipping"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: returns
          enabled: state.AgentScriptInternal_next_topic=="returns"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: account
          enabled: state.AgentScriptInternal_next_topic=="account"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: promotions
          enabled: state.AgentScriptInternal_next_topic=="promotions"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: __human__
          enabled: state.AgentScriptInternal_next_topic == '__human__'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: main
      label: Main
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

