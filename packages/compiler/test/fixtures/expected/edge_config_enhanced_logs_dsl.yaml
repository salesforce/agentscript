schema_version: '2.0'
global_configuration:
  developer_name: Enhanced_Logs_Agent
  label: Enhanced Logs Agent
  description: Agent with enhanced event logging enabled
  enable_enhanced_event_logs: true
  agent_type: EinsteinServiceAgent
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! I'm your Acme Corp assistant.
      message_type: Welcome
    - message: Sorry, something went wrong.
      message_type: Error
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! I''m your Acme Corp assistant.", "messageType":
      "Welcome"}, {"message": "Sorry, something went wrong.", "messageType": "Error"}]'
  company: Acme Corporation
  role: Customer service representative for Acme Corp products
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Route the customer request to the appropriate support topic'
      instructions: You are a customer service representative for Acme Corp products.
      type: subagent
      reasoning_type: salesforce.default
      description: Routes customer inquiries
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      developer_name: main
      label: Main
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Help the customer with their support request'
      instructions: You are a customer service representative for Acme Corp products.
      type: subagent
      reasoning_type: salesforce.default
      description: Customer support topic
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      developer_name: Support
      label: Support
      action_definitions: []
  surfaces: []
