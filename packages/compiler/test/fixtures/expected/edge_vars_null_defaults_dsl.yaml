schema_version: '2.0'
global_configuration:
  developer_name: Null_Defaults_Agent
  label: Null Defaults Agent
  description: Agent with None defaults and variables without defaults
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages: []
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: str_none
      label: Str None
      description: String with None default
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: num_none
      label: Num None
      description: Number with None default
      data_type: number
      is_list: false
      visibility: Internal
    - developer_name: bool_none
      label: Bool None
      description: Boolean with None default
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: obj_none
      label: Obj None
      description: Object with None default
      data_type: object
      is_list: false
      visibility: Internal
    - developer_name: list_none
      label: List None
      description: List with None default
      data_type: string
      is_list: true
      visibility: Internal
    - developer_name: str_no_default
      label: Str No Default
      description: String with no default value
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: num_no_default
      label: Num No Default
      description: Number with no default value
      data_type: number
      is_list: false
      visibility: Internal
    - developer_name: bool_no_default
      label: Bool No Default
      description: Boolean with no default value
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: obj_no_default
      label: Obj No Default
      description: Object with no default value
      data_type: object
      is_list: false
      visibility: Internal
    - developer_name: list_no_default
      label: List No Default
      description: List with no default value
      data_type: object
      is_list: true
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Initialize variables and process the request'
      instructions: You are an agent for testing None defaults and variables without
        defaults.
      type: subagent
      reasoning_type: salesforce.default
      description: Test null and missing defaults
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      developer_name: main
      label: Main
      action_definitions: []
  surfaces: []
