# NOTE: Differs from Python compiler — TS creates tool + handoff for escalation
# with "available when", so the LLM decides when to escalate. Python creates a
# direct handoff with the condition as "enabled", with no tool.
schema_version: "2.0"
global_configuration:
  developer_name: EdgeActionAvailableWhen
  label: Edge Action Available When
  description: Tests available when conditions on reasoning actions
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables: []
  default_agent_user: admin@example.com
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages: []
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: "''"
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: verified
      label: Verified
      description: Whether customer is verified
      data_type: boolean
      is_list: false
      visibility: Internal
      default: false
    - developer_name: customer_name
      label: Customer Name
      description: Customer name
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: account_type
      label: Account Type
      description: Account type
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: ticket_id
      label: Ticket Id
      description: Active ticket ID
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: balance
      label: Balance
      description: Account balance
      data_type: number
      is_list: false
      visibility: Internal
      default: 0
    - developer_name: is_premium
      label: Is Premium
      description: Premium customer flag
      data_type: boolean
      is_list: false
      visibility: Internal
      default: false
  initial_node: main
  nodes:
    - type: subagent
      reasoning_type: salesforce.default
      description: Route to service topic
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"gated_service"'
          name: go_to_service
          description: Service topic with conditionally available actions
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"verify"'
          name: go_to_verify
          description: Verify the customer identity
          enabled: state.verified == False
      developer_name: main
      label: Main
      action_definitions: []
      instructions: You are a gated service agent with conditional action availability.
      after_all_tool_calls:
        - type: handoff
          target: gated_service
          enabled: state.AgentScriptInternal_next_topic=="gated_service"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: verify
          enabled: state.AgentScriptInternal_next_topic=="verify"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
    - type: subagent
      reasoning_type: salesforce.default
      description: Verify the customer identity
      tools:
        - type: action
          target: verify_identity
          bound_inputs: {}
          llm_inputs:
            - name
          state_updates:
            - verified: result.verified
            - account_type: result.account_type
            - is_premium: result.is_premium
          name: verify
          description: Verify
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"gated_service"'
          name: go_to_service
          description: Service topic with conditionally available actions
          enabled: state.verified == True
      developer_name: verify
      label: Verify
      action_definitions:
        - developer_name: verify_identity
          label: Verify Identity
          description: Verify customer identity
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Verify_Identity
          input_type:
            - developer_name: name
              label: Name
              description: Name
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: verified
              label: Verified
              description: Verified
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: account_type
              label: Account Type
              description: Account Type
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: is_premium
              label: Is Premium
              description: Is Premium
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
      instructions: You are a gated service agent with conditional action availability.
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                Verify the customer before proceeding.
      after_all_tool_calls:
        - type: handoff
          target: gated_service
          enabled: state.AgentScriptInternal_next_topic=="gated_service"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
    - type: subagent
      reasoning_type: salesforce.default
      description: Service topic with conditionally available actions
      tools:
        - type: action
          target: check_balance
          bound_inputs:
            customer_name: state.customer_name
          llm_inputs: []
          state_updates:
            - balance: result.balance
          name: check_balance
          description: Check Balance
          enabled: state.verified == True
        - type: action
          target: process_refund
          bound_inputs:
            ticket_id: state.ticket_id
          llm_inputs:
            - amount
          state_updates: []
          name: process_refund
          description: Process Refund
          enabled: state.ticket_id != None and state.verified == True
        - type: action
          target: premium_support
          bound_inputs: {}
          llm_inputs:
            - request
          state_updates: []
          name: premium_support
          description: Premium Support
          enabled: state.is_premium == True and state.verified == True
        - type: action
          target: create_ticket
          bound_inputs: {}
          llm_inputs:
            - subject
          state_updates:
            - ticket_id: result.ticket_id
          name: create_ticket
          description: Create Ticket
          enabled: state.customer_name != None
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: "'__human__'"
          name: escalate_to_human
          description: Escalate to human
          enabled: state.verified == True
      developer_name: gated_service
      label: Gated Service
      action_definitions:
        - developer_name: check_balance
          label: Check Balance
          description: Check account balance
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Check_Balance
          input_type:
            - developer_name: customer_name
              label: Customer Name
              description: Customer Name
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: balance
              label: Balance
              description: Balance
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: process_refund
          label: Process Refund
          description: Process a refund
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Process_Refund
          input_type:
            - developer_name: ticket_id
              label: Ticket Id
              description: Ticket Id
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: amount
              label: Amount
              description: Amount
              data_type: Double
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: refund_id
              label: Refund Id
              description: Refund Id
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: premium_support
          label: Premium Support
          description: Access premium support features
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Premium_Support
          input_type:
            - developer_name: request
              label: Request
              description: Request
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: response
              label: Response
              description: Response
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: create_ticket
          label: Create Ticket
          description: Create a support ticket
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Create_Ticket
          input_type:
            - developer_name: subject
              label: Subject
              description: Subject
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: ticket_id
              label: Ticket Id
              description: Ticket Id
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
      instructions: You are a gated service agent with conditional action availability.
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                Help the verified customer with their request.
                Premium actions are only available for premium customers.
      after_all_tool_calls:
        - type: handoff
          target: __human__
          enabled: state.AgentScriptInternal_next_topic == '__human__'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
  surfaces: []
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
