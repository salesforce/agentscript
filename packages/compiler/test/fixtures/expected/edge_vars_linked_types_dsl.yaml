schema_version: '2.0'
global_configuration:
  developer_name: Linked_Vars_Agent
  label: Linked Vars Agent
  description: Agent with linked variables from various sources
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables:
    - developer_name: session_id
      label: Session Id
      description: The messaging session ID
      data_type: string
      field_mapping: MessagingSession.Id
    - developer_name: session_key
      label: Session Key
      description: The messaging session key
      data_type: string
      field_mapping: MessagingSession.SessionKey
    - developer_name: end_user_name
      label: End User Name
      description: The end user's name
      data_type: string
      field_mapping: MessagingEndUser.Name
    - developer_name: end_user_id
      label: End User Id
      description: The end user's ID
      data_type: string
      field_mapping: MessagingEndUser.Id
    - developer_name: end_user_language
      label: End User Language
      description: The end user's language
      data_type: string
      field_mapping: MessagingSession.EndUserLanguage
    - developer_name: contact_id
      label: Contact Id
      description: The contact ID of the end user
      data_type: string
      field_mapping: MessagingEndUser.ContactId
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello {!@variables.end_user_name}!
      message_type: Welcome
    - message: An error occurred.
      message_type: Error
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello {!@variables.end_user_name}!", "messageType":
      "Welcome"}, {"message": "An error occurred.", "messageType": "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Route based on session context and user information'
      instructions: You are an agent that uses linked session data.
      type: subagent
      reasoning_type: salesforce.default
      description: Route using linked session data
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      developer_name: main
      label: Main
      action_definitions: []
  surfaces: []
