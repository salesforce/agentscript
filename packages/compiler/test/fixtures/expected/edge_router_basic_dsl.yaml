schema_version: '2.0'
global_configuration:
  developer_name: Basic_Router_Agent
  label: Basic Router Agent
  description: A basic router agent with hyperclassifier
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: defaultagentuser@example.com
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! How can I help you today?
      message_type: Welcome
    - message: Sorry, something went wrong.
      message_type: Error
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! How can I help you today?", "messageType":
      "Welcome"}, {"message": "Sorry, something went wrong.", "messageType": "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
  initial_node: topic_selector
  nodes:
    - model_configuration:
        model_ref: sfdc_ai__DefaultEinsteinHyperClassifier
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Determine which topic best matches the user''s request.

                Route them to the appropriate handler.'
      instructions: 'You are a basic routing agent that directs users to the right
        topic.


        {{state.AgentScriptInternal_agent_instructions}}'
      type: router
      description: Routes the user to the appropriate topic based on their request
      tools:
        - name: go_to_sales
          target: sales_inquiry
          description: Route to sales questions
        - name: go_to_support
          target: technical_support
          description: Route to technical support
      developer_name: topic_selector
      label: Topic Selector
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Help the user with their sales inquiry.

                Provide product information and pricing details.

                If the question is too complex, offer to connect them with a sales
                representative.'
      instructions: You are a basic routing agent that directs users to the right
        topic.
      type: subagent
      reasoning_type: salesforce.default
      description: Handles sales-related questions and product information
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      developer_name: sales_inquiry
      label: Sales Inquiry
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Help the user with their technical issue.

                Walk them through troubleshooting steps.

                If the issue cannot be resolved, offer to escalate.'
      instructions: You are a basic routing agent that directs users to the right
        topic.
      type: subagent
      reasoning_type: salesforce.default
      description: Handles technical support questions and troubleshooting
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      developer_name: technical_support
      label: Technical Support
      action_definitions: []
  surfaces: []
