schema_version: '2.0'
global_configuration:
  developer_name: Long_Messages_Agent
  label: Long Messages Agent
  description: Agent with very long multi-line system messages
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Welcome to our comprehensive customer service portal. We are here to
        assist you with any questions or concerns you may have about our products,
        services, billing, shipping, returns, exchanges, warranty claims, technical
        support, account management, and general inquiries. Please describe your issue
        and we will do our best to help you resolve it as quickly as possible. Our
        team is available 24/7 to provide you with the highest quality support experience.
      message_type: Welcome
    - message: We sincerely apologize for the inconvenience, but we have encountered
        an unexpected error while processing your request. Our technical team has
        been notified and is working to resolve this issue. In the meantime, please
        try again in a few moments. If the problem persists, please contact our support
        team directly at support@example.com or call 1-800-555-0199. We appreciate
        your patience and understanding.
      message_type: Error
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Welcome to our comprehensive customer service
      portal. We are here to assist you with any questions or concerns you may have
      about our products, services, billing, shipping, returns, exchanges, warranty
      claims, technical support, account management, and general inquiries. Please
      describe your issue and we will do our best to help you resolve it as quickly
      as possible. Our team is available 24/7 to provide you with the highest quality
      support experience.", "messageType": "Welcome"}, {"message": "We sincerely apologize
      for the inconvenience, but we have encountered an unexpected error while processing
      your request. Our technical team has been notified and is working to resolve
      this issue. In the meantime, please try again in a few moments. If the problem
      persists, please contact our support team directly at support@example.com or
      call 1-800-555-0199. We appreciate your patience and understanding.", "messageType":
      "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Route the user request to the appropriate handler'
      instructions: You are a comprehensive customer service agent available 24/7.
      type: subagent
      reasoning_type: salesforce.default
      description: Entry point for long message agent
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      developer_name: main
      label: Main
      action_definitions: []
  surfaces: []
