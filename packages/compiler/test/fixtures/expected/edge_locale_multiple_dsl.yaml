schema_version: '2.0'
global_configuration:
  developer_name: Multi_Locale_Agent
  label: Multi Locale Agent
  description: Agent with multiple additional locales
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Welcome! We support multiple languages.
      message_type: Welcome
    - message: An error occurred.
      message_type: Error
  modality_parameters:
    language:
      default_locale: en_US
      additional_locales:
        - fr
        - de
        - es
        - ja
        - zh_CN
        - pt_BR
        - it
        - ko
      all_additional_locales: false
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Welcome! We support multiple languages.", "messageType":
      "Welcome"}, {"message": "An error occurred.", "messageType": "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Process the user request in their preferred language'
      instructions: You are a multilingual agent supporting multiple languages.
      type: subagent
      reasoning_type: salesforce.default
      description: Multi-locale entry point
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      developer_name: main
      label: Main
      action_definitions: []
  surfaces: []
