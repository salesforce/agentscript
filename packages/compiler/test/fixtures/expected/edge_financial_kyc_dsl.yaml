schema_version: '2.0'
global_configuration:
  developer_name: KYC_Verification_Agent
  label: KYC Verification Agent
  description: Handles KYC identity verification, document checks, and compliance
    screening.
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: kyc_agent@bank.com
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Welcome to our verification center. I'll guide you through the identity
        verification process.
      message_type: Welcome
    - message: An error occurred during verification. Please try again.
      message_type: Error
  modality_parameters:
    language:
      default_locale: en_US
      additional_locales: []
      all_additional_locales: false
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Welcome to our verification center. I''ll guide
      you through the identity verification process.", "messageType": "Welcome"},
      {"message": "An error occurred during verification. Please try again.", "messageType":
      "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: customer_id
      label: Customer Id
      description: Customer identifier
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: identity_verified
      label: Identity Verified
      description: Whether identity has been verified
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: document_verified
      label: Document Verified
      description: Whether documents have been verified
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: compliance_passed
      label: Compliance Passed
      description: Whether compliance checks passed
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: risk_score
      label: Risk Score
      description: Customer risk score
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: verification_status
      label: Verification Status
      description: Overall verification status
      data_type: string
      is_list: false
      default: '''pending'''
      visibility: Internal
  initial_node: identity_check
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Collect the customer''s full name, date of birth, and ID number.

                Use the verify_identity action to check against databases.'
      instructions: You are a KYC verification agent. You help verify customer identity
        and ensure regulatory compliance.
      type: subagent
      reasoning_type: salesforce.default
      description: Performs initial identity verification
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: verify_identity
          bound_inputs:
            customer_id: state.customer_id
          llm_inputs:
            - full_name
            - date_of_birth
          state_updates:
            - identity_verified: result.verified
            - risk_score: result.match_score
          name: verify
          description: Verify
        - type: action
          target: __state_update_action__
          enabled: state.identity_verified == True
          state_updates:
            - AgentScriptInternal_next_topic: '"document_verification"'
          name: go_documents
          description: Proceed to document verification
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"compliance_review"'
          name: go_escalation
          description: Escalate failed verification
      after_all_tool_calls:
        - type: handoff
          target: document_verification
          enabled: state.AgentScriptInternal_next_topic=="document_verification"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: compliance_review
          enabled: state.AgentScriptInternal_next_topic=="compliance_review"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      after_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.identity_verified == True
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - AgentScriptInternal_next_topic: '"document_verification"'
        - type: handoff
          target: document_verification
          enabled: state.AgentScriptInternal_next_topic=="document_verification"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.identity_verified == False
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - AgentScriptInternal_next_topic: '"compliance_review"'
        - type: handoff
          target: compliance_review
          enabled: state.AgentScriptInternal_next_topic=="compliance_review"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: identity_check
      label: Identity Check
      action_definitions:
        - developer_name: verify_identity
          label: Verify Identity
          description: Verifies customer identity against government databases
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: externalService
          invocation_target_name: VerifyIdentity
          input_type:
            - developer_name: customer_id
              label: Customer Id
              description: Customer Id
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: full_name
              label: Full Name
              description: Full Name
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: date_of_birth
              label: Date Of Birth
              description: Date Of Birth
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: verified
              label: Verified
              description: Verified
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: match_score
              label: Match Score
              description: Match Score
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: flags
              label: Flags
              description: Flags
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Verify the customer''s identity documents.

                Accepted documents: passport, driver''s license, national ID.'
      instructions: You are a KYC verification agent. You help verify customer identity
        and ensure regulatory compliance.
      type: subagent
      reasoning_type: salesforce.default
      description: Verifies submitted identity documents
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: check_documents
          bound_inputs:
            customer_id: state.customer_id
          llm_inputs:
            - document_type
          state_updates:
            - document_verified: result.document_valid
          name: check
          description: Check
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"compliance_review"'
          name: go_compliance
          description: Proceed to compliance check
      after_all_tool_calls:
        - type: handoff
          target: compliance_review
          enabled: state.AgentScriptInternal_next_topic=="compliance_review"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      after_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.document_verified == True
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - AgentScriptInternal_next_topic: '"compliance_review"'
        - type: handoff
          target: compliance_review
          enabled: state.AgentScriptInternal_next_topic=="compliance_review"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: document_verification
      label: Document Verification
      action_definitions:
        - developer_name: check_documents
          label: Check Documents
          description: Verifies uploaded identity documents
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: CheckDocuments
          input_type:
            - developer_name: customer_id
              label: Customer Id
              description: Customer Id
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: document_type
              label: Document Type
              description: Document Type
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: document_valid
              label: Document Valid
              description: Document Valid
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: expiry_date
              label: Expiry Date
              description: Expiry Date
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Review the compliance screening results.

                If all checks pass, approve the customer. Otherwise, escalate.'
      instructions: You are a KYC verification agent. You help verify customer identity
        and ensure regulatory compliance.
      type: subagent
      reasoning_type: salesforce.default
      description: Performs regulatory compliance screening
      before_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.customer_id != ""
        - type: action
          target: run_compliance_check
          bound_inputs:
            customer_id: state.customer_id
            risk_score: state.risk_score
          llm_inputs: []
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - compliance_passed: result.passed
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '''__human__'''
          name: escalate_to_human
          description: Escalate to compliance officer
      after_all_tool_calls:
        - type: handoff
          target: __human__
          enabled: state.AgentScriptInternal_next_topic == '__human__'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      after_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.compliance_passed == True
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - verification_status: '"approved"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.compliance_passed == False
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - verification_status: '"review_required"'
      developer_name: compliance_review
      label: Compliance Review
      action_definitions:
        - developer_name: run_compliance_check
          label: Run Compliance Check
          description: Runs AML and sanctions screening
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: RunComplianceCheck
          input_type:
            - developer_name: customer_id
              label: Customer Id
              description: Customer Id
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: risk_score
              label: Risk Score
              description: Risk Score
              data_type: Double
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: passed
              label: Passed
              description: Passed
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: compliance_notes
              label: Compliance Notes
              description: Compliance Notes
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
  surfaces: []
