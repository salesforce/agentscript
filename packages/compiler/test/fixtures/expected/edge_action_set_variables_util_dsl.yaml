schema_version: '2.0'
global_configuration:
  developer_name: EdgeActionSetVariablesUtil
  label: Edge Action Set Variables Util
  description: Tests multiple @utils.setVariables patterns
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: admin@example.com
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages: []
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: user_name
      label: User Name
      description: User name
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: user_email
      label: User Email
      description: User email
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: user_city
      label: User City
      description: User city
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: user_country
      label: User Country
      description: User country
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: preferred_language
      label: Preferred Language
      description: Preferred language
      data_type: string
      is_list: false
      default: '''en_US'''
      visibility: Internal
    - developer_name: issue_type
      label: Issue Type
      description: Type of issue
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: issue_description
      label: Issue Description
      description: Description of the issue
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: urgency
      label: Urgency
      description: Issue urgency
      data_type: string
      is_list: false
      default: '''normal'''
      visibility: Internal
    - developer_name: feedback_rating
      label: Feedback Rating
      description: Feedback rating
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: feedback_comment
      label: Feedback Comment
      description: Feedback comment
      data_type: string
      is_list: false
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Welcome the user and collect their information step by step.

                Use the set variables tools to capture user details, issue info, and
                feedback.'
      instructions: You are an agent that collects and sets user information.
      type: subagent
      reasoning_type: salesforce.default
      description: Collect user info using setVariables utility
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          bound_inputs: {}
          llm_inputs:
            - user_name
            - user_email
            - user_city
            - user_country
          state_updates:
            - user_name: result.user_name
            - user_email: result.user_email
            - user_city: result.user_city
            - user_country: result.user_country
          name: set_user_info
          description: Set the user's personal information including name, email,
            and location.
          input_parameters:
            - developer_name: user_name
              label: user_name
              data_type: String
            - developer_name: user_email
              label: user_email
              data_type: String
            - developer_name: user_city
              label: user_city
              data_type: String
            - developer_name: user_country
              label: user_country
              data_type: String
        - type: action
          target: __state_update_action__
          bound_inputs: {}
          llm_inputs:
            - preferred_language
          state_updates:
            - preferred_language: result.preferred_language
          name: set_preferences
          description: Set the user's language and communication preferences.
          input_parameters:
            - developer_name: preferred_language
              label: preferred_language
              data_type: String
        - type: action
          target: __state_update_action__
          bound_inputs: {}
          llm_inputs:
            - issue_type
            - issue_description
            - urgency
          state_updates:
            - issue_type: result.issue_type
            - issue_description: result.issue_description
            - urgency: result.urgency
          name: set_issue_details
          description: Capture the details of the user's issue or request.
          input_parameters:
            - developer_name: issue_type
              label: issue_type
              data_type: String
            - developer_name: issue_description
              label: issue_description
              data_type: String
            - developer_name: urgency
              label: urgency
              data_type: String
        - type: action
          target: __state_update_action__
          bound_inputs: {}
          llm_inputs:
            - feedback_rating
            - feedback_comment
          state_updates:
            - feedback_rating: result.feedback_rating
            - feedback_comment: result.feedback_comment
          name: set_feedback
          description: Record the user's feedback after resolution.
          input_parameters:
            - developer_name: feedback_rating
              label: feedback_rating
              data_type: Double
            - developer_name: feedback_comment
              label: feedback_comment
              data_type: String
        - type: action
          target: __state_update_action__
          enabled: state.issue_type != None
          state_updates:
            - AgentScriptInternal_next_topic: '"resolution"'
          name: go_to_resolution
          description: Move to issue resolution after collecting details.
      after_all_tool_calls:
        - type: handoff
          target: resolution
          enabled: state.AgentScriptInternal_next_topic=="resolution"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: main
      label: Main
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Resolve the issue based on the collected information.'
      instructions: You are an agent that collects and sets user information.
      type: subagent
      reasoning_type: salesforce.default
      description: Resolve the user's issue
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          bound_inputs: {}
          llm_inputs:
            - urgency
          state_updates:
            - urgency: result.urgency
          name: update_urgency
          description: Update the issue urgency if needed.
          input_parameters:
            - developer_name: urgency
              label: urgency
              data_type: String
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '''__human__'''
          name: escalate_to_human
          description: Escalate to human agent
      after_all_tool_calls:
        - type: handoff
          target: __human__
          enabled: state.AgentScriptInternal_next_topic == '__human__'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: resolution
      label: Resolution
      action_definitions: []
  surfaces: []
