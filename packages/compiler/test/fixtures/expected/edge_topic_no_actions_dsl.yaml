schema_version: '2.0'
global_configuration:
  developer_name: Topic_No_Actions_Agent
  label: Topic No Actions Agent
  description: Agent where topics have only reasoning instructions and no actions
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: user@test.com
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! I can provide guidance and information.
      message_type: Welcome
    - message: An error occurred. Please try again.
      message_type: Error
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! I can provide guidance and information.",
      "messageType": "Welcome"}, {"message": "An error occurred. Please try again.",
      "messageType": "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                You are a conversational agent that provides guidance

                and information without invoking any external actions.

                Listen to the user and provide helpful advice.

                If they need billing help, transition to the billing topic.

                If they need general info, transition to the info topic.'
      instructions: You are a conversational guidance agent.
      type: subagent
      reasoning_type: salesforce.default
      description: Agent where topics have only reasoning instructions and no actions
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"billing_advice"'
          name: go_to_billing
          description: Provide billing advice without any action invocations
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"general_info"'
          name: go_to_info
          description: Provide general information
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '''__human__'''
          name: escalate_to_human
          description: Escalate to a human agent
      after_all_tool_calls:
        - type: handoff
          target: billing_advice
          enabled: state.AgentScriptInternal_next_topic=="billing_advice"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: general_info
          enabled: state.AgentScriptInternal_next_topic=="general_info"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: __human__
          enabled: state.AgentScriptInternal_next_topic == '__human__'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: main
      label: Main
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Provide the user with general billing advice.

                Explain common billing terms and processes.

                You do not have access to any billing systems.

                If the user needs actual account changes, escalate.'
      instructions: You are a conversational guidance agent.
      type: subagent
      reasoning_type: salesforce.default
      description: Provide billing advice without any action invocations
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '''__human__'''
          name: escalate_to_human
          description: Escalate to a human agent
      after_all_tool_calls:
        - type: handoff
          target: __human__
          enabled: state.AgentScriptInternal_next_topic == '__human__'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: billing_advice
      label: Billing Advice
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Answer the user''s general questions.

                Provide helpful and accurate information.

                Be concise and friendly.'
      instructions: You are a conversational guidance agent.
      type: subagent
      reasoning_type: salesforce.default
      description: Provide general information
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      developer_name: general_info
      label: General Info
      action_definitions: []
  surfaces: []
