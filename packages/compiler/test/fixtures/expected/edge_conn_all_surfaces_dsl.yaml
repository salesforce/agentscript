schema_version: '2.0'
global_configuration:
  developer_name: EdgeConnAllSurfaces
  label: Universal Agent
  description: 'Agent with all connection types: messaging, slack, service_email,
    voice'
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: universal_bot@example.com
  context_variables:
    - developer_name: EndUserId
      label: End User Id
      description: End user ID
      data_type: string
      field_mapping: MessagingSession.MessagingEndUserId
    - developer_name: RoutableId
      label: Routable Id
      description: Session ID
      data_type: string
      field_mapping: MessagingSession.Id
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Welcome! I'm available on messaging, Slack, email, and voice.
      message_type: Welcome
    - message: Something went wrong.
      message_type: Error
  modality_parameters:
    language:
      default_locale: en_US
      additional_locales: []
      all_additional_locales: false
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Welcome! I''m available on messaging, Slack, email,
      and voice.", "messageType": "Welcome"}, {"message": "Something went wrong.",
      "messageType": "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: channel
      label: Channel
      description: Current channel
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: resolved
      label: Resolved
      description: Issue resolved flag
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Help the customer regardless of their communication channel.

                Adapt your response style to the channel.'
      instructions: You are a universal agent available on all communication surfaces.
      type: subagent
      reasoning_type: salesforce.default
      description: Handle requests from any communication surface
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"general_support"'
          name: go_to_support
          description: Route to general support
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '''__human__'''
          name: escalate_to_human
          description: Escalate to human agent
      after_all_tool_calls:
        - type: handoff
          target: general_support
          enabled: state.AgentScriptInternal_next_topic=="general_support"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: __human__
          enabled: state.AgentScriptInternal_next_topic == '__human__'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: main
      label: Main
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Provide support to the customer.'
      instructions: You are a universal agent available on all communication surfaces.
      type: subagent
      reasoning_type: salesforce.default
      description: General support available on all surfaces
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: resolve_issue
          bound_inputs:
            channel: state.channel
          llm_inputs:
            - issue
          state_updates:
            - resolved: result.resolved
          name: resolve
          description: Resolve
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '''__human__'''
          name: escalate_to_human
          description: Escalate to human
      after_all_tool_calls:
        - type: handoff
          target: __human__
          enabled: state.AgentScriptInternal_next_topic == '__human__'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: general_support
      label: General Support
      action_definitions:
        - developer_name: resolve_issue
          label: Resolve Issue
          description: Resolve the customer issue
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Resolve_Issue
          input_type:
            - developer_name: issue
              label: Issue
              description: Issue
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: channel
              label: Channel
              description: Channel
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: resolved
              label: Resolved
              description: Resolved
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: resolution_notes
              label: Resolution Notes
              description: Resolution Notes
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
  surfaces:
    - surface_type: messaging
      adaptive_response_allowed: true
      outbound_route_configs: []
    - surface_type: slack
      adaptive_response_allowed: true
      outbound_route_configs: []
    - surface_type: service_email
      adaptive_response_allowed: true
      outbound_route_configs: []
    - surface_type: voice
      adaptive_response_allowed: true
      outbound_route_configs: []
