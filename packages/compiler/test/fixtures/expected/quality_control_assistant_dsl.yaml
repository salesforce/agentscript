      instructions: You are a manufacturing quality control assistant. Your role is
        to help quality inspectors log defects, track quality metrics, manage non-conforming
        products, and initiate corrective actions.
      type: subagent
      reasoning_type: salesforce.default
      description: Evaluates overall quality and determines corrective actions
      before_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.defect_count > 3
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - quality_status: '"failed"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.defect_count <= 3
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - quality_status: '"passed"'
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: Generate_Quality_Report
          bound_inputs:
            inspector_id: state.inspector_id
            product_id: state.product_id
            batch_number: state.batch_number
            quality_score: state.quality_score
            defect_summary: state.defect_types
          llm_inputs: []
          state_updates:
            - inspection_report_id: result.report_id
          name: create_report
          description: Create Report
        - type: action
          target: Initiate_Corrective_Action
          bound_inputs:
            batch_number: state.batch_number
            defect_severity: '"major"'
            root_cause_suspected: '"Process variation"'
            immediate_containment: '"Hold batch for review"'
          llm_inputs: []
          state_updates:
            - corrective_action_id: result.corrective_action_id
          name: start_corrective_action
          description: Start Corrective Action
        - type: action
          target: Quarantine_Batch
          bound_inputs:
            batch_number: state.batch_number
            quarantine_reason: '"Quality defects identified"'
            inspector_id: state.inspector_id
          llm_inputs: []
          state_updates:
            - quarantine_required: result.quarantine_initiated
          name: quarantine_product
          description: Quarantine Product
        - type: action
          target: __state_update_action__
          bound_inputs: {}
          llm_inputs: []
          state_updates:
            - quality_status: state.quality_status
            - corrective_action_needed: state.corrective_action_needed
          name: finalize_assessment
          input_parameters: []
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"inspection_setup"'
          name: new_inspection
