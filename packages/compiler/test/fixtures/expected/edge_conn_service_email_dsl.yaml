schema_version: '2.0'
global_configuration:
  developer_name: EdgeConnServiceEmail
  label: Email Agent
  description: Agent with service email connection
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: email_bot@example.com
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Thank you for your email. I'll assist you shortly.
      message_type: Welcome
    - message: We encountered an error processing your request.
      message_type: Error
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Thank you for your email. I''ll assist you shortly.",
      "messageType": "Welcome"}, {"message": "We encountered an error processing your
      request.", "messageType": "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Respond to the customer''s email. Be thorough and professional

                as email allows for longer responses.'
      instructions: You are an email-based support agent.
      type: subagent
      reasoning_type: salesforce.default
      description: Handle email-based support requests
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '''__human__'''
          name: escalate_to_human
          description: Escalate to human agent via email
      after_all_tool_calls:
        - type: handoff
          target: __human__
          enabled: state.AgentScriptInternal_next_topic == '__human__'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: main
      label: Main
      action_definitions: []
  surfaces:
    - surface_type: service_email
      adaptive_response_allowed: true
      outbound_route_configs: []
