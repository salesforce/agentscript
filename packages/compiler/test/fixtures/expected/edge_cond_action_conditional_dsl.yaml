schema_version: '2.0'
global_configuration:
  developer_name: Edge_Cond_Action_Conditional
  label: Edge Cond Action Conditional
  description: Tests post-action conditionals in reasoning actions
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: test_user
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! I can help you look up your order.
      message_type: Welcome
    - message: Something went wrong.
      message_type: Error
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! I can help you look up your order.", "messageType":
      "Welcome"}, {"message": "Something went wrong.", "messageType": "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: order_id
      label: Order Id
      description: Order Id
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: result
      label: Result
      description: Result
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: customer_email
      label: Customer Email
      description: Customer Email
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Help the user look up their order status.'
      instructions: You are an order lookup assistant.
      type: subagent
      reasoning_type: salesforce.default
      description: Tests action invocation followed by conditional transition
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: lookup_order
          bound_inputs:
            order_id: state.order_id
            email: state.customer_email
          llm_inputs: []
          state_updates:
            - result: result.order_details
          name: lookup
          description: Lookup
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"escalation"'
          name: escalate_to_human
          description: Escalation topic
      post_tool_call:
        - target: lookup_order
          actions:
            - type: action
              target: __state_update_action__
              enabled: 'True'
              state_updates:
                - AgentScriptInternal_condition: state.result == ""
            - type: action
              target: __state_update_action__
              enabled: state.AgentScriptInternal_condition
              state_updates:
                - AgentScriptInternal_next_topic: '"not_found"'
      after_all_tool_calls:
        - type: handoff
          target: not_found
          enabled: state.AgentScriptInternal_next_topic=="not_found"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: escalation
          enabled: state.AgentScriptInternal_next_topic=="escalation"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: main
      label: Main
      action_definitions:
        - developer_name: lookup_order
          label: Lookup Order
          description: Looks up an order by ID
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: LookupOrder
          input_type:
            - developer_name: order_id
              label: Order Id
              description: Order Id
              data_type: String
              is_list: false
              required: false
              is_user_input: false
            - developer_name: email
              label: Email
              description: Email
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: order_details
              label: Order Details
              description: Order Details
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                I''m sorry, I could not find that order. Let me help you further.'
      instructions: You are an order lookup assistant.
      type: subagent
      reasoning_type: salesforce.default
      description: Handles cases where the order was not found
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      developer_name: not_found
      label: Not Found
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Transferring you to a human agent.'
      instructions: You are an order lookup assistant.
      type: subagent
      reasoning_type: salesforce.default
      description: Escalation topic
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      developer_name: escalation
      label: Escalation
      action_definitions: []
  surfaces: []
