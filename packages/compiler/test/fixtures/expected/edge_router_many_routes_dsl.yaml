schema_version: '2.0'
global_configuration:
  developer_name: Router_Many_Routes
  label: Router Many Routes
  description: Router with transitions to 6+ topics
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: defaultagentuser@example.com
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Welcome to Enterprise Support! I can help with sales, support, billing,
        HR, IT, legal, or compliance.
      message_type: Welcome
    - message: An error occurred. Please try again.
      message_type: Error
  modality_parameters:
    language:
      default_locale: en_US
      additional_locales: []
      all_additional_locales: false
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Welcome to Enterprise Support! I can help with
      sales, support, billing, HR, IT, legal, or compliance.", "messageType": "Welcome"},
      {"message": "An error occurred. Please try again.", "messageType": "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
  initial_node: topic_selector
  nodes:
    - model_configuration:
        model_ref: sfdc_ai__DefaultEinsteinHyperClassifier
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Classify the user''s request and route to the most appropriate department.

                Consider the full context of the conversation.'
      instructions: 'You are a comprehensive routing agent for a large enterprise
        with many departments.


        {{state.AgentScriptInternal_agent_instructions}}'
      type: router
      description: Routes users to one of many enterprise departments
      tools:
        - name: go_sales
          target: sales
          description: Route to sales department
        - name: go_support
          target: support
          description: Route to customer support
        - name: go_billing
          target: billing
          description: Route to billing department
        - name: go_hr
          target: human_resources
          description: Route to HR department
        - name: go_it
          target: it_helpdesk
          description: Route to IT helpdesk
        - name: go_legal
          target: legal
          description: Route to legal department
        - name: go_compliance
          target: compliance
          description: Route to compliance department
      developer_name: topic_selector
      label: Topic Selector
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Assist the user with sales questions.

                Provide product information, pricing, and demo scheduling.'
      instructions: You are a comprehensive routing agent for a large enterprise with
        many departments.
      type: subagent
      reasoning_type: salesforce.default
      description: Handles sales inquiries, quotes, and product demonstrations
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      developer_name: sales
      label: Sales
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Help the customer resolve their support issue.

                Follow standard troubleshooting procedures.'
      instructions: You are a comprehensive routing agent for a large enterprise with
        many departments.
      type: subagent
      reasoning_type: salesforce.default
      description: Handles customer support tickets and troubleshooting
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
