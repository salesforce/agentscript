      description: Handles sales inquiries
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      developer_name: sales
      label: Sales
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Process the user''s cancellation request.'
      instructions: You are a routing assistant that directs users to the right topic.
      type: subagent
      reasoning_type: salesforce.default
      description: Handles cancellation requests
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
