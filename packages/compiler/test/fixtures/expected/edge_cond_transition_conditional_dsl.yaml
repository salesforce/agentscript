schema_version: "2.0"
global_configuration:
  developer_name: Edge_Cond_Transition_Conditional
  label: Edge Cond Transition Conditional
  description: Tests multiple conditional transitions in after_reasoning
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables: []
  default_agent_user: test_user
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! How can I help?
      message_type: Welcome
    - message: An error occurred.
      message_type: Error
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: "''"
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: intent
      label: Intent
      description: Intent
      data_type: string
      is_list: false
      visibility: Internal
      default: "''"
    - developer_name: is_authenticated
      label: Is Authenticated
      description: Is Authenticated
      data_type: boolean
      is_list: false
      visibility: Internal
      default: false
    - developer_name: satisfaction
      label: Satisfaction
      description: Satisfaction
      data_type: number
      is_list: false
      visibility: Internal
      default: 0
  initial_node: main
  nodes:
    - type: subagent
      reasoning_type: salesforce.default
      description: Tests multiple conditional transitions in after_reasoning based on
        different values
      tools: []
      developer_name: main
      label: Main
      action_definitions: []
      instructions: You are a routing assistant that directs users to the right topic.
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                Determine the user's intent and route them appropriately.
      after_reasoning:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.intent == "billing"
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and
            (state.AgentScriptInternal_condition)
          state_updates:
            - AgentScriptInternal_next_topic: '"billing"'
        - type: handoff
          target: billing
          enabled: state.AgentScriptInternal_next_topic=="billing"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.intent == "technical"
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and
            (state.AgentScriptInternal_condition)
          state_updates:
            - AgentScriptInternal_next_topic: '"technical"'
        - type: handoff
          target: technical
          enabled: state.AgentScriptInternal_next_topic=="technical"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.intent == "sales"
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and
            (state.AgentScriptInternal_condition)
          state_updates:
            - AgentScriptInternal_next_topic: '"sales"'
        - type: handoff
          target: sales
          enabled: state.AgentScriptInternal_next_topic=="sales"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.intent == "cancel"
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and
            (state.AgentScriptInternal_condition)
          state_updates:
            - AgentScriptInternal_next_topic: '"cancellation"'
        - type: handoff
          target: cancellation
          enabled: state.AgentScriptInternal_next_topic=="cancellation"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.satisfaction < 30
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and
            (state.AgentScriptInternal_condition)
          state_updates:
            - AgentScriptInternal_next_topic: '"escalation"'
        - type: handoff
          target: escalation
          enabled: state.AgentScriptInternal_next_topic=="escalation"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
    - type: subagent
      reasoning_type: salesforce.default
      description: Handles billing inquiries
      tools: []
      developer_name: billing
      label: Billing
      action_definitions: []
      instructions: You are a routing assistant that directs users to the right topic.
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                Assist the user with their billing question.
    - type: subagent
      reasoning_type: salesforce.default
      description: Handles technical support
      tools: []
      developer_name: technical
      label: Technical
      action_definitions: []
      instructions: You are a routing assistant that directs users to the right topic.
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                Assist the user with their technical issue.
    - type: subagent
      reasoning_type: salesforce.default
      description: Handles sales inquiries
      tools: []
      developer_name: sales
      label: Sales
      action_definitions: []
      instructions: You are a routing assistant that directs users to the right topic.
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                Assist the user with their sales question.
    - type: subagent
      reasoning_type: salesforce.default
      description: Handles cancellation requests
      tools: []
      developer_name: cancellation
      label: Cancellation
      action_definitions: []
      instructions: You are a routing assistant that directs users to the right topic.
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                Process the user's cancellation request.
    - type: subagent
      reasoning_type: salesforce.default
      description: Handles escalated interactions
      tools: []
      developer_name: escalation
      label: Escalation
      action_definitions: []
      instructions: You are a routing assistant that directs users to the right topic.
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                This interaction has been escalated due to low satisfaction.
  surfaces: []
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! How can I help?", "messageType":
      "Welcome"}, {"message": "An error occurred.", "messageType": "Error"}]'
