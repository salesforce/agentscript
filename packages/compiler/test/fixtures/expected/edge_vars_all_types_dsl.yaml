schema_version: '2.0'
global_configuration:
  developer_name: All_Types_Agent
  label: All Types Agent
  description: Agent with every variable type
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages: []
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: text_val
      label: Text Val
      description: A string variable
      data_type: string
      is_list: false
      default: '''hello'''
      visibility: Internal
    - developer_name: num_val
      label: Num Val
      description: A number variable
      data_type: number
      is_list: false
      default: 42
      visibility: Internal
    - developer_name: bool_val
      label: Bool Val
      description: A boolean variable
      data_type: boolean
      is_list: false
      default: true
      visibility: Internal
    - developer_name: obj_val
      label: Obj Val
      description: An object variable
      data_type: object
      is_list: false
      visibility: Internal
    - developer_name: str_list
      label: Str List
      description: A list of strings
      data_type: string
      is_list: true
      visibility: Internal
    - developer_name: num_list
      label: Num List
      description: A list of numbers
      data_type: number
      is_list: true
      visibility: Internal
    - developer_name: bool_list
      label: Bool List
      description: A list of booleans
      data_type: boolean
      is_list: true
      visibility: Internal
    - developer_name: obj_list
      label: Obj List
      description: A list of objects
      data_type: object
      is_list: true
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Process with all variable types available'
      instructions: You are an agent for testing all variable types.
      type: subagent
      reasoning_type: salesforce.default
      description: Entry point testing all variable types
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      developer_name: main
      label: Main
      action_definitions: []
  surfaces: []
