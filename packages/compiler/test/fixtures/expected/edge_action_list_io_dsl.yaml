schema_version: '2.0'
global_configuration:
  developer_name: EdgeActionListIO
  label: Edge Action List IO
  description: Tests list[string] and list[object] in action inputs/outputs
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: admin@example.com
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages: []
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: tags
      label: Tags
      description: List of tags
      data_type: string
      is_list: true
      visibility: Internal
    - developer_name: categories
      label: Categories
      description: List of categories
      data_type: string
      is_list: true
      visibility: Internal
    - developer_name: search_results
      label: Search Results
      description: Search results
      data_type: object
      is_list: true
      visibility: Internal
    - developer_name: order_items
      label: Order Items
      description: Order line items
      data_type: object
      is_list: true
      visibility: Internal
    - developer_name: selected_ids
      label: Selected Ids
      description: Selected item IDs
      data_type: string
      is_list: true
      visibility: Internal
    - developer_name: scores
      label: Scores
      description: Numeric scores
      data_type: number
      is_list: true
      visibility: Internal
    - developer_name: flags
      label: Flags
      description: Boolean flags
      data_type: boolean
      is_list: true
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Help the user search, update, and process data using list operations.'
      instructions: You are a data processing agent that works with list types.
      type: subagent
      reasoning_type: salesforce.default
      description: Process data with list-typed inputs and outputs
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: search_by_tags
          bound_inputs:
            tags: state.tags
            categories: state.categories
          llm_inputs: []
          state_updates:
            - search_results: result.results
          name: search
          description: Search
        - type: action
          target: bulk_update
          bound_inputs:
            item_ids: state.selected_ids
          llm_inputs:
            - new_status
          state_updates: []
          name: bulk_update
          description: Bulk Update
        - type: action
          target: get_order_items
          bound_inputs: {}
          llm_inputs:
            - order_id
          state_updates:
            - order_items: result.items
          name: get_items
          description: Get Items
        - type: action
          target: compute_scores
          bound_inputs:
            items: state.order_items
          llm_inputs: []
          state_updates:
            - scores: result.scores
            - flags: result.passed
          name: compute
          description: Compute
      developer_name: main
      label: Main
      action_definitions:
        - developer_name: search_by_tags
          label: Search By Tags
          description: Search items by multiple tags
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Search_By_Tags
          input_type:
            - developer_name: tags
              label: Search Tags
              description: Tags to search by
              data_type: String
              is_list: true
              required: true
              is_user_input: false
            - developer_name: categories
              label: Categories
              description: Categories to filter
              data_type: String
              is_list: true
              required: false
              is_user_input: false
          output_type:
            - developer_name: results
              label: Search Results
              description: Matching items
              data_type: LightningTypes
              complex_data_type_name: lightning__objectType
              is_list: true
              is_used_by_planner: true
              is_displayable: true
            - developer_name: result_count
              label: Result Count
              description: Result Count
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: bulk_update
          label: Bulk Update
          description: Update multiple items at once
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: apex
          invocation_target_name: BulkService.update
          input_type:
            - developer_name: item_ids
              label: Item IDs
              description: IDs of items to update
              data_type: String
              is_list: true
              required: true
              is_user_input: false
            - developer_name: new_status
              label: New Status
              description: New Status
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: updated_items
              label: Updated Items
              description: Updated Items
              data_type: LightningTypes
              complex_data_type_name: lightning__objectType
              is_list: true
              is_used_by_planner: true
              is_displayable: false
            - developer_name: failed_ids
              label: Failed IDs
              description: Failed Ids
              data_type: String
              is_list: true
              is_used_by_planner: true
              is_displayable: false
        - developer_name: get_order_items
          label: Get Order Items
          description: Get line items for an order
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Get_Order_Items
          input_type:
            - developer_name: order_id
              label: Order Id
              description: Order Id
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: items
              label: Order Items
              description: Items
              data_type: LightningTypes
              complex_data_type_name: lightning__objectType
              is_list: true
              is_used_by_planner: true
              is_displayable: true
            - developer_name: item_names
              label: Item Names
              description: Item Names
              data_type: String
              is_list: true
              is_used_by_planner: true
              is_displayable: false
        - developer_name: compute_scores
          label: Compute Scores
          description: Compute scores for items
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: apex
          invocation_target_name: ScoreService.compute
          input_type:
            - developer_name: items
              label: Items
              description: Items
              data_type: LightningTypes
              complex_data_type_name: lightning__objectType
              is_list: true
              required: true
              is_user_input: false
          output_type:
            - developer_name: scores
              label: Computed Scores
              description: Scores
              data_type: Double
              is_list: true
              is_used_by_planner: true
              is_displayable: false
            - developer_name: passed
              label: Pass/Fail Flags
              description: Passed
              data_type: Boolean
              is_list: true
              is_used_by_planner: true
              is_displayable: false
  surfaces: []
