schema_version: '2.0'
global_configuration:
  developer_name: No_Inputs_Agent
  label: No Inputs Agent
  description: Agent with actions that have outputs but no inputs
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: user@test.com
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! I can provide server time, system status, and daily quotes.
      message_type: Welcome
    - message: An error occurred while fetching information.
      message_type: Error
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! I can provide server time, system status,
      and daily quotes.", "messageType": "Welcome"}, {"message": "An error occurred
      while fetching information.", "messageType": "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Help the user by providing server time, system status, and daily quotes.

                These actions require no inputs.'
      instructions: You are a helpful assistant that provides server info and quotes.
      type: subagent
      reasoning_type: salesforce.default
      description: Agent with actions that have outputs but no inputs
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: Get_Server_Time
          bound_inputs: {}
          llm_inputs: []
          state_updates: []
          name: Time_Action
          description: Time Action
        - type: action
          target: Get_System_Status
          bound_inputs: {}
          llm_inputs: []
          state_updates: []
          name: Status_Action
          description: Status Action
        - type: action
          target: Get_Daily_Quote
          bound_inputs: {}
          llm_inputs: []
          state_updates: []
          name: Quote_Action
          description: Quote Action
      developer_name: main
      label: Main
      action_definitions:
        - developer_name: Get_Server_Time
          label: Get Server Time
          description: Get the current server time
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Get_Server_Time
          input_type: []
          output_type:
            - developer_name: current_time
              label: Current Time
              description: Current Time
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: timezone
              label: Timezone
              description: Timezone
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: Get_System_Status
          label: Get System Status
          description: Get system health status
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: apex
          invocation_target_name: SystemController.getStatus
          input_type: []
          output_type:
            - developer_name: status
              label: System Status
              description: Status
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: uptime
              label: Uptime Hours
              description: Uptime
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: Get_Daily_Quote
          label: Get Daily Quote
          description: Get the quote of the day
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: externalService
          invocation_target_name: QuoteService.getDailyQuote
          input_type: []
          output_type:
            - developer_name: quote
              label: Quote
              description: Quote
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: author
              label: Author
              description: Author
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
  surfaces: []
