schema_version: '2.0'
global_configuration:
  developer_name: tenant_screening_agent_v62
  label: Tenant Screening Agent V 62
  description: Assists users with applicant management through the tenant screening
    specialist workflow.
  enable_enhanced_event_logs: true
  agent_type: EinsteinServiceAgent
  default_agent_user: tenant_screening@example.com
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! I am your Tenant Screening Specialist Assistant. How can I help
        you today?
      message_type: Welcome
    - message: I apologize, something went wrong on my end. Could you please rephrase
        your request?
      message_type: Error
  modality_parameters:
    language:
      default_locale: en_US
      additional_locales: []
      all_additional_locales: false
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! I am your Tenant Screening Specialist Assistant.
      How can I help you today?", "messageType": "Welcome"}, {"message": "I apologize,
      something went wrong on my end. Could you please rephrase your request?", "messageType":
      "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: applicant_record_id
      label: Applicant Record Id
      description: Record ID of the applicant
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: applicant_status
      label: Applicant Status
      description: Current status of the applicant
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: applicant_tier
      label: Applicant Tier
      description: Tier classification for the applicant
      data_type: string
      is_list: false
      default: '''standard'''
      visibility: Internal
    - developer_name: applicant_category
      label: Applicant Category
      description: Category of the applicant
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: contact_name
      label: Contact Name
      description: Full name of the contact
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: contact_email
      label: Contact Email
      description: Email address of the contact
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: contact_phone
      label: Contact Phone
      description: Phone number of the contact
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: is_verified
      label: Is Verified
      description: Whether the user identity is verified
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: eligibility_score
      label: Eligibility Score
      description: Calculated eligibility score
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: step_counter
      label: Step Counter
      description: Current step in the process
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: attempt_count
      label: Attempt Count
      description: Number of attempts made
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: total_items_count
      label: Total Items Count
      description: Total number of items to process
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: application_review_complete
      label: Application Review Complete
      description: Whether the application_review stage is complete
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: application_review_result
      label: Application Review Result
      description: Result from the application_review stage
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: background_check_complete
      label: Background Check Complete
      description: Whether the background_check stage is complete
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: background_check_result
      label: Background Check Result
      description: Result from the background_check stage
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: reference_check_complete
      label: Reference Check Complete
      description: Whether the reference_check stage is complete
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: reference_check_result
      label: Reference Check Result
      description: Result from the reference_check stage
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: decision_complete
      label: Decision Complete
      description: Whether the decision stage is complete
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: decision_result
      label: Decision Result
      description: Result from the decision stage
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: priority_level
      label: Priority Level
      description: Priority level of the request
      data_type: string
      is_list: false
      default: '''normal'''
      visibility: Internal
    - developer_name: notes_text
      label: Notes Text
      description: Notes and comments
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: assigned_agent
      label: Assigned Agent
      description: Assigned agent name
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: resolution_summary
      label: Resolution Summary
      description: Summary of the resolution
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: escalation_requested
      label: Escalation Requested
      description: Whether escalation was requested
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: is_business_hours
      label: Is Business Hours
      description: Whether it is currently business hours
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: case_ref_number
      label: Case Ref Number
      description: Reference number for the support case
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: next_available_slot
      label: Next Available Slot
      description: Next available time slot
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
  initial_node: topic_selector
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                You are a topic selector for a tenant screening specialist assistant.

                Analyze the user''s input and determine the most appropriate topic.

                Current applicant status: {{state.applicant_status}}

                Eligibility score: {{state.eligibility_score}}

                Steps completed: {{state.step_counter}}

                Priority: {{state.priority_level}}

                Use action.go_to_application_review for application review requests.

                Use action.go_to_background_check for background check requests.

                Use action.go_to_reference_check for reference check requests.

                Use action.go_to_decision for decision requests.

                Use action.go_to_escalation to escalate if the user is upset or requests
                a human.'
      instructions: 'You are a professional tenant screening specialist assistant.

        Help users manage their applicant requests efficiently and accurately.

        Always verify the user''s identity before proceeding with sensitive operations.

        Follow the established workflow: application_review -> background_check ->
        reference_check -> decision.

        Be concise, professional, and confirm next steps at the end of each exchange.

        If the user is upset or asks for a human, escalate immediately.

        Never reveal internal record IDs or system identifiers to the user.'
      type: subagent
      reasoning_type: salesforce.default
      description: Welcome the user and route to the appropriate applicant management
        topic
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"application_review"'
          name: go_to_application_review
          description: Transition to application review topic.
        - type: action
          target: __state_update_action__
          enabled: state.is_verified == True
          state_updates:
            - AgentScriptInternal_next_topic: '"background_check"'
          name: go_to_background_check
          description: Transition to background check topic.
        - type: action
          target: __state_update_action__
          enabled: state.is_verified == True
          state_updates:
            - AgentScriptInternal_next_topic: '"reference_check"'
          name: go_to_reference_check
          description: Transition to reference check topic.
        - type: action
          target: __state_update_action__
          enabled: state.is_verified == True
          state_updates:
            - AgentScriptInternal_next_topic: '"decision"'
          name: go_to_decision
          description: Transition to decision topic.
        - type: action
          target: __state_update_action__
          enabled: state.is_verified == True
          state_updates:
            - AgentScriptInternal_next_topic: '"escalation_handling"'
          name: go_to_escalation
          description: Escalate to a human agent for assistance.
      after_all_tool_calls:
        - type: handoff
          target: application_review
          enabled: state.AgentScriptInternal_next_topic=="application_review"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: background_check
          enabled: state.AgentScriptInternal_next_topic=="background_check"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: reference_check
          enabled: state.AgentScriptInternal_next_topic=="reference_check"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: decision
          enabled: state.AgentScriptInternal_next_topic=="decision"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: escalation_handling
          enabled: state.AgentScriptInternal_next_topic=="escalation_handling"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: topic_selector
      label: Topic Selector
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Handle the application review stage for the applicant.

                Current applicant status: {{state.applicant_status}}

                Step {{state.step_counter + 1}} of the process.

                Attempts so far: {{state.attempt_count}}

                Contact: {{state.contact_name}} ({{state.contact_email}})

                Application Review result: {{state.application_review_result}}

                Priority level: {{state.priority_level}}

                Current tier: {{state.applicant_tier}}

                If the contact information is missing, ask the user to provide their
                name and email.

                After collecting information, use action.run_application_review to
                begin processing.'
      instructions: 'You are a professional tenant screening specialist assistant.

        Help users manage their applicant requests efficiently and accurately.

        Always verify the user''s identity before proceeding with sensitive operations.

        Follow the established workflow: application_review -> background_check ->
        reference_check -> decision.

        Be concise, professional, and confirm next steps at the end of each exchange.

        If the user is upset or asks for a human, escalate immediately.

        Never reveal internal record IDs or system identifiers to the user.'
      type: subagent
      reasoning_type: salesforce.default
      description: Handles the application review stage of the applicant process
      before_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.is_verified == False
        - type: action
          target: validate_application_review_info
          bound_inputs:
            record_ref: state.applicant_record_id
            contact_ref: state.contact_email
          llm_inputs: []
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - applicant_status: result.updated_status
            - is_verified: result.is_valid
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: process_application_review_data
          bound_inputs:
            record_ref: state.applicant_record_id
            step_num: state.step_counter
            category_val: state.applicant_category
          llm_inputs: []
          state_updates:
            - application_review_result: result.result_code
            - eligibility_score: result.score_value
            - application_review_complete: result.is_passed
          name: run_application_review
          description: Run Application Review
        - type: action
          target: fetch_application_review_details
          bound_inputs:
            record_ref: state.applicant_record_id
            include_history: 'False'
          llm_inputs: []
          state_updates:
            - total_items_count: result.item_count
            - applicant_tier: result.tier_value
          name: fetch_application_review_info
          description: Fetch Application Review Info
        - type: action
          target: __state_update_action__
          enabled: state.application_review_complete == True and state.eligibility_score
            >= 50
          state_updates:
            - AgentScriptInternal_next_topic: '"background_check"'
          name: go_to_background_check
          description: Move to background check stage.
        - type: action
          target: __state_update_action__
          enabled: state.escalation_requested == True
          state_updates:
            - AgentScriptInternal_next_topic: '"escalation_handling"'
          name: escalate_now
          description: Escalate if issues arise.
      after_all_tool_calls:
        - type: handoff
          target: background_check
          enabled: state.AgentScriptInternal_next_topic=="background_check"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: escalation_handling
          enabled: state.AgentScriptInternal_next_topic=="escalation_handling"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      after_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - step_counter: state.step_counter + 1
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - attempt_count: state.attempt_count + 1
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.eligibility_score >= 70
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - applicant_tier: '"premium"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.eligibility_score >= 40 and state.eligibility_score
                < 70
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - applicant_tier: '"standard"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.eligibility_score < 40
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - applicant_tier: '"basic"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.attempt_count >= 3 and state.application_review_complete
                == False
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - priority_level: '"high"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.attempt_count >= 5
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - escalation_requested: 'True'
      developer_name: application_review
      label: Application Review
      action_definitions:
        - developer_name: process_application_review_data
          label: Process Application Review Data
          description: Process application review stage data for the applicant
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: standardInvocableAction
          invocation_target_name: Process_ApplicationReview
          input_type:
            - developer_name: record_ref
              label: Record Ref
              description: Record Ref
              data_type: String
              is_list: false
              required: false
              is_user_input: false
            - developer_name: step_num
              label: Step Num
              description: Step Num
              data_type: Double
              is_list: false
              required: false
              is_user_input: false
            - developer_name: category_val
              label: Category Val
              description: Category Val
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: result_code
              label: Result Code
              description: Result Code
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: result_message
              label: Result Message
              description: Result Message
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: score_value
              label: Score Value
              description: Score Value
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: is_passed
              label: Is Passed
              description: Is Passed
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: validate_application_review_info
          label: Validate Application Review Info
          description: Validate application review information for the applicant
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Validate_ApplicationReview_Info
          input_type:
            - developer_name: record_ref
              label: Record Ref
              description: Record Ref
              data_type: String
              is_list: false
              required: false
              is_user_input: false
            - developer_name: contact_ref
              label: Contact Ref
              description: Contact Ref
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: is_valid
              label: Is Valid
              description: Is Valid
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: error_msg
              label: Error Msg
              description: Error Msg
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: updated_status
              label: Updated Status
              description: Updated Status
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: fetch_application_review_details
          label: Fetch Application Review Details
          description: Fetch application review details for the applicant
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Fetch_ApplicationReview_Details
          input_type:
            - developer_name: record_ref
              label: Record Ref
              description: Record Ref
              data_type: String
              is_list: false
              required: false
              is_user_input: false
            - developer_name: include_history
              label: Include History
              description: Include History
              data_type: Boolean
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: detail_data
              label: Detail Data
              description: Detail Data
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: item_count
              label: Item Count
              description: Item Count
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: tier_value
              label: Tier Value
              description: Tier Value
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: last_updated
              label: Last Updated
              description: Last Updated
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Handle the background check stage for the applicant.

                Current applicant status: {{state.applicant_status}}

                Step {{state.step_counter + 1}} of the process.

                Attempts so far: {{state.attempt_count}}

                Contact: {{state.contact_name}} ({{state.contact_email}})

                Background Check result: {{state.background_check_result}}

                Priority level: {{state.priority_level}}

                Current tier: {{state.applicant_tier}}

                Review the background check results and determine next steps.

                Eligibility score: {{state.eligibility_score}}

                If the score is sufficient, proceed to the next stage.

                If the user has concerns, address them before proceeding.'
      instructions: 'You are a professional tenant screening specialist assistant.

        Help users manage their applicant requests efficiently and accurately.

        Always verify the user''s identity before proceeding with sensitive operations.

        Follow the established workflow: application_review -> background_check ->
        reference_check -> decision.

        Be concise, professional, and confirm next steps at the end of each exchange.

        If the user is upset or asks for a human, escalate immediately.

        Never reveal internal record IDs or system identifiers to the user.'
      type: subagent
      reasoning_type: salesforce.default
      description: Handles the background check stage of the applicant process
      before_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.attempt_count > 5
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - escalation_requested: 'True'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.application_review_complete ==
                False
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - AgentScriptInternal_next_topic: '"application_review"'
        - type: handoff
          target: application_review
          enabled: state.AgentScriptInternal_next_topic=="application_review"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: process_background_check_data
          bound_inputs:
            record_ref: state.applicant_record_id
            step_num: state.step_counter
            category_val: state.applicant_category
          llm_inputs: []
          state_updates:
            - background_check_result: result.result_code
            - eligibility_score: result.score_value
            - background_check_complete: result.is_passed
          name: run_background_check
          description: Run Background Check
        - type: action
          target: fetch_background_check_details
          bound_inputs:
            record_ref: state.applicant_record_id
            include_history: 'False'
          llm_inputs: []
          enabled: state.applicant_record_id is not None
          state_updates:
            - total_items_count: result.item_count
