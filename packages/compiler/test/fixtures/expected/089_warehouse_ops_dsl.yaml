schema_version: '2.0'
global_configuration:
  developer_name: warehouse_ops_agent_v89
  label: Warehouse Ops Agent V 89
  description: Assists users with warehouse management through the warehouse operations
    agent workflow.
  enable_enhanced_event_logs: true
  agent_type: EinsteinServiceAgent
  default_agent_user: warehouse_ops@example.com
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! I am your Warehouse Operations Agent Assistant. How can I help
        you today?
      message_type: Welcome
    - message: I apologize, something went wrong on my end. Could you please rephrase
        your request?
      message_type: Error
  modality_parameters:
    language:
      default_locale: en_US
      additional_locales: []
      all_additional_locales: false
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! I am your Warehouse Operations Agent Assistant.
      How can I help you today?", "messageType": "Welcome"}, {"message": "I apologize,
      something went wrong on my end. Could you please rephrase your request?", "messageType":
      "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: warehouse_record_id
      label: Warehouse Record Id
      description: Record ID of the warehouse
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: warehouse_status
      label: Warehouse Status
      description: Current status of the warehouse
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: warehouse_tier
      label: Warehouse Tier
      description: Tier classification for the warehouse
      data_type: string
      is_list: false
      default: '''standard'''
      visibility: Internal
    - developer_name: warehouse_category
      label: Warehouse Category
      description: Category of the warehouse
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: contact_name
      label: Contact Name
      description: Full name of the contact
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: contact_email
      label: Contact Email
      description: Email address of the contact
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: contact_phone
      label: Contact Phone
      description: Phone number of the contact
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: is_verified
      label: Is Verified
      description: Whether the user identity is verified
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: eligibility_score
      label: Eligibility Score
      description: Calculated eligibility score
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: step_counter
      label: Step Counter
      description: Current step in the process
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: attempt_count
      label: Attempt Count
      description: Number of attempts made
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: total_items_count
      label: Total Items Count
      description: Total number of items to process
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: receiving_complete
      label: Receiving Complete
      description: Whether the receiving stage is complete
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: receiving_result
      label: Receiving Result
      description: Result from the receiving stage
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: put_away_complete
      label: Put Away Complete
      description: Whether the put_away stage is complete
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: put_away_result
      label: Put Away Result
      description: Result from the put_away stage
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: pick_and_pack_complete
      label: Pick And Pack Complete
      description: Whether the pick_and_pack stage is complete
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: pick_and_pack_result
      label: Pick And Pack Result
      description: Result from the pick_and_pack stage
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: dispatch_complete
      label: Dispatch Complete
      description: Whether the dispatch stage is complete
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: dispatch_result
      label: Dispatch Result
      description: Result from the dispatch stage
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: priority_level
      label: Priority Level
      description: Priority level of the request
      data_type: string
      is_list: false
      default: '''normal'''
      visibility: Internal
    - developer_name: notes_text
      label: Notes Text
      description: Notes and comments
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: assigned_agent
      label: Assigned Agent
      description: Assigned agent name
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: resolution_summary
      label: Resolution Summary
      description: Summary of the resolution
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: escalation_requested
      label: Escalation Requested
      description: Whether escalation was requested
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: is_business_hours
      label: Is Business Hours
      description: Whether it is currently business hours
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: case_ref_number
      label: Case Ref Number
      description: Reference number for the support case
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: next_available_slot
      label: Next Available Slot
      description: Next available time slot
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
  initial_node: topic_selector
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                You are a topic selector for a warehouse operations agent assistant.

                Analyze the user''s input and determine the most appropriate topic.

                Current warehouse status: {{state.warehouse_status}}

                Eligibility score: {{state.eligibility_score}}

                Steps completed: {{state.step_counter}}

                Priority: {{state.priority_level}}

                Use action.go_to_receiving for receiving requests.

                Use action.go_to_put_away for put away requests.

                Use action.go_to_pick_and_pack for pick and pack requests.

                Use action.go_to_dispatch for dispatch requests.

                Use action.go_to_escalation to escalate if the user is upset or requests
                a human.'
      instructions: 'You are a professional warehouse operations agent assistant.

        Help users manage their warehouse requests efficiently and accurately.

        Always verify the user''s identity before proceeding with sensitive operations.

        Follow the established workflow: receiving -> put_away -> pick_and_pack ->
        dispatch.

        Be concise, professional, and confirm next steps at the end of each exchange.

        If the user is upset or asks for a human, escalate immediately.

        Never reveal internal record IDs or system identifiers to the user.'
      type: subagent
      reasoning_type: salesforce.default
      description: Welcome the user and route to the appropriate warehouse management
        topic
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"receiving"'
          name: go_to_receiving
          description: Transition to receiving topic.
        - type: action
          target: __state_update_action__
          enabled: state.is_verified == True
          state_updates:
            - AgentScriptInternal_next_topic: '"put_away"'
          name: go_to_put_away
          description: Transition to put away topic.
        - type: action
          target: __state_update_action__
          enabled: state.is_verified == True
          state_updates:
            - AgentScriptInternal_next_topic: '"pick_and_pack"'
          name: go_to_pick_and_pack
          description: Transition to pick and pack topic.
        - type: action
          target: __state_update_action__
          enabled: state.is_verified == True
          state_updates:
            - AgentScriptInternal_next_topic: '"dispatch"'
          name: go_to_dispatch
          description: Transition to dispatch topic.
        - type: action
          target: __state_update_action__
          enabled: state.is_verified == True
          state_updates:
            - AgentScriptInternal_next_topic: '"escalation_handling"'
          name: go_to_escalation
          description: Escalate to a human agent for assistance.
      after_all_tool_calls:
        - type: handoff
          target: receiving
          enabled: state.AgentScriptInternal_next_topic=="receiving"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: put_away
          enabled: state.AgentScriptInternal_next_topic=="put_away"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: pick_and_pack
          enabled: state.AgentScriptInternal_next_topic=="pick_and_pack"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: dispatch
          enabled: state.AgentScriptInternal_next_topic=="dispatch"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: escalation_handling
          enabled: state.AgentScriptInternal_next_topic=="escalation_handling"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: topic_selector
      label: Topic Selector
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Handle the receiving stage for the warehouse.

                Current warehouse status: {{state.warehouse_status}}

                Step {{state.step_counter + 1}} of the process.

                Attempts so far: {{state.attempt_count}}

                Contact: {{state.contact_name}} ({{state.contact_email}})

                Receiving result: {{state.receiving_result}}

                Priority level: {{state.priority_level}}

                Current tier: {{state.warehouse_tier}}

                If the contact information is missing, ask the user to provide their
                name and email.

                After collecting information, use action.run_receiving to begin processing.'
      instructions: 'You are a professional warehouse operations agent assistant.

        Help users manage their warehouse requests efficiently and accurately.

        Always verify the user''s identity before proceeding with sensitive operations.

        Follow the established workflow: receiving -> put_away -> pick_and_pack ->
        dispatch.

        Be concise, professional, and confirm next steps at the end of each exchange.

        If the user is upset or asks for a human, escalate immediately.

        Never reveal internal record IDs or system identifiers to the user.'
      type: subagent
      reasoning_type: salesforce.default
      description: Handles the receiving stage of the warehouse process
      before_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.is_verified == False
        - type: action
          target: validate_receiving_info
          bound_inputs:
            record_ref: state.warehouse_record_id
            contact_ref: state.contact_email
          llm_inputs: []
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - warehouse_status: result.updated_status
            - is_verified: result.is_valid
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: process_receiving_data
          bound_inputs:
            record_ref: state.warehouse_record_id
            step_num: state.step_counter
            category_val: state.warehouse_category
          llm_inputs: []
          state_updates:
            - receiving_result: result.result_code
            - eligibility_score: result.score_value
            - receiving_complete: result.is_passed
          name: run_receiving
          description: Run Receiving
        - type: action
          target: fetch_receiving_details
          bound_inputs:
            record_ref: state.warehouse_record_id
            include_history: 'False'
          llm_inputs: []
          state_updates:
            - total_items_count: result.item_count
            - warehouse_tier: result.tier_value
          name: fetch_receiving_info
          description: Fetch Receiving Info
        - type: action
          target: __state_update_action__
          enabled: state.receiving_complete == True and state.eligibility_score >=
            50
          state_updates:
            - AgentScriptInternal_next_topic: '"put_away"'
          name: go_to_put_away
          description: Move to put away stage.
        - type: action
          target: __state_update_action__
          enabled: state.escalation_requested == True
          state_updates:
            - AgentScriptInternal_next_topic: '"escalation_handling"'
          name: escalate_now
          description: Escalate if issues arise.
      after_all_tool_calls:
        - type: handoff
          target: put_away
          enabled: state.AgentScriptInternal_next_topic=="put_away"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: escalation_handling
          enabled: state.AgentScriptInternal_next_topic=="escalation_handling"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      after_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - step_counter: state.step_counter + 1
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - attempt_count: state.attempt_count + 1
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.eligibility_score >= 70
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - warehouse_tier: '"premium"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.eligibility_score >= 40 and state.eligibility_score
                < 70
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - warehouse_tier: '"standard"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.eligibility_score < 40
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - warehouse_tier: '"basic"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.attempt_count >= 3 and state.receiving_complete
                == False
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - priority_level: '"high"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.attempt_count >= 5
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - escalation_requested: 'True'
      developer_name: receiving
      label: Receiving
      action_definitions:
        - developer_name: process_receiving_data
          label: Process Receiving Data
          description: Process receiving stage data for the warehouse
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: standardInvocableAction
          invocation_target_name: Process_Receiving
          input_type:
            - developer_name: record_ref
              label: Record Ref
              description: Record Ref
              data_type: String
              is_list: false
              required: false
              is_user_input: false
            - developer_name: step_num
              label: Step Num
              description: Step Num
              data_type: Double
              is_list: false
              required: false
              is_user_input: false
            - developer_name: category_val
              label: Category Val
              description: Category Val
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: result_code
              label: Result Code
              description: Result Code
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: result_message
              label: Result Message
              description: Result Message
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: score_value
              label: Score Value
              description: Score Value
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: is_passed
              label: Is Passed
              description: Is Passed
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: validate_receiving_info
          label: Validate Receiving Info
          description: Validate receiving information for the warehouse
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Validate_Receiving_Info
          input_type:
            - developer_name: record_ref
              label: Record Ref
              description: Record Ref
              data_type: String
              is_list: false
              required: false
              is_user_input: false
            - developer_name: contact_ref
              label: Contact Ref
              description: Contact Ref
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: is_valid
              label: Is Valid
              description: Is Valid
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: error_msg
              label: Error Msg
              description: Error Msg
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: updated_status
              label: Updated Status
              description: Updated Status
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: fetch_receiving_details
          label: Fetch Receiving Details
          description: Fetch receiving details for the warehouse
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Fetch_Receiving_Details
          input_type:
            - developer_name: record_ref
              label: Record Ref
              description: Record Ref
              data_type: String
              is_list: false
              required: false
              is_user_input: false
            - developer_name: include_history
              label: Include History
              description: Include History
              data_type: Boolean
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: detail_data
              label: Detail Data
              description: Detail Data
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: item_count
              label: Item Count
              description: Item Count
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: tier_value
              label: Tier Value
              description: Tier Value
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: last_updated
              label: Last Updated
              description: Last Updated
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Handle the put away stage for the warehouse.

                Current warehouse status: {{state.warehouse_status}}

                Step {{state.step_counter + 1}} of the process.

                Attempts so far: {{state.attempt_count}}

                Contact: {{state.contact_name}} ({{state.contact_email}})

                Put Away result: {{state.put_away_result}}

                Priority level: {{state.priority_level}}

                Current tier: {{state.warehouse_tier}}

                Review the put away results and determine next steps.

                Eligibility score: {{state.eligibility_score}}

                If the score is sufficient, proceed to the next stage.

                If the user has concerns, address them before proceeding.'
      instructions: 'You are a professional warehouse operations agent assistant.

        Help users manage their warehouse requests efficiently and accurately.

        Always verify the user''s identity before proceeding with sensitive operations.

        Follow the established workflow: receiving -> put_away -> pick_and_pack ->
        dispatch.

        Be concise, professional, and confirm next steps at the end of each exchange.

        If the user is upset or asks for a human, escalate immediately.

        Never reveal internal record IDs or system identifiers to the user.'
      type: subagent
      reasoning_type: salesforce.default
      description: Handles the put away stage of the warehouse process
      before_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.attempt_count > 5
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - escalation_requested: 'True'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.receiving_complete == False
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - AgentScriptInternal_next_topic: '"receiving"'
        - type: handoff
          target: receiving
          enabled: state.AgentScriptInternal_next_topic=="receiving"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: process_put_away_data
          bound_inputs:
            record_ref: state.warehouse_record_id
            step_num: state.step_counter
            category_val: state.warehouse_category
          llm_inputs: []
          state_updates:
            - put_away_result: result.result_code
            - eligibility_score: result.score_value
            - put_away_complete: result.is_passed
          name: run_put_away
          description: Run Put Away
        - type: action
          target: fetch_put_away_details
          bound_inputs:
            record_ref: state.warehouse_record_id
            include_history: 'False'
          llm_inputs: []
          enabled: state.warehouse_record_id is not None
          state_updates:
            - total_items_count: result.item_count
            - warehouse_tier: result.tier_value
          name: fetch_put_away_info
          description: Fetch Put Away Info
