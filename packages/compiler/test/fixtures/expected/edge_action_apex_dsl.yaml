# NOTE: Differs from Python compiler — TS uses explicit label for input descriptions
# when no description is set. Python uses normalizeDeveloperName(name) instead,
# which discards the author's explicit label.
schema_version: "2.0"
global_configuration:
  developer_name: Apex_Actions_Agent
  label: Apex Actions Agent
  description: Agent with multiple apex:// action targets
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables: []
  default_agent_user: user@test.com
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! I can help you manage your account.
      message_type: Welcome
    - message: An error occurred while processing your request.
      message_type: Error
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: "''"
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: account_id
      label: Account Id
      description: Account identifier
      data_type: string
      is_list: false
      visibility: Internal
      default: "''"
  initial_node: main
  nodes:
    - type: subagent
      reasoning_type: salesforce.default
      description: Agent with multiple apex:// action targets
      tools:
        - type: action
          target: Validate_Account
          bound_inputs:
            account_id: state.account_id
          llm_inputs: []
          state_updates: []
          name: Validate_Action
          description: Validate Action
        - type: action
          target: Get_Account
          bound_inputs:
            account_id: state.account_id
          llm_inputs: []
          state_updates: []
          name: Get_Action
          description: Get Action
        - type: action
          target: Create_Transaction
          bound_inputs:
            account_id: state.account_id
          llm_inputs:
            - amount
            - type
          state_updates: []
          name: Transaction_Action
          description: Transaction Action
      developer_name: main
      label: Main
      action_definitions:
        - developer_name: Get_Account
          label: Get Account
          description: Get account details via Apex
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: apex
          invocation_target_name: AccountController.getAccount
          input_type:
            - developer_name: account_id
              label: Account ID
              description: Account ID
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: account_name
              label: Account Name
              description: Account Name
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: balance
              label: Account Balance
              description: Balance
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: Create_Transaction
          label: Create Transaction
          description: Create a transaction via Apex
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: apex
          invocation_target_name: TransactionController.createTransaction
          input_type:
            - developer_name: account_id
              label: Account ID
              description: Account ID
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: amount
              label: Amount
              description: Amount
              data_type: Double
              is_list: false
              required: true
              is_user_input: false
            - developer_name: type
              label: Transaction Type
              description: Transaction Type
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: transaction_id
              label: Transaction ID
              description: Transaction Id
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: new_balance
              label: New Balance
              description: New Balance
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: Validate_Account
          label: Validate Account
          description: Validate account status via Apex
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: apex
          invocation_target_name: AccountController.validateAccount
          input_type:
            - developer_name: account_id
              label: Account ID
              description: Account ID
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: is_valid
              label: Is Valid
              description: Is Valid
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: status
              label: Account Status
              description: Status
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
      instructions: You are a helpful account management agent.
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                Help the user manage their account using Apex controllers.
  surfaces: []
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! I can help you manage your account.",
      "messageType": "Welcome"}, {"message": "An error occurred while processing
      your request.", "messageType": "Error"}]'
