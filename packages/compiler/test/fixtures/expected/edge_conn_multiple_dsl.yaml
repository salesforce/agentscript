schema_version: '2.0'
global_configuration:
  developer_name: EdgeConnMultiple
  label: Omnichannel Agent
  description: Agent with multiple connection blocks
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: omni_bot@example.com
  context_variables:
    - developer_name: EndUserId
      label: End User Id
      description: Messaging end user ID
      data_type: string
      field_mapping: MessagingSession.MessagingEndUserId
    - developer_name: RoutableId
      label: Routable Id
      description: Messaging session ID
      data_type: string
      field_mapping: MessagingSession.Id
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! I'm available to help on any channel.
      message_type: Welcome
    - message: Something went wrong.
      message_type: Error
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! I''m available to help on any channel.",
      "messageType": "Welcome"}, {"message": "Something went wrong.", "messageType":
      "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Help the user regardless of their communication channel.'
      instructions: You are an omnichannel support agent available on messaging and
        Slack.
      type: subagent
      reasoning_type: salesforce.default
      description: Handle support requests from any channel
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"support"'
          name: go_to_support
          description: General support topic
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '''__human__'''
          name: escalate_to_human
          description: Escalate to human agent
      after_all_tool_calls:
        - type: handoff
          target: support
          enabled: state.AgentScriptInternal_next_topic=="support"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: __human__
          enabled: state.AgentScriptInternal_next_topic == '__human__'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: main
      label: Main
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Provide general support to the customer.'
      instructions: You are an omnichannel support agent available on messaging and
        Slack.
      type: subagent
      reasoning_type: salesforce.default
      description: General support topic
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      developer_name: support
      label: Support
      action_definitions: []
  surfaces:
    - surface_type: messaging
      adaptive_response_allowed: true
      outbound_route_configs: []
    - surface_type: slack
      adaptive_response_allowed: true
      outbound_route_configs: []
