schema_version: "2.0"
global_configuration:
  developer_name: No_Desc_Vars_Agent
  label: No Desc Vars Agent
  description: Agent with variables that have no descriptions
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables:
    - developer_name: session_ref
      label: Session Ref
      description: Session_Ref
      data_type: string
      field_mapping: MessagingSession.Id
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages: []
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: "''"
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: name
      label: Name
      description: Name
      data_type: string
      is_list: false
      visibility: Internal
      default: "''"
    - developer_name: age
      label: Age
      description: Age
      data_type: number
      is_list: false
      visibility: Internal
      default: 0
    - developer_name: active
      label: Active
      description: Active
      data_type: boolean
      is_list: false
      visibility: Internal
      default: true
    - developer_name: data
      label: Data
      description: Data
      data_type: object
      is_list: false
      visibility: Internal
    - developer_name: items
      label: Items
      description: Items
      data_type: string
      is_list: true
      visibility: Internal
    - developer_name: counts
      label: Counts
      description: Counts
      data_type: number
      is_list: true
      visibility: Internal
  initial_node: main
  nodes:
    - type: subagent
      reasoning_type: salesforce.default
      description: Process without described variables
      tools: []
      developer_name: main
      label: Main
      action_definitions: []
      instructions: You are an agent with variables that have no descriptions.
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                Process the request using available variables
  surfaces: []
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
