# NOTE: Differs from Python compiler — TS uses explicit label for input descriptions
# when no description is set. Python uses normalizeDeveloperName(name) instead,
# which discards the author's explicit label.
schema_version: "2.0"
global_configuration:
  developer_name: Invocable_Actions_Agent
  label: Invocable Actions Agent
  description: Agent with standardInvocableAction:// targets
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables: []
  default_agent_user: user@test.com
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! I can help you send emails, create tasks, and generate reports.
      message_type: Welcome
    - message: An error occurred while processing your request.
      message_type: Error
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: "''"
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
  initial_node: main
  nodes:
    - type: subagent
      reasoning_type: salesforce.default
      description: Agent with standardInvocableAction:// targets
      tools:
        - type: action
          target: Send_Email
          bound_inputs: {}
          llm_inputs:
            - recipient
            - subject
            - body
          state_updates: []
          name: Email_Action
          description: Email Action
        - type: action
          target: Create_Task
          bound_inputs: {}
          llm_inputs:
            - title
            - assignee
            - due_date
          state_updates: []
          name: Task_Action
          description: Task Action
        - type: action
          target: Generate_Report
          bound_inputs: {}
          llm_inputs:
            - report_type
            - date_range
          state_updates: []
          name: Report_Action
          description: Report Action
      developer_name: main
      label: Main
      action_definitions:
        - developer_name: Send_Email
          label: Send Email
          description: Send an email via standard invocable action
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: standardInvocableAction
          invocation_target_name: SendEmailAction
          input_type:
            - developer_name: recipient
              label: Recipient Email
              description: Recipient Email
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: subject
              label: Email Subject
              description: Email Subject
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: body
              label: Email Body
              description: Email Body
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: sent
              label: Email Sent
              description: Sent
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: message_id
              label: Message ID
              description: Message Id
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: Create_Task
          label: Create Task
          description: Create a task via standard invocable action
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: standardInvocableAction
          invocation_target_name: CreateTaskAction
          input_type:
            - developer_name: title
              label: Task Title
              description: Task Title
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: assignee
              label: Assignee
              description: Assignee
              data_type: String
              is_list: false
              required: false
              is_user_input: false
            - developer_name: due_date
              label: Due Date
              description: Due Date
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: task_id
              label: Task ID
              description: Task Id
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: status
              label: Task Status
              description: Status
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: Generate_Report
          label: Generate Report
          description: Generate a report via standard invocable action
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: standardInvocableAction
          invocation_target_name: GenerateReportAction
          input_type:
            - developer_name: report_type
              label: Report Type
              description: Report Type
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: date_range
              label: Date Range
              description: Date Range
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: report_url
              label: Report URL
              description: Report Url
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
      instructions: You are a helpful assistant for email, tasks, and reports.
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                Help the user with email, tasks, and reports.
  surfaces: []
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! I can help you send emails, create tasks,
      and generate reports.", "messageType": "Welcome"}, {"message": "An error
      occurred while processing your request.", "messageType": "Error"}]'
