schema_version: "2.0"
global_configuration:
  developer_name: CustomizableConnectionAgent
  label: Customizable Connections
  description: Agent with Customizable Connections
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables: []
  default_agent_user: NEW AGENT USER
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hi, I'm an AI assistant. How can I help you?
      message_type: Welcome
    - message: Sorry, it looks like something has gone wrong.
      message_type: Error
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: "''"
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: Context
      label: Context
      description: Context
      data_type: string
      is_list: false
      visibility: Internal
      default: "'haha'"
  initial_node: start
  nodes:
    - type: subagent
      reasoning_type: salesforce.default
      description: test
      tools: []
      developer_name: start
      label: Start
      action_definitions: []
      instructions: You are an AI Agent
    - type: subagent
      reasoning_type: salesforce.default
      description: a topic
      tools: []
      developer_name: hello
      label: Hello
      action_definitions: []
      instructions: You are an AI Agent
  surfaces:
    - surface_type: slack
      outbound_route_configs: []
    - surface_type: messaging
      outbound_route_configs:
        - outbound_route_type: OmniChannelFlow
          outbound_route_name: flow://PenguinSlide
          escalation_message: Connecting you to the next available representative penguin
    - surface_type: service_email
      outbound_route_configs:
        - outbound_route_type: OmniChannelFlow
          outbound_route_name: flow://PenguinSlide
      input_parameters:
        - developer_name: LegalDisclosure
          label: Legal Disclosure
          description: Legal Disclosure
          data_type: string
          default_value: "'This response was generated by a penguin.'"
        - developer_name: Signature
          label: Signature
          description: Signature
          data_type: string
          default_value: "'quack'"
        - developer_name: MailSlotNumber
          label: Mail Slot Number
          description: Mail Slot Number
          data_type: double
          default_value: 1
        - developer_name: PenguinSpeechify
          label: Penguin Speechify
          description: whether to translate response into penguin speech
          data_type: boolean
          default_value: false
    - surface_type: penguin
      outbound_route_configs: []
      input_parameters:
        - developer_name: IsHappy
          label: Is Happy
          description: Is Happy
          data_type: boolean
          default_value: false
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: "[{\"message\": \"Hi, I'm an AI assistant. How can I help
      you?\", \"messageType\": \"Welcome\"}, {\"message\": \"Sorry, it looks
      like something has gone wrong.\", \"messageType\": \"Error\"}]"
