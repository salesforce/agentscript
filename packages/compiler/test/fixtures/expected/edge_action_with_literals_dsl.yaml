schema_version: '2.0'
global_configuration:
  developer_name: EdgeActionWithLiterals
  label: Edge Action With Literals
  description: Tests with clauses using literal string, number, and boolean values
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: admin@example.com
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages: []
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: result
      label: Result
      description: Result of the operation
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: count
      label: Count
      description: Count result
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: is_active
      label: Is Active
      description: Active status
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Help users by running actions with specific literal values.

                Use the appropriate action based on the request.'
      instructions: You are a service agent that processes requests with specific
        values.
      type: subagent
      reasoning_type: salesforce.default
      description: Demonstrate literal with clauses
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: greet_user
          bound_inputs:
            name: '"John"'
            greeting_type: '"formal"'
          llm_inputs: []
          state_updates:
            - result: result.message
          name: greet_john
          description: Greet John
        - type: action
          target: process_count
          bound_inputs:
            count: '5'
            multiplier: '10'
          llm_inputs: []
          state_updates:
            - count: result.total
          name: process_five
          description: Process Five
        - type: action
          target: set_status
          bound_inputs:
            active: 'True'
            reason: '"User requested activation"'
          llm_inputs: []
          state_updates:
            - is_active: result.confirmed
          name: activate
          description: Activate
        - type: action
          target: set_status
          bound_inputs:
            active: 'False'
            reason: '"Scheduled deactivation"'
          llm_inputs: []
          state_updates:
            - is_active: result.confirmed
          name: deactivate
          description: Deactivate
        - type: action
          target: mixed_literals
          bound_inputs:
            tag: '"priority_high"'
            threshold: '100'
            enabled: 'True'
          llm_inputs: []
          state_updates:
            - result: result.result
          name: mixed_action
          description: Mixed Action
      developer_name: main
      label: Main
      action_definitions:
        - developer_name: greet_user
          label: Greet User
          description: Greet a user by name
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Greet_User
          input_type:
            - developer_name: name
              label: Name
              description: Name
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: greeting_type
              label: Greeting Type
              description: Greeting Type
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: message
              label: Message
              description: Message
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: process_count
          label: Process Count
          description: Process a count value
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Process_Count
          input_type:
            - developer_name: count
              label: Count
              description: Count
              data_type: Double
              is_list: false
              required: true
              is_user_input: false
            - developer_name: multiplier
              label: Multiplier
              description: Multiplier
              data_type: Double
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: total
              label: Total
              description: Total
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: set_status
          label: Set Status
          description: Set active status
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Set_Status
          input_type:
            - developer_name: active
              label: Active
              description: Active
              data_type: Boolean
              is_list: false
              required: true
              is_user_input: false
            - developer_name: reason
              label: Reason
              description: Reason
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: confirmed
              label: Confirmed
              description: Confirmed
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: mixed_literals
          label: Mixed Literals
          description: Action with mixed literal types
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Mixed_Literals
          input_type:
            - developer_name: tag
              label: Tag
              description: Tag
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: threshold
              label: Threshold
              description: Threshold
              data_type: Double
              is_list: false
              required: true
              is_user_input: false
            - developer_name: enabled
              label: Enabled
              description: Enabled
              data_type: Boolean
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: result
              label: Result
              description: Result
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
  surfaces: []
