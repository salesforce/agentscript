schema_version: '2.0'
global_configuration:
  developer_name: Custom_Fields_Agent
  label: Custom Fields Agent
  description: Agent with custom field variable names
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages: []
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: Customer_Tier_c
      label: Customer Tier C
      description: Customer tier custom field
      data_type: string
      is_list: false
      default: '''Standard'''
      visibility: Internal
    - developer_name: Loyalty_Points_c
      label: Loyalty Points C
      description: Loyalty points custom field
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: Is_Premium_c
      label: Is Premium C
      description: Premium status custom field
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: Last_Interaction_c
      label: Last Interaction C
      description: Last interaction date custom field
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: Preferred_Channel_c
      label: Preferred Channel C
      description: Preferred contact channel
      data_type: string
      is_list: false
      default: '''email'''
      visibility: Internal
    - developer_name: Account_Region_c
      label: Account Region C
      description: Account region custom field
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: Support_Plan_c
      label: Support Plan C
      description: Support plan custom field
      data_type: string
      is_list: false
      default: '''Basic'''
      visibility: Internal
    - developer_name: Custom_Object_c
      label: Custom Object C
      description: Custom object data
      data_type: object
      is_list: false
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Check the customer tier and loyalty points'
      instructions: You are an agent for testing custom field variable names.
      type: subagent
      reasoning_type: salesforce.default
      description: Process using custom field variables
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      developer_name: main
      label: Main
      action_definitions: []
  surfaces: []
