schema_version: '2.0'
global_configuration:
  developer_name: Default_Vals_Agent
  label: Default Vals Agent
  description: Agent with every default value pattern
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages: []
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: empty_str
      label: Empty Str
      description: Empty string default
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: zero_num
      label: Zero Num
      description: Zero default
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: false_bool
      label: False Bool
      description: False default
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: none_obj
      label: None Obj
      description: None default
      data_type: object
      is_list: false
      visibility: Internal
    - developer_name: text_str
      label: Text Str
      description: Text string default
      data_type: string
      is_list: false
      default: '''some text value'''
      visibility: Internal
    - developer_name: positive_num
      label: Positive Num
      description: Positive number default
      data_type: number
      is_list: false
      default: 42
      visibility: Internal
    - developer_name: true_bool
      label: True Bool
      description: True default
      data_type: boolean
      is_list: false
      default: true
      visibility: Internal
    - developer_name: negative_num
      label: Negative Num
      description: Negative number default
      data_type: number
      is_list: false
      default: -1
      visibility: Internal
    - developer_name: decimal_num
      label: Decimal Num
      description: Decimal number default
      data_type: number
      is_list: false
      default: 3.14
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Check default values for all variable types'
      instructions: You are an agent for testing every default value pattern.
      type: subagent
      reasoning_type: salesforce.default
      description: Test default values
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      developer_name: main
      label: Main
      action_definitions: []
  surfaces: []
