# NOTE: Differs from Python compiler — TS uses explicit label for input descriptions
# when no description is set. Python uses normalizeDeveloperName(name) instead,
# which discards the author's explicit label.
schema_version: "2.0"
global_configuration:
  developer_name: Standard_Invocable_Agent
  label: Standard Invocable Agent
  description: Agent with standardInvocableAction:// targets
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables: []
  default_agent_user: user@test.com
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! I can help you manage records.
      message_type: Welcome
    - message: An error occurred while processing your request.
      message_type: Error
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: "''"
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
  initial_node: main
  nodes:
    - type: subagent
      reasoning_type: salesforce.default
      description: Agent with standardInvocableAction:// targets
      tools:
        - type: action
          target: Get_Record
          bound_inputs: {}
          llm_inputs:
            - record_id
            - object_type
          state_updates: []
          name: Get_Action
          description: Get Action
        - type: action
          target: Create_Record
          bound_inputs: {}
          llm_inputs:
            - object_type
            - field_values
          state_updates: []
          name: Create_Action
          description: Create Action
        - type: action
          target: Update_Record
          bound_inputs: {}
          llm_inputs:
            - record_id
            - field_values
          state_updates: []
          name: Update_Action
          description: Update Action
      developer_name: main
      label: Main
      action_definitions:
        - developer_name: Get_Record
          label: Get Record
          description: Get a record using standard invocable
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: standardInvocableAction
          invocation_target_name: GetRecord
          input_type:
            - developer_name: record_id
              label: Record ID
              description: Record ID
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: object_type
              label: Object Type
              description: Object Type
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: record_data
              label: Record Data
              description: Record Data
              data_type: LightningTypes
              is_list: false
              is_used_by_planner: true
              is_displayable: false
              complex_data_type_name: lightning__objectType
        - developer_name: Create_Record
          label: Create Record
          description: Create a record using standard invocable
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: standardInvocableAction
          invocation_target_name: CreateRecord
          input_type:
            - developer_name: object_type
              label: Object Type
              description: Object Type
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: field_values
              label: Field Values
              description: Field Values
              data_type: LightningTypes
              is_list: false
              required: true
              is_user_input: false
              complex_data_type_name: lightning__objectType
          output_type:
            - developer_name: record_id
              label: New Record ID
              description: Record Id
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: success
              label: Creation Success
              description: Success
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: Update_Record
          label: Update Record
          description: Update a record using standard invocable
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: standardInvocableAction
          invocation_target_name: UpdateRecord
          input_type:
            - developer_name: record_id
              label: Record ID
              description: Record ID
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: field_values
              label: Field Values
              description: Field Values
              data_type: LightningTypes
              is_list: false
              required: true
              is_user_input: false
              complex_data_type_name: lightning__objectType
          output_type:
            - developer_name: success
              label: Update Success
              description: Success
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
      instructions: You are a helpful assistant for managing records.
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                Help the user manage records using standard invocable actions.
  surfaces: []
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! I can help you manage records.",
      "messageType": "Welcome"}, {"message": "An error occurred while processing
      your request.", "messageType": "Error"}]'
