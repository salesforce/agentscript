schema_version: '2.0'
global_configuration:
  developer_name: Edge_Knowledge_In_Topic
  label: Edge Knowledge In Topic
  description: Tests global knowledge block referenced from topic actions
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: test_user
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Welcome to support!
      message_type: Welcome
    - message: Something went wrong.
      message_type: Error
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    rag_feature_config_id: support_kb_config
    system_messages: '[{"message": "Welcome to support!", "messageType": "Welcome"},
      {"message": "Something went wrong.", "messageType": "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: query
      label: Query
      description: Query
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: search_result
      label: Search Result
      description: Search Result
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                What would you like to search for?'
      instructions: You are a support assistant with knowledge base access.
      type: subagent
      reasoning_type: salesforce.default
      description: Routes to the knowledge search topic
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"knowledge_search"'
          name: go_to_search
          description: Searches the knowledge base for user queries
      after_all_tool_calls:
        - type: handoff
          target: knowledge_search
          enabled: state.AgentScriptInternal_next_topic=="knowledge_search"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: main
      label: Main
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                I''m searching our knowledge base for: {{state.query}}'
      instructions: You are a support assistant with knowledge base access.
      type: subagent
      reasoning_type: salesforce.default
      description: Searches the knowledge base for user queries
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: search_kb
          bound_inputs:
            query: state.query
          llm_inputs: []
          state_updates:
            - search_result: result.result
          name: search
          description: Search
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"main"'
          name: back_to_main
          description: Routes to the knowledge search topic
      after_all_tool_calls:
        - type: handoff
          target: main
          enabled: state.AgentScriptInternal_next_topic=="main"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: knowledge_search
      label: Knowledge Search
      action_definitions:
        - developer_name: search_kb
          label: Search Kb
          description: Searches the knowledge base
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: SearchKnowledgeBase
          input_type:
            - developer_name: query
              label: Query
              description: Query
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: result
              label: Result
              description: Result
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
  surfaces: []
