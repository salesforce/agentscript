schema_version: '2.0'
global_configuration:
  developer_name: EdgeConnRouting
  label: Routing Agent
  description: Agent with outbound routing on messaging and service_email
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: routing_bot@example.com
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
  - message: Welcome! You'll be routed to the right team.
    message_type: Welcome
  - message: Something went wrong.
    message_type: Error
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Welcome! You''ll be routed to the right team.",
      "messageType": "Welcome"}, {"message": "Something went wrong.", "messageType":
      "Error"}]'
  state_variables:
  - developer_name: AgentScriptInternal_next_topic
    label: Next Topic
    description: The next topic to be visited
    data_type: string
    is_list: false
    default: '"__EMPTY__"'
    visibility: Internal
  - developer_name: AgentScriptInternal_agent_instructions
    label: Agent Instructions
    description: The agent instructions
    data_type: string
    is_list: false
    default: ''''''
    visibility: Internal
  - developer_name: AgentScriptInternal_condition
    label: Runtime Condition
    description: Runtime condition evaluation for if statements
    data_type: boolean
    is_list: false
    visibility: Internal
  initial_node: main
  nodes:
  - before_reasoning_iteration:
    - type: action
      target: __state_update_action__
      enabled: 'True'
      state_updates:
      - AgentScriptInternal_agent_instructions: ''''''
    - type: action
      target: __state_update_action__
      state_updates:
      - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

          Help the user and route to appropriate team if needed.'
    instructions: You are a support agent with routing configured.
    type: subagent
    reasoning_type: salesforce.default
    description: Route support requests
    focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
    tools:
    - type: action
      target: __state_update_action__
      state_updates:
      - AgentScriptInternal_next_topic: '''__human__'''
      name: escalate_to_human
      description: Escalate to human agent
    after_all_tool_calls:
    - type: handoff
      target: __human__
      enabled: state.AgentScriptInternal_next_topic == '__human__'
      state_updates:
      - AgentScriptInternal_next_topic: '"__EMPTY__"'
    developer_name: main
    label: Main
    action_definitions: []
  surfaces:
  - surface_type: messaging
    adaptive_response_allowed: true
    outbound_route_configs:
    - escalation_message: Transferring you to a human agent
      outbound_route_type: OmniChannelFlow
      outbound_route_name: flow://Route_to_Messaging_Agent
  - surface_type: service_email
    adaptive_response_allowed: true
    outbound_route_configs:
    - outbound_route_type: OmniChannelFlow
      outbound_route_name: flow://Route_to_Email_Agent
