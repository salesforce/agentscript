schema_version: "2.0"
global_configuration:
  developer_name: Edge_End_Session_Basic
  label: Edge End Session Basic
  description: Tests basic @utils.end_session in reasoning actions
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables: []
  default_agent_user: test_user
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! How can I help?
      message_type: Welcome
    - message: An error occurred.
      message_type: Error
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: "''"
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
  initial_node: main
  nodes:
    - type: subagent
      reasoning_type: salesforce.default
      description: Main topic with end session option
      tools:
        - type: action
          target: __end_session_action__
          name: end_conversation
          description: End the current session
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"faq"'
          name: go_to_faq
          description: Frequently asked questions
      developer_name: main
      label: Main
      action_definitions: []
      instructions: You are a support assistant that can end sessions.
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                I'm here to help. When we're done, I can end the session.
      after_all_tool_calls:
        - type: handoff
          target: faq
          enabled: state.AgentScriptInternal_next_topic=="faq"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
    - type: subagent
      reasoning_type: salesforce.default
      description: Frequently asked questions
      tools: []
      developer_name: faq
      label: Faq
      action_definitions: []
      instructions: You are a support assistant that can end sessions.
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                Here are some common questions I can help with.
  surfaces: []
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! How can I help?", "messageType": "Welcome"}, {"message": "An error occurred.", "messageType": "Error"}]'
