schema_version: '2.0'
global_configuration:
  developer_name: Complex_Object_Agent
  label: Complex Object Agent
  description: Agent with complex object type annotations
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages: []
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: contact_record
      label: Contact Record
      description: A contact record
      data_type: object
      is_list: false
      visibility: Internal
    - developer_name: case_record
      label: Case Record
      description: A case record
      data_type: object
      is_list: false
      visibility: Internal
    - developer_name: order_items
      label: Order Items
      description: List of order line items
      data_type: object
      is_list: true
      visibility: Internal
    - developer_name: account_data
      label: Account Data
      description: Account information
      data_type: object
      is_list: false
      visibility: Internal
    - developer_name: custom_payload
      label: Custom Payload
      description: Custom API response payload
      data_type: object
      is_list: false
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Load contact and case records for the user'
      instructions: You are an agent for testing complex object type annotations.
      type: subagent
      reasoning_type: salesforce.default
      description: Work with complex object variables
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      developer_name: main
      label: Main
      action_definitions: []
  surfaces: []
