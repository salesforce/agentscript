schema_version: '2.0'
global_configuration:
  developer_name: Edge_Cond_Comparison_Ops
  label: Edge Cond Comparison Ops
  description: Tests all comparison operators on number variables
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: test_user
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Welcome!
      message_type: Welcome
    - message: An error occurred.
      message_type: Error
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Welcome!", "messageType": "Welcome"}, {"message":
      "An error occurred.", "messageType": "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: score
      label: Score
      description: Score
      data_type: number
      is_list: false
      default: 75
      visibility: Internal
    - developer_name: threshold
      label: Threshold
      description: Threshold
      data_type: number
      is_list: false
      default: 50
      visibility: Internal
    - developer_name: result_eq
      label: Result Eq
      description: Result Eq
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: result_neq
      label: Result Neq
      description: Result Neq
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: result_lt
      label: Result Lt
      description: Result Lt
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: result_gt
      label: Result Gt
      description: Result Gt
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: result_lte
      label: Result Lte
      description: Result Lte
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: result_gte
      label: Result Gte
      description: Result Gte
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Provide analysis based on the score: {{state.score}}'
      instructions: You are an assistant that evaluates numeric comparisons.
      type: subagent
      reasoning_type: salesforce.default
      description: Tests ==, !=, <, >, <=, >= comparison operators
      before_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.score == 75
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - result_eq: 'True'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.score != 50
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - result_neq: 'True'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.score > 50
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - result_gt: 'True'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.score < 100
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - result_lt: 'True'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.score >= 75
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - result_gte: 'True'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.score <= 75
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - result_lte: 'True'
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      developer_name: main
      label: Main
      action_definitions: []
  surfaces: []
