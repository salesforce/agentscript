# NOTE: Differs from Python compiler — TS uses explicit label for input descriptions
# when no description is set. Python uses normalizeDeveloperName(name) instead,
# which discards the author's explicit label.
schema_version: "2.0"
global_configuration:
  developer_name: Complex_Types_Agent
  label: Complex Types Agent
  description: Agent with actions using complex_data_type_name on inputs and outputs
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables: []
  default_agent_user: user@test.com
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! I can help with orders, profiles, and products.
      message_type: Welcome
    - message: An error occurred while processing your request.
      message_type: Error
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: "''"
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
  initial_node: main
  nodes:
    - type: subagent
      reasoning_type: salesforce.default
      description: Agent with actions using complex_data_type_name on inputs and outputs
      tools:
        - type: action
          target: Process_Order
          bound_inputs: {}
          llm_inputs:
            - order
            - line_items
          state_updates: []
          name: Order_Action
          description: Order Action
        - type: action
          target: Update_Profile
          bound_inputs: {}
          llm_inputs:
            - profile
            - preferences
          state_updates: []
          name: Profile_Action
          description: Profile Action
        - type: action
          target: Search_Products
          bound_inputs: {}
          llm_inputs:
            - filters
          state_updates: []
          name: Search_Action
          description: Search Action
      developer_name: main
      label: Main
      action_definitions:
        - developer_name: Process_Order
          label: Process Order
          description: Process an order with complex types
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Process_Order_Flow
          input_type:
            - developer_name: order
              label: Order Object
              description: Order Object
              data_type: LightningTypes
              is_list: false
              required: true
              is_user_input: false
              complex_data_type_name: OrderRecord
            - developer_name: line_items
              label: Line Items
              description: Line Items
              data_type: LightningTypes
              is_list: true
              required: true
              is_user_input: false
              complex_data_type_name: LineItemRecord
          output_type:
            - developer_name: processed_order
              label: Processed Order
              description: Processed Order
              data_type: LightningTypes
              is_list: false
              is_used_by_planner: true
              is_displayable: false
              complex_data_type_name: OrderRecord
            - developer_name: invoice
              label: Invoice
              description: Invoice
              data_type: LightningTypes
              is_list: false
              is_used_by_planner: true
              is_displayable: false
              complex_data_type_name: InvoiceRecord
        - developer_name: Update_Profile
          label: Update Profile
          description: Update user profile with complex data
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: apex
          invocation_target_name: ProfileController.updateProfile
          input_type:
            - developer_name: profile
              label: Profile Data
              description: Profile Data
              data_type: LightningTypes
              is_list: false
              required: true
              is_user_input: false
              complex_data_type_name: UserProfile
            - developer_name: preferences
              label: User Preferences
              description: User Preferences
              data_type: LightningTypes
              is_list: false
              required: false
              is_user_input: false
              complex_data_type_name: PreferencesRecord
          output_type:
            - developer_name: updated_profile
              label: Updated Profile
              description: Updated Profile
              data_type: LightningTypes
              is_list: false
              is_used_by_planner: true
              is_displayable: false
              complex_data_type_name: UserProfile
        - developer_name: Search_Products
          label: Search Products
          description: Search products with complex filters
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: externalService
          invocation_target_name: ProductService.search
          input_type:
            - developer_name: filters
              label: Search Filters
              description: Search Filters
              data_type: LightningTypes
              is_list: false
              required: true
              is_user_input: false
              complex_data_type_name: SearchFilters
          output_type:
            - developer_name: products
              label: Product Results
              description: Products
              data_type: LightningTypes
              is_list: true
              is_used_by_planner: true
              is_displayable: false
              complex_data_type_name: ProductRecord
            - developer_name: facets
              label: Search Facets
              description: Facets
              data_type: LightningTypes
              is_list: false
              is_used_by_planner: true
              is_displayable: false
              complex_data_type_name: FacetResults
      instructions: You are a helpful assistant for orders, profiles, and product searches.
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                Help the user with orders, profiles, and product searches.
                These actions use complex data types.
  surfaces: []
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! I can help with orders, profiles, and
      products.", "messageType": "Welcome"}, {"message": "An error occurred
      while processing your request.", "messageType": "Error"}]'
