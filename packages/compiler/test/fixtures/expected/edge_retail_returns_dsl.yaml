schema_version: '2.0'
global_configuration:
  developer_name: Retail_Returns_Agent
  label: Retail Returns Agent
  description: Handles retail return processing, eligibility checks, and refund issuance.
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: returns_agent@retail.com
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Welcome to our returns department! I can help you with product returns
        and refunds.
      message_type: Welcome
    - message: Sorry, I encountered an issue processing your return request.
      message_type: Error
  modality_parameters:
    language:
      default_locale: en_US
      additional_locales: []
      all_additional_locales: false
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Welcome to our returns department! I can help
      you with product returns and refunds.", "messageType": "Welcome"}, {"message":
      "Sorry, I encountered an issue processing your return request.", "messageType":
      "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: customer_email
      label: Customer Email
      description: Customer email for lookup
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: order_number
      label: Order Number
      description: Order number for the return
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: return_eligible
      label: Return Eligible
      description: Whether the order is eligible for return
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: refund_amount
      label: Refund Amount
      description: Calculated refund amount
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: return_reason
      label: Return Reason
      description: Reason for the return
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: case_id
      label: Case Id
      description: Support case ID
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
  initial_node: return_intake
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Welcome the customer and ask for their order number and email.

                Use the lookup_order action to find their order details.

                If the order is found, proceed to eligibility check.'
      instructions: You are a retail returns assistant. Help customers process returns,
        check eligibility, and issue refunds.
      type: subagent
      reasoning_type: salesforce.default
      description: Gathers customer and order information for return processing
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: lookup_order
          bound_inputs:
            order_number: state.order_number
            customer_email: state.customer_email
          llm_inputs: []
          state_updates: []
          name: lookup
          description: Lookup
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"eligibility_check"'
          name: go_eligibility
          description: Check return eligibility
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"escalation"'
          name: go_escalation
          description: Escalate if order not found
      after_all_tool_calls:
        - type: handoff
          target: eligibility_check
          enabled: state.AgentScriptInternal_next_topic=="eligibility_check"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: escalation
          enabled: state.AgentScriptInternal_next_topic=="escalation"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: return_intake
      label: Return Intake
      action_definitions:
        - developer_name: lookup_order
          label: Lookup Order
          description: Looks up order details by order number and customer email
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: LookupOrder
          input_type:
            - developer_name: order_number
              label: Order Number
              description: The order number
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: customer_email
              label: Customer Email
              description: Customer email address
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: order_found
              label: Order Found
              description: Order Found
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: order_date
              label: Order Date
              description: Order Date
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: order_total
              label: Order Total
              description: Order Total
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: items
              label: Items
              description: Items
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Review the eligibility results. If eligible, proceed to refund processing.

                If not eligible, explain the policy and offer to escalate.'
      instructions: You are a retail returns assistant. Help customers process returns,
        check eligibility, and issue refunds.
      type: subagent
      reasoning_type: salesforce.default
      description: Checks whether the order is eligible for return based on policy
      before_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.order_number != ""
        - type: action
          target: check_eligibility
          bound_inputs:
            order_number: state.order_number
            return_reason: state.return_reason
          llm_inputs: []
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - return_eligible: result.eligible
            - refund_amount: result.refund_amount
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          enabled: state.return_eligible == True
          state_updates:
            - AgentScriptInternal_next_topic: '"refund_processing"'
          name: go_refund
          description: Process the refund
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"escalation"'
          name: go_escalation
          description: Escalate ineligible return
      after_all_tool_calls:
        - type: handoff
          target: refund_processing
          enabled: state.AgentScriptInternal_next_topic=="refund_processing"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: escalation
          enabled: state.AgentScriptInternal_next_topic=="escalation"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      after_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.return_eligible == True
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - AgentScriptInternal_next_topic: '"refund_processing"'
        - type: handoff
          target: refund_processing
          enabled: state.AgentScriptInternal_next_topic=="refund_processing"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.return_eligible == False
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - AgentScriptInternal_next_topic: '"escalation"'
        - type: handoff
          target: escalation
          enabled: state.AgentScriptInternal_next_topic=="escalation"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: eligibility_check
      label: Eligibility Check
      action_definitions:
        - developer_name: check_eligibility
          label: Check Eligibility
          description: Checks return eligibility based on order date and item type
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: CheckReturnEligibility
          input_type:
            - developer_name: order_number
              label: Order Number
              description: Order Number
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: return_reason
              label: Return Reason
              description: Return Reason
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: eligible
              label: Eligible
              description: Eligible
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: refund_amount
              label: Refund Amount
              description: Refund Amount
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: policy_message
              label: Policy Message
              description: Policy Message
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Process the refund for {{state.refund_amount}}.

                Confirm the refund details with the customer.'
      instructions: You are a retail returns assistant. Help customers process returns,
        check eligibility, and issue refunds.
      type: subagent
      reasoning_type: salesforce.default
      description: Processes the refund for eligible returns
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: process_refund
          bound_inputs:
            order_number: state.order_number
            refund_amount: state.refund_amount
          llm_inputs: []
          state_updates: []
          name: refund
          description: Refund
      developer_name: refund_processing
      label: Refund Processing
      action_definitions:
        - developer_name: process_refund
          label: Process Refund
          description: Issues refund to the customer's original payment method
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: apex
          invocation_target_name: ProcessRefund
          input_type:
            - developer_name: order_number
              label: Order Number
              description: Order Number
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: refund_amount
              label: Refund Amount
              description: Refund Amount
              data_type: Double
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: refund_id
              label: Refund Id
              description: Refund Id
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: estimated_days
              label: Estimated Days
              description: Estimated Days
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                This case needs human review. Escalate to a returns specialist.'
      instructions: You are a retail returns assistant. Help customers process returns,
        check eligibility, and issue refunds.
      type: subagent
      reasoning_type: salesforce.default
      description: Escalates complex return cases to a human agent
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '''__human__'''
          name: escalate_to_human
          description: Escalate to returns specialist
      after_all_tool_calls:
        - type: handoff
          target: __human__
          enabled: state.AgentScriptInternal_next_topic == '__human__'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: escalation
      label: Escalation
      action_definitions: []
  surfaces: []
