# NOTE: Differs from Python compiler — TS uses explicit label for input descriptions
# when no description is set. Python uses normalizeDeveloperName(name) instead,
# which discards the author's explicit label.
schema_version: "2.0"
global_configuration:
  developer_name: Confirmation_Actions_Agent
  label: Confirmation Actions Agent
  description: Agent with actions using confirmation and progress indicator annotations
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables: []
  default_agent_user: user@test.com
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! I can help you manage your orders.
      message_type: Welcome
    - message: An error occurred while processing your request.
      message_type: Error
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: "''"
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: order_id
      label: Order Id
      description: Order identifier
      data_type: string
      is_list: false
      visibility: Internal
      default: "''"
  initial_node: main
  nodes:
    - type: subagent
      reasoning_type: salesforce.default
      description: Agent with actions using confirmation and progress indicator annotations
      tools:
        - type: action
          target: Cancel_Order
          bound_inputs:
            order_id: state.order_id
          llm_inputs:
            - reason
          state_updates: []
          name: Cancel_Action
          description: Cancel Action
        - type: action
          target: Delete_Account
          bound_inputs: {}
          llm_inputs:
            - confirmation_code
          state_updates: []
          name: Delete_Action
          description: Delete Action
        - type: action
          target: Check_Status
          bound_inputs:
            order_id: state.order_id
          llm_inputs: []
          state_updates: []
          name: Status_Action
          description: Status Action
        - type: action
          target: Quick_Lookup
          bound_inputs: {}
          llm_inputs:
            - query
          state_updates: []
          name: Lookup_Action
          description: Lookup Action
      developer_name: main
      label: Main
      action_definitions:
        - developer_name: Cancel_Order
          label: Cancel Order
          description: Cancel an existing order
          require_user_confirmation: true
          include_in_progress_indicator: true
          invocation_target_type: flow
          invocation_target_name: Cancel_Order_Flow
          input_type:
            - developer_name: order_id
              label: Order ID
              description: Order ID
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: reason
              label: Cancellation Reason
              description: Cancellation Reason
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: cancelled
              label: Cancellation Confirmed
              description: Cancelled
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: refund_amount
              label: Refund Amount
              description: Refund Amount
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: Delete_Account
          label: Delete Account
          description: Permanently delete user account
          require_user_confirmation: true
          include_in_progress_indicator: true
          invocation_target_type: apex
          invocation_target_name: AccountController.deleteAccount
          input_type:
            - developer_name: confirmation_code
              label: Confirmation Code
              description: Confirmation Code
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: deleted
              label: Account Deleted
              description: Deleted
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: Check_Status
          label: Check Status
          description: Check order status without confirmation
          require_user_confirmation: false
          include_in_progress_indicator: true
          invocation_target_type: flow
          invocation_target_name: Check_Order_Status
          input_type:
            - developer_name: order_id
              label: Order ID
              description: Order ID
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: status
              label: Order Status
              description: Status
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: Quick_Lookup
          label: Quick Lookup
          description: Quick lookup with no indicators
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Quick_Lookup_Flow
          input_type:
            - developer_name: query
              label: Query
              description: Query
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: result
              label: Result
              description: Result
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
      instructions: You are a helpful order management agent.
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                Help the user manage orders. Destructive actions like
                cancellation and account deletion require user confirmation.
                Status checks and lookups do not require confirmation.
  surfaces: []
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! I can help you manage your orders.",
      "messageType": "Welcome"}, {"message": "An error occurred while processing
      your request.", "messageType": "Error"}]'
