schema_version: '2.0'
global_configuration:
  developer_name: Router_Escalation
  label: Router Escalation
  description: Router with escalation topic and off_topic topic
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: defaultagentuser@example.com
  context_variables:
    - developer_name: EndUserId
      label: End User Id
      description: Messaging end user identifier
      data_type: string
      field_mapping: MessagingSession.MessagingEndUserId
    - developer_name: RoutableId
      label: Routable Id
      description: Messaging session identifier
      data_type: string
      field_mapping: MessagingSession.Id
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Welcome! I can help with orders, account questions, or connect you
        with a human agent.
      message_type: Welcome
    - message: An error occurred. Please try again.
      message_type: Error
  modality_parameters:
    language:
      default_locale: en_US
      additional_locales: []
      all_additional_locales: false
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Welcome! I can help with orders, account questions,
      or connect you with a human agent.", "messageType": "Welcome"}, {"message":
      "An error occurred. Please try again.", "messageType": "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
  initial_node: topic_selector
  nodes:
    - model_configuration:
        model_ref: sfdc_ai__DefaultEinsteinHyperClassifier
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Route the user to the appropriate topic.

                If the user wants a human agent, route to escalation.'
      instructions: 'You are a routing agent with escalation and off-topic handling.


        {{state.AgentScriptInternal_agent_instructions}}'
      type: router
      description: Routes users with escalation and off-topic support
      tools:
        - name: go_orders
          target: order_help
          description: Route to order help
        - name: go_account
          target: account_help
          description: Route to account help
        - name: go_escalation
          target: escalation
          enabled: variables.EndUserId != None
          description: Escalate to human agent
        - name: go_off_topic
          target: off_topic
          description: Handle off-topic requests
      developer_name: topic_selector
      label: Topic Selector
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Help the user with their order question.

                Ask for order number and details about their issue.'
      instructions: You are a routing agent with escalation and off-topic handling.
      type: subagent
      reasoning_type: salesforce.default
      description: Assists with order-related questions
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"escalation"'
          name: escalate_to_human
          description: Escalate if unable to resolve
      after_all_tool_calls:
        - type: handoff
          target: escalation
          enabled: state.AgentScriptInternal_next_topic=="escalation"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: order_help
      label: Order Help
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Help the user with their account question.

                If the issue is sensitive, recommend escalation.'
      instructions: You are a routing agent with escalation and off-topic handling.
      type: subagent
      reasoning_type: salesforce.default
      description: Assists with account-related questions
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"escalation"'
          name: escalate_to_human
          description: Escalate for sensitive account issues
      after_all_tool_calls:
        - type: handoff
          target: escalation
          enabled: state.AgentScriptInternal_next_topic=="escalation"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: account_help
      label: Account Help
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                If the user explicitly asks to transfer to a live agent, escalate
                the conversation.

                If escalation fails, acknowledge the issue and ask whether they''d
                like to log a support case.'
      instructions: You are a routing agent with escalation and off-topic handling.
      type: subagent
      reasoning_type: salesforce.default
      description: Handles transfer to a live human agent
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '''__human__'''
          name: escalate_to_human
          description: Transfer to a human agent
      after_all_tool_calls:
        - type: handoff
          target: __human__
          enabled: state.AgentScriptInternal_next_topic == '__human__'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: escalation
      label: Escalation
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                The user''s request is off-topic. Politely redirect them.

                NEVER answer general knowledge questions.

                Only respond to greetings and questions about your capabilities.'
      instructions: You are a routing agent with escalation and off-topic handling.
      type: subagent
      reasoning_type: salesforce.default
      description: Redirects off-topic conversations politely
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      developer_name: off_topic
      label: Off Topic
      action_definitions: []
  surfaces: []
