# NOTE: Differs from Python compiler — TS uses explicit label for input descriptions
# when no description is set. Python uses normalizeDeveloperName(name) instead,
# which discards the author's explicit label.
schema_version: "2.0"
global_configuration:
  developer_name: Topic_No_Custom_Reasoning_Agent
  label: Topic No Custom Reasoning Agent
  description: Agent where a topic has reasoning but no custom instructions
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables: []
  default_agent_user: user@test.com
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! I can help you browse the catalog.
      message_type: Welcome
    - message: An error occurred while searching.
      message_type: Error
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: "''"
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
  initial_node: main
  nodes:
    - type: subagent
      reasoning_type: salesforce.default
      description: Agent where a topic has reasoning but no custom instructions
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"catalog"'
          name: go_to_catalog
          description: Browse the product catalog
      developer_name: main
      label: Main
      action_definitions:
        - developer_name: Lookup_Item
          label: Lookup Item
          description: Look up an item
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Lookup_Item_Flow
          input_type:
            - developer_name: item_id
              label: Item ID
              description: Item ID
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: item_name
              label: Item Name
              description: Item Name
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: item_price
              label: Item Price
              description: Item Price
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
      instructions: You are a helpful catalog assistant.
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: >-
                template::{{state.AgentScriptInternal_agent_instructions}}

                You are a helpful assistant. Route to the catalog topic for
                browsing.
      after_all_tool_calls:
        - type: handoff
          target: catalog
          enabled: state.AgentScriptInternal_next_topic=="catalog"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
    - type: subagent
      reasoning_type: salesforce.default
      description: Browse the product catalog
      tools:
        - type: action
          target: Search_Catalog
          bound_inputs: {}
          llm_inputs:
            - query
          state_updates: []
          name: Search_Action
          description: Search Action
        - type: action
          target: Get_Categories
          bound_inputs: {}
          llm_inputs: []
          state_updates: []
          name: Categories_Action
          description: Categories Action
      developer_name: catalog
      label: Catalog
      action_definitions:
        - developer_name: Search_Catalog
          label: Search Catalog
          description: Search the product catalog
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Search_Catalog_Flow
          input_type:
            - developer_name: query
              label: Search Query
              description: Search Query
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: results
              label: Search Results
              description: Results
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: Get_Categories
          label: Get Categories
          description: Get available categories
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Get_Categories_Flow
          input_type: []
          output_type:
            - developer_name: categories
              label: Categories
              description: Categories
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
      instructions: You are a helpful catalog assistant.
  surfaces: []
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! I can help you browse the catalog.",
      "messageType": "Welcome"}, {"message": "An error occurred while
      searching.", "messageType": "Error"}]'
