schema_version: '2.0'
global_configuration:
  developer_name: Mixed_Vars_Agent
  label: Mixed Vars Agent
  description: Agent with both linked and mutable variables
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables:
    - developer_name: session_id
      label: Session Id
      description: Linked session ID
      data_type: string
      field_mapping: MessagingSession.Id
    - developer_name: user_name
      label: User Name
      description: Linked end user name
      data_type: string
      field_mapping: MessagingEndUser.Name
    - developer_name: contact_id
      label: Contact Id
      description: Linked contact ID
      data_type: string
      field_mapping: MessagingEndUser.ContactId
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello {!@variables.user_name}! How can I help?
      message_type: Welcome
    - message: Sorry, an error occurred.
      message_type: Error
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello {!@variables.user_name}! How can I help?",
      "messageType": "Welcome"}, {"message": "Sorry, an error occurred.", "messageType":
      "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: intent
      label: Intent
      description: Detected user intent
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: sentiment
      label: Sentiment
      description: Detected sentiment
      data_type: string
      is_list: false
      default: '''neutral'''
      visibility: Internal
    - developer_name: turn_count
      label: Turn Count
      description: Number of conversation turns
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: is_authenticated
      label: Is Authenticated
      description: Whether user is authenticated
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: context_data
      label: Context Data
      description: Conversation context data
      data_type: object
      is_list: false
      visibility: Internal
    - developer_name: previous_topics
      label: Previous Topics
      description: Previously visited topics
      data_type: string
      is_list: true
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Authenticate the user and route based on intent'
      instructions: You are an agent with both linked and mutable variables.
      type: subagent
      reasoning_type: salesforce.default
      description: Handle mixed variable types
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      developer_name: main
      label: Main
      action_definitions: []
  surfaces: []
