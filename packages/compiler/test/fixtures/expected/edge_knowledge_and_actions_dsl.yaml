schema_version: '2.0'
global_configuration:
  developer_name: Edge_Knowledge_And_Actions
  label: Edge Knowledge And Actions
  description: Tests knowledge block combined with actions that use knowledge
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: test_user
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! I can search our knowledge base for answers.
      message_type: Welcome
    - message: An error occurred while searching.
      message_type: Error
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    rag_feature_config_id: help_center_rag
    system_messages: '[{"message": "Hello! I can search our knowledge base for answers.",
      "messageType": "Welcome"}, {"message": "An error occurred while searching.",
      "messageType": "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: search_query
      label: Search Query
      description: Search Query
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: article_content
      label: Article Content
      description: Article Content
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: articles_found
      label: Articles Found
      description: Articles Found
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                I can search our knowledge base to find answers for you.

                What topic would you like to learn about?'
      instructions: You are a knowledge-powered assistant that searches and retrieves
        articles.
      type: subagent
      reasoning_type: salesforce.default
      description: Agent with knowledge block and actions leveraging knowledge
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: search_articles
          bound_inputs:
            query: state.search_query
            source_url: '"https://help.example.com/articles"'
          llm_inputs: []
          state_updates:
            - article_content: result.content
            - articles_found: result.count
          name: search
          description: Search
        - type: action
          target: __state_update_action__
          bound_inputs: {}
          llm_inputs: []
          state_updates:
            - search_query: state.search_query
          name: set_query
          description: Capture the search query
          input_parameters: []
      after_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.search_query != ""
        - type: action
          target: search_articles
          bound_inputs:
            query: state.search_query
            source_url: '"https://help.example.com/articles"'
          llm_inputs: []
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - article_content: result.content
            - articles_found: result.count
      developer_name: main
      label: Main
      action_definitions:
        - developer_name: search_articles
          label: Search Articles
          description: Searches the knowledge base for relevant articles
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: SearchArticles
          input_type:
            - developer_name: query
              label: Query
              description: Query
              data_type: String
              is_list: false
              required: false
              is_user_input: false
            - developer_name: source_url
              label: Source Url
              description: Source Url
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: content
              label: Content
              description: Content
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: count
              label: Count
              description: Count
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
  surfaces: []
