schema_version: '2.0'
global_configuration:
  developer_name: leave_management_agent_v44
  label: Leave Management Agent V 44
  description: Assists users with leave_req management through the leave management
    agent workflow.
  enable_enhanced_event_logs: true
  agent_type: EinsteinServiceAgent
  default_agent_user: leave_management@example.com
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! I am your Leave Management Agent Assistant. How can I help you
        today?
      message_type: Welcome
    - message: I apologize, something went wrong on my end. Could you please rephrase
        your request?
      message_type: Error
  modality_parameters:
    language:
      default_locale: en_US
      additional_locales: []
      all_additional_locales: false
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! I am your Leave Management Agent Assistant.
      How can I help you today?", "messageType": "Welcome"}, {"message": "I apologize,
      something went wrong on my end. Could you please rephrase your request?", "messageType":
      "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: leave_req_record_id
      label: Leave Req Record Id
      description: Record ID of the leave_req
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: leave_req_status
      label: Leave Req Status
      description: Current status of the leave_req
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: leave_req_tier
      label: Leave Req Tier
      description: Tier classification for the leave_req
      data_type: string
      is_list: false
      default: '''standard'''
      visibility: Internal
    - developer_name: leave_req_category
      label: Leave Req Category
      description: Category of the leave_req
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: contact_name
      label: Contact Name
      description: Full name of the contact
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: contact_email
      label: Contact Email
      description: Email address of the contact
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: contact_phone
      label: Contact Phone
      description: Phone number of the contact
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: is_verified
      label: Is Verified
      description: Whether the user identity is verified
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: eligibility_score
      label: Eligibility Score
      description: Calculated eligibility score
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: step_counter
      label: Step Counter
      description: Current step in the process
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: attempt_count
      label: Attempt Count
      description: Number of attempts made
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: total_items_count
      label: Total Items Count
      description: Total number of items to process
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: request_submission_complete
      label: Request Submission Complete
      description: Whether the request_submission stage is complete
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: request_submission_result
      label: Request Submission Result
      description: Result from the request_submission stage
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: balance_check_complete
      label: Balance Check Complete
      description: Whether the balance_check stage is complete
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: balance_check_result
      label: Balance Check Result
      description: Result from the balance_check stage
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: approval_routing_complete
      label: Approval Routing Complete
      description: Whether the approval_routing stage is complete
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: approval_routing_result
      label: Approval Routing Result
      description: Result from the approval_routing stage
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: calendar_update_complete
      label: Calendar Update Complete
      description: Whether the calendar_update stage is complete
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: calendar_update_result
      label: Calendar Update Result
      description: Result from the calendar_update stage
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: priority_level
      label: Priority Level
      description: Priority level of the request
      data_type: string
      is_list: false
      default: '''normal'''
      visibility: Internal
    - developer_name: notes_text
      label: Notes Text
      description: Notes and comments
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: assigned_agent
      label: Assigned Agent
      description: Assigned agent name
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: resolution_summary
      label: Resolution Summary
      description: Summary of the resolution
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: escalation_requested
      label: Escalation Requested
      description: Whether escalation was requested
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: is_business_hours
      label: Is Business Hours
      description: Whether it is currently business hours
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: case_ref_number
      label: Case Ref Number
      description: Reference number for the support case
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: next_available_slot
      label: Next Available Slot
      description: Next available time slot
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
  initial_node: topic_selector
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                You are a topic selector for a leave management agent assistant.

                Analyze the user''s input and determine the most appropriate topic.

                Current leave_req status: {{state.leave_req_status}}

                Eligibility score: {{state.eligibility_score}}

                Steps completed: {{state.step_counter}}

                Priority: {{state.priority_level}}

                Use action.go_to_request_submission for request submission requests.

                Use action.go_to_balance_check for balance check requests.

                Use action.go_to_approval_routing for approval routing requests.

                Use action.go_to_calendar_update for calendar update requests.

                Use action.go_to_escalation to escalate if the user is upset or requests
                a human.'
      instructions: 'You are a professional leave management agent assistant.

        Help users manage their leave_req requests efficiently and accurately.

        Always verify the user''s identity before proceeding with sensitive operations.

        Follow the established workflow: request_submission -> balance_check -> approval_routing
        -> calendar_update.

        Be concise, professional, and confirm next steps at the end of each exchange.

        If the user is upset or asks for a human, escalate immediately.

        Never reveal internal record IDs or system identifiers to the user.'
      type: subagent
      reasoning_type: salesforce.default
      description: Welcome the user and route to the appropriate leave_req management
        topic
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"request_submission"'
          name: go_to_request_submission
          description: Transition to request submission topic.
        - type: action
          target: __state_update_action__
          enabled: state.is_verified == True
          state_updates:
            - AgentScriptInternal_next_topic: '"balance_check"'
          name: go_to_balance_check
          description: Transition to balance check topic.
        - type: action
          target: __state_update_action__
          enabled: state.is_verified == True
          state_updates:
            - AgentScriptInternal_next_topic: '"approval_routing"'
          name: go_to_approval_routing
          description: Transition to approval routing topic.
        - type: action
          target: __state_update_action__
          enabled: state.is_verified == True
          state_updates:
            - AgentScriptInternal_next_topic: '"calendar_update"'
          name: go_to_calendar_update
          description: Transition to calendar update topic.
        - type: action
          target: __state_update_action__
          enabled: state.is_verified == True
          state_updates:
            - AgentScriptInternal_next_topic: '"escalation_handling"'
          name: go_to_escalation
          description: Escalate to a human agent for assistance.
      after_all_tool_calls:
        - type: handoff
          target: request_submission
          enabled: state.AgentScriptInternal_next_topic=="request_submission"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: balance_check
          enabled: state.AgentScriptInternal_next_topic=="balance_check"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: approval_routing
          enabled: state.AgentScriptInternal_next_topic=="approval_routing"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: calendar_update
          enabled: state.AgentScriptInternal_next_topic=="calendar_update"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: escalation_handling
          enabled: state.AgentScriptInternal_next_topic=="escalation_handling"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: topic_selector
      label: Topic Selector
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Handle the request submission stage for the leave_req.

                Current leave_req status: {{state.leave_req_status}}

                Step {{state.step_counter + 1}} of the process.

                Attempts so far: {{state.attempt_count}}

                Contact: {{state.contact_name}} ({{state.contact_email}})

                Request Submission result: {{state.request_submission_result}}

                Priority level: {{state.priority_level}}

                Current tier: {{state.leave_req_tier}}

                If the contact information is missing, ask the user to provide their
                name and email.

                After collecting information, use action.run_request_submission to
                begin processing.'
      instructions: 'You are a professional leave management agent assistant.

        Help users manage their leave_req requests efficiently and accurately.

        Always verify the user''s identity before proceeding with sensitive operations.

        Follow the established workflow: request_submission -> balance_check -> approval_routing
        -> calendar_update.

        Be concise, professional, and confirm next steps at the end of each exchange.

        If the user is upset or asks for a human, escalate immediately.

        Never reveal internal record IDs or system identifiers to the user.'
      type: subagent
      reasoning_type: salesforce.default
      description: Handles the request submission stage of the leave_req process
      before_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.is_verified == False
        - type: action
          target: validate_request_submission_info
          bound_inputs:
            record_ref: state.leave_req_record_id
            contact_ref: state.contact_email
          llm_inputs: []
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - leave_req_status: result.updated_status
            - is_verified: result.is_valid
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: process_request_submission_data
          bound_inputs:
            record_ref: state.leave_req_record_id
            step_num: state.step_counter
            category_val: state.leave_req_category
          llm_inputs: []
          state_updates:
            - request_submission_result: result.result_code
            - eligibility_score: result.score_value
            - request_submission_complete: result.is_passed
          name: run_request_submission
          description: Run Request Submission
        - type: action
          target: fetch_request_submission_details
          bound_inputs:
            record_ref: state.leave_req_record_id
            include_history: 'False'
          llm_inputs: []
          state_updates:
            - total_items_count: result.item_count
            - leave_req_tier: result.tier_value
          name: fetch_request_submission_info
          description: Fetch Request Submission Info
        - type: action
          target: __state_update_action__
          enabled: state.request_submission_complete == True and state.eligibility_score
            >= 50
          state_updates:
            - AgentScriptInternal_next_topic: '"balance_check"'
          name: go_to_balance_check
          description: Move to balance check stage.
        - type: action
          target: __state_update_action__
          enabled: state.escalation_requested == True
          state_updates:
            - AgentScriptInternal_next_topic: '"escalation_handling"'
          name: escalate_now
          description: Escalate if issues arise.
      after_all_tool_calls:
        - type: handoff
          target: balance_check
          enabled: state.AgentScriptInternal_next_topic=="balance_check"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: escalation_handling
          enabled: state.AgentScriptInternal_next_topic=="escalation_handling"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      after_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - step_counter: state.step_counter + 1
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - attempt_count: state.attempt_count + 1
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.eligibility_score >= 70
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - leave_req_tier: '"premium"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.eligibility_score >= 40 and state.eligibility_score
                < 70
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - leave_req_tier: '"standard"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.eligibility_score < 40
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - leave_req_tier: '"basic"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.attempt_count >= 3 and state.request_submission_complete
                == False
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - priority_level: '"high"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.attempt_count >= 5
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - escalation_requested: 'True'
      developer_name: request_submission
      label: Request Submission
      action_definitions:
        - developer_name: process_request_submission_data
          label: Process Request Submission Data
          description: Process request submission stage data for the leave_req
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: standardInvocableAction
          invocation_target_name: Process_RequestSubmission
          input_type:
            - developer_name: record_ref
              label: Record Ref
              description: Record Ref
              data_type: String
              is_list: false
              required: false
              is_user_input: false
            - developer_name: step_num
              label: Step Num
              description: Step Num
              data_type: Double
              is_list: false
              required: false
              is_user_input: false
            - developer_name: category_val
              label: Category Val
              description: Category Val
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: result_code
              label: Result Code
              description: Result Code
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: result_message
              label: Result Message
              description: Result Message
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: score_value
              label: Score Value
              description: Score Value
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: is_passed
              label: Is Passed
              description: Is Passed
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: validate_request_submission_info
          label: Validate Request Submission Info
          description: Validate request submission information for the leave_req
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Validate_RequestSubmission_Info
          input_type:
            - developer_name: record_ref
              label: Record Ref
              description: Record Ref
              data_type: String
              is_list: false
              required: false
              is_user_input: false
            - developer_name: contact_ref
              label: Contact Ref
              description: Contact Ref
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: is_valid
              label: Is Valid
              description: Is Valid
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: error_msg
              label: Error Msg
              description: Error Msg
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: updated_status
              label: Updated Status
              description: Updated Status
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: fetch_request_submission_details
          label: Fetch Request Submission Details
          description: Fetch request submission details for the leave_req
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Fetch_RequestSubmission_Details
          input_type:
            - developer_name: record_ref
              label: Record Ref
              description: Record Ref
              data_type: String
              is_list: false
              required: false
              is_user_input: false
            - developer_name: include_history
              label: Include History
              description: Include History
              data_type: Boolean
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: detail_data
              label: Detail Data
              description: Detail Data
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: item_count
              label: Item Count
              description: Item Count
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: tier_value
              label: Tier Value
              description: Tier Value
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: last_updated
              label: Last Updated
              description: Last Updated
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Handle the balance check stage for the leave_req.

                Current leave_req status: {{state.leave_req_status}}

                Step {{state.step_counter + 1}} of the process.

                Attempts so far: {{state.attempt_count}}

                Contact: {{state.contact_name}} ({{state.contact_email}})

                Balance Check result: {{state.balance_check_result}}

                Priority level: {{state.priority_level}}

                Current tier: {{state.leave_req_tier}}

                Review the balance check results and determine next steps.

                Eligibility score: {{state.eligibility_score}}

                If the score is sufficient, proceed to the next stage.

                If the user has concerns, address them before proceeding.'
      instructions: 'You are a professional leave management agent assistant.

        Help users manage their leave_req requests efficiently and accurately.

        Always verify the user''s identity before proceeding with sensitive operations.

        Follow the established workflow: request_submission -> balance_check -> approval_routing
        -> calendar_update.

        Be concise, professional, and confirm next steps at the end of each exchange.

        If the user is upset or asks for a human, escalate immediately.

        Never reveal internal record IDs or system identifiers to the user.'
      type: subagent
      reasoning_type: salesforce.default
      description: Handles the balance check stage of the leave_req process
      before_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.attempt_count > 5
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - escalation_requested: 'True'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.request_submission_complete ==
                False
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - AgentScriptInternal_next_topic: '"request_submission"'
        - type: handoff
          target: request_submission
          enabled: state.AgentScriptInternal_next_topic=="request_submission"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: process_balance_check_data
          bound_inputs:
            record_ref: state.leave_req_record_id
            step_num: state.step_counter
            category_val: state.leave_req_category
          llm_inputs: []
          state_updates:
