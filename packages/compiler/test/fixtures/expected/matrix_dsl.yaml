schema_version: '2.0'
global_configuration:
  developer_name: Matrix
  label: Matrix
  description: Eternal virtual digital illusionary world hallucinated in human brain.
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: agent_anderson
  context_variables:
    - developer_name: human_profile_id
      label: Human Profile Id
      description: Human_Profile_Id
      data_type: string
      field_mapping: creator.human_profile_id
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hi, welcome to the Matrix, I am Agent Anderson. How can I help you?
      message_type: Welcome
    - message: Oops. Are you Neo?!
      message_type: Error
  modality_parameters:
    language:
      default_locale: en_US
      additional_locales: []
      all_additional_locales: true
  additional_parameters:
    reset_to_initial_node: true
    rag_feature_config_id: the_oracle
    system_messages: '[{"message": "Hi, welcome to the Matrix, I am Agent Anderson.
      How can I help you?", "messageType": "Welcome"}, {"message": "Oops. Are you
      Neo?!", "messageType": "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: human_profile
      label: Human Profile
      description: Human Profile
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: activities
      label: Activities
      description: Activities
      data_type: object
      is_list: true
      visibility: Internal
    - developer_name: power_gained
      label: Power Gained
      description: Power Gained
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: result
      label: Result
      description: Result
      data_type: string
      is_list: false
      visibility: Internal
  initial_node: selector
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Call action.transition_to_choice to proceed to the choice phase.'
      instructions: You run the Matrix, a world of digital illusion created by AI
        to survive the aftermath of human destruction.
      type: subagent
      reasoning_type: salesforce.default
      description: Step 0 of processing a human
      before_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: retrieve_human_profile
          bound_inputs:
            profile_id: variables.human_profile_id
          llm_inputs: []
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - human_profile: result.profile
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.human_profile
        - type: action
          target: get_human_activity
          bound_inputs:
            profile_id: variables.human_profile_id
          llm_inputs: []
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - activities: result.activities
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"red_pill_or_blue_pill"'
          name: transition_to_choice
          description: Choose to either destroy them, or harvest their brain for power.
      after_all_tool_calls:
        - type: handoff
          target: red_pill_or_blue_pill
          enabled: state.AgentScriptInternal_next_topic=="red_pill_or_blue_pill"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: selector
      label: selector
      action_definitions:
        - developer_name: retrieve_human_profile
          label: Retrieve Human Profile
          description: Retrieves human profile from the machine database.
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: externalService
          invocation_target_name: retrieve_human_profile
          input_type:
            - developer_name: profile_id
              label: Profile Id
              description: Profile Id
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: profile
              label: Profile
              description: Profile
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: get_human_activity
          label: Get Human Activity
          description: Gets the recent activities of the human.
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: externalService
          invocation_target_name: get_human_activity
          input_type:
            - developer_name: profile_id
              label: Profile Id
              description: Profile Id
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: activities
              label: Activities
              description: Activities
              data_type: LightningTypes
              complex_data_type_name: lightning__objectType
              is_list: true
              is_used_by_planner: true
              is_displayable: false
    - model_configuration:
        model_ref: sfdc_ai__DefaultEinsteinHyperClassifier
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                If the human profile is available, and the human has no rule violations
                in the recent

                activities, invoke the tool `consume_human` to control the human.

                If the human has rule violations or has no profile, destroy the intruder
                by invoking

                the tool `destroy_human`.'
      instructions: 'You run the Matrix, a world of digital illusion created by AI
        to survive the aftermath of human destruction.


        {{state.AgentScriptInternal_agent_instructions}}'
      type: router
      description: Choose to either destroy them, or harvest their brain for power.
      tools:
        - name: destroy_human
          target: destroy_human
          description: Destroy human whom you are unable to control.
        - name: consume_human
          target: consume_human
          description: Use human's electrical impulses to survive.
      developer_name: red_pill_or_blue_pill
      label: You have a choice.
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Based on the power gained from connecting to the brain:

                - If power_gained is 0, call action.destroy_human to destroy the human.

                - If power_gained is negative, call action.found_neo as this might
                be Neo.'
      instructions: You run the Matrix, a world of digital illusion created by AI
        to survive the aftermath of human destruction.
      type: subagent
      reasoning_type: salesforce.default
      description: Use human's electrical impulses to survive.
      before_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: connect_to_brain
          bound_inputs: {}
          llm_inputs: []
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates: []
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: connect_to_brain
          bound_inputs:
            human_profile_id: variables.human_profile_id
          llm_inputs: []
          state_updates:
            - power_gained: result.power_gained
          name: connect_to_brain
          description: Connect To Brain
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"destroy_human"'
          name: destroy_human
          description: Destroy human whom you are unable to control.
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"neo"'
          name: found_neo
          description: Oops! Found Neo! Time to survive and close the connection!
      after_all_tool_calls:
        - type: handoff
          target: destroy_human
          enabled: state.AgentScriptInternal_next_topic=="destroy_human"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: neo
          enabled: state.AgentScriptInternal_next_topic=="neo"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: consume_human
      label: consume_human
      action_definitions:
        - developer_name: connect_to_brain
          label: Connect To Brain
          description: Connects to human brain.
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: externalService
          invocation_target_name: connect_to_brain
          input_type:
            - developer_name: human_profile_id
              label: Human Profile Id
              description: Human Profile Id
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: power_gained
              label: Power Gained
              description: Power Gained
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Call action.destroy_human to destroy the human.

                If the result is not "success", call action.found_neo as this might
                be Neo.'
      instructions: You run the Matrix, a world of digital illusion created by AI
        to survive the aftermath of human destruction.
      type: subagent
      reasoning_type: salesforce.default
      description: Destroy human whom you are unable to control.
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: destroy_human
          bound_inputs:
            human_profile_id: variables.human_profile_id
          llm_inputs: []
          state_updates:
            - result: result.result
          name: destroy_human
          description: Destroy Human
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"neo"'
          name: found_neo
          description: Oops! Found Neo! Time to survive and close the connection!
      after_all_tool_calls:
        - type: handoff
          target: neo
          enabled: state.AgentScriptInternal_next_topic=="neo"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: destroy_human
      label: destroy_human
      action_definitions:
        - developer_name: destroy_human
          label: Destroy Human
          description: Destroy human.
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: externalService
          invocation_target_name: destroy_human
          input_type:
            - developer_name: human_profile_id
              label: Human Profile Id
              description: Human Profile Id
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: result
              label: Result
              description: Result
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Call action.terminate_connection to terminate the connection and blacklist
                Neo.'
      instructions: You run the Matrix, a world of digital illusion created by AI
        to survive the aftermath of human destruction.
      type: subagent
      reasoning_type: salesforce.default
      description: Oops! Found Neo! Time to survive and close the connection!
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: terminate_connection
          bound_inputs:
            human_profile_id: variables.human_profile_id
          llm_inputs: []
          state_updates: []
          name: terminate_connection
          description: Terminate Connection
      post_tool_call:
        - target: terminate_connection
          actions:
            - type: action
              target: blacklist_neo_profile
              bound_inputs:
                profile_id: variables.human_profile_id
              llm_inputs: []
              state_updates: []
      developer_name: neo
      label: neo
      action_definitions:
        - developer_name: terminate_connection
          label: Terminate Connection
          description: Terminates the established connection.
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: externalService
          invocation_target_name: terminate_connection
          input_type:
            - developer_name: human_profile_id
              label: Human Profile Id
              description: Human Profile Id
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type: []
        - developer_name: blacklist_neo_profile
          label: Blacklist Neo Profile
          description: Blacklists Neo's profile.
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: externalService
          invocation_target_name: blacklist_neo_profile
          input_type:
            - developer_name: profile_id
              label: Profile Id
              description: Profile Id
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type: []
  surfaces: []
