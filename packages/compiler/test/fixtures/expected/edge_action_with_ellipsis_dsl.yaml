schema_version: '2.0'
global_configuration:
  developer_name: EdgeActionWithEllipsis
  label: Edge Action With Ellipsis
  description: Tests with clauses using ... (LLM-provided values)
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: admin@example.com
  context_variables:
    - developer_name: customer_id
      label: Customer Id
      description: Customer ID from context
      data_type: string
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages: []
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: ticket_id
      label: Ticket Id
      description: Created ticket ID
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: search_results
      label: Search Results
      description: Search results
      data_type: object
      is_list: true
      visibility: Internal
    - developer_name: summary
      label: Summary
      description: Generated summary
      data_type: string
      is_list: false
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Help the customer by searching knowledge, creating tickets, and summarizing
                cases.

                Determine the appropriate parameter values based on the conversation.'
      instructions: You are a flexible support agent that determines values dynamically.
      type: subagent
      reasoning_type: salesforce.default
      description: Agent that lets the LLM fill in action parameters
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: search_knowledge
          bound_inputs: {}
          llm_inputs:
            - query
            - category
            - max_results
          state_updates:
            - search_results: result.results
          name: search
          description: Search
        - type: action
          target: create_ticket
          bound_inputs: {}
          llm_inputs:
            - subject
            - details
            - priority
            - category
          state_updates:
            - ticket_id: result.ticket_id
          name: create_ticket
          description: Create Ticket
        - type: action
          target: summarize_case
          bound_inputs: {}
          llm_inputs:
            - case_id
            - detail_level
          state_updates:
            - summary: result.summary
          name: summarize
          description: Summarize
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '''__human__'''
          name: escalate_to_human
          description: Escalate to human if needed
      after_all_tool_calls:
        - type: handoff
          target: __human__
          enabled: state.AgentScriptInternal_next_topic == '__human__'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: main
      label: Main
      action_definitions:
        - developer_name: search_knowledge
          label: Search Knowledge
          description: Search knowledge base
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Search_Knowledge
          input_type:
            - developer_name: query
              label: Query
              description: Query
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: category
              label: Category
              description: Category
              data_type: String
              is_list: false
              required: false
              is_user_input: false
            - developer_name: max_results
              label: Max Results
              description: Max Results
              data_type: Double
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: results
              label: Results
              description: Results
              data_type: LightningTypes
              complex_data_type_name: lightning__objectType
              is_list: true
              is_used_by_planner: true
              is_displayable: false
        - developer_name: create_ticket
          label: Create Ticket
          description: Create a support ticket
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Create_Ticket
          input_type:
            - developer_name: subject
              label: Subject
              description: Subject
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: details
              label: Details
              description: Details
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: priority
              label: Priority
              description: Priority
              data_type: String
              is_list: false
              required: false
              is_user_input: false
            - developer_name: category
              label: Category
              description: Category
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: ticket_id
              label: Ticket Id
              description: Ticket Id
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: summarize_case
          label: Summarize Case
          description: Summarize a customer case
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: apex
          invocation_target_name: CaseService.summarize
          input_type:
            - developer_name: case_id
              label: Case Id
              description: Case Id
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: detail_level
              label: Detail Level
              description: Detail Level
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: summary
              label: Summary
              description: Summary
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
  surfaces: []
