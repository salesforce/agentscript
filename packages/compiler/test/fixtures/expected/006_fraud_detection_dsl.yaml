schema_version: '2.0'
global_configuration:
  developer_name: fraud_detection_agent_v6
  label: Fraud Detection Agent V 6
  description: Assists users with fraud management through the fraud detection analyst
    workflow.
  enable_enhanced_event_logs: true
  agent_type: EinsteinServiceAgent
  default_agent_user: fraud_detection@example.com
  context_variables: []
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! I am your Fraud Detection Analyst Assistant. How can I help
        you today?
      message_type: Welcome
    - message: I apologize, something went wrong on my end. Could you please rephrase
        your request?
      message_type: Error
  modality_parameters:
    language:
      default_locale: en_US
      additional_locales: []
      all_additional_locales: false
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! I am your Fraud Detection Analyst Assistant.
      How can I help you today?", "messageType": "Welcome"}, {"message": "I apologize,
      something went wrong on my end. Could you please rephrase your request?", "messageType":
      "Error"}]'
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: fraud_record_id
      label: Fraud Record Id
      description: Record ID of the fraud
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: fraud_status
      label: Fraud Status
      description: Current status of the fraud
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: fraud_tier
      label: Fraud Tier
      description: Tier classification for the fraud
      data_type: string
      is_list: false
      default: '''standard'''
      visibility: Internal
    - developer_name: fraud_category
      label: Fraud Category
      description: Category of the fraud
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: contact_name
      label: Contact Name
      description: Full name of the contact
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: contact_email
      label: Contact Email
      description: Email address of the contact
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: contact_phone
      label: Contact Phone
      description: Phone number of the contact
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: is_verified
      label: Is Verified
      description: Whether the user identity is verified
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: eligibility_score
      label: Eligibility Score
      description: Calculated eligibility score
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: step_counter
      label: Step Counter
      description: Current step in the process
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: attempt_count
      label: Attempt Count
      description: Number of attempts made
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: total_items_count
      label: Total Items Count
      description: Total number of items to process
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: alert_triage_complete
      label: Alert Triage Complete
      description: Whether the alert_triage stage is complete
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: alert_triage_result
      label: Alert Triage Result
      description: Result from the alert_triage stage
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: investigation_complete
      label: Investigation Complete
      description: Whether the investigation stage is complete
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: investigation_result
      label: Investigation Result
      description: Result from the investigation stage
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: evidence_review_complete
      label: Evidence Review Complete
      description: Whether the evidence_review stage is complete
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: evidence_review_result
      label: Evidence Review Result
      description: Result from the evidence_review stage
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: resolution_complete
      label: Resolution Complete
      description: Whether the resolution stage is complete
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: resolution_result
      label: Resolution Result
      description: Result from the resolution stage
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: priority_level
      label: Priority Level
      description: Priority level of the request
      data_type: string
      is_list: false
      default: '''normal'''
      visibility: Internal
    - developer_name: notes_text
      label: Notes Text
      description: Notes and comments
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: assigned_agent
      label: Assigned Agent
      description: Assigned agent name
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: resolution_summary
      label: Resolution Summary
      description: Summary of the resolution
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: escalation_requested
      label: Escalation Requested
      description: Whether escalation was requested
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: is_business_hours
      label: Is Business Hours
      description: Whether it is currently business hours
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: case_ref_number
      label: Case Ref Number
      description: Reference number for the support case
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: next_available_slot
      label: Next Available Slot
      description: Next available time slot
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
  initial_node: topic_selector
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                You are a topic selector for a fraud detection analyst assistant.

                Analyze the user''s input and determine the most appropriate topic.

                Current fraud status: {{state.fraud_status}}

                Eligibility score: {{state.eligibility_score}}

                Steps completed: {{state.step_counter}}

                Priority: {{state.priority_level}}

                Use action.go_to_alert_triage for alert triage requests.

                Use action.go_to_investigation for investigation requests.

                Use action.go_to_evidence_review for evidence review requests.

                Use action.go_to_resolution for resolution requests.

                Use action.go_to_escalation to escalate if the user is upset or requests
                a human.'
      instructions: 'You are a professional fraud detection analyst assistant.

        Help users manage their fraud requests efficiently and accurately.

        Always verify the user''s identity before proceeding with sensitive operations.

        Follow the established workflow: alert_triage -> investigation -> evidence_review
        -> resolution.

        Be concise, professional, and confirm next steps at the end of each exchange.

        If the user is upset or asks for a human, escalate immediately.

        Never reveal internal record IDs or system identifiers to the user.'
      type: subagent
      reasoning_type: salesforce.default
      description: Welcome the user and route to the appropriate fraud management
        topic
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"alert_triage"'
          name: go_to_alert_triage
          description: Transition to alert triage topic.
        - type: action
          target: __state_update_action__
          enabled: state.is_verified == True
          state_updates:
            - AgentScriptInternal_next_topic: '"investigation"'
          name: go_to_investigation
          description: Transition to investigation topic.
        - type: action
          target: __state_update_action__
          enabled: state.is_verified == True
          state_updates:
            - AgentScriptInternal_next_topic: '"evidence_review"'
          name: go_to_evidence_review
          description: Transition to evidence review topic.
        - type: action
          target: __state_update_action__
          enabled: state.is_verified == True
          state_updates:
            - AgentScriptInternal_next_topic: '"resolution"'
          name: go_to_resolution
          description: Transition to resolution topic.
        - type: action
          target: __state_update_action__
          enabled: state.is_verified == True
          state_updates:
            - AgentScriptInternal_next_topic: '"escalation_handling"'
          name: go_to_escalation
          description: Escalate to a human agent for assistance.
      after_all_tool_calls:
        - type: handoff
          target: alert_triage
          enabled: state.AgentScriptInternal_next_topic=="alert_triage"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: investigation
          enabled: state.AgentScriptInternal_next_topic=="investigation"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: evidence_review
          enabled: state.AgentScriptInternal_next_topic=="evidence_review"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: resolution
          enabled: state.AgentScriptInternal_next_topic=="resolution"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: escalation_handling
          enabled: state.AgentScriptInternal_next_topic=="escalation_handling"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: topic_selector
      label: Topic Selector
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Handle the alert triage stage for the fraud.

                Current fraud status: {{state.fraud_status}}

                Step {{state.step_counter + 1}} of the process.

                Attempts so far: {{state.attempt_count}}

                Contact: {{state.contact_name}} ({{state.contact_email}})

                Alert Triage result: {{state.alert_triage_result}}

                Priority level: {{state.priority_level}}

                Current tier: {{state.fraud_tier}}

                If the contact information is missing, ask the user to provide their
                name and email.

                After collecting information, use action.run_alert_triage to begin
                processing.'
      instructions: 'You are a professional fraud detection analyst assistant.

        Help users manage their fraud requests efficiently and accurately.

        Always verify the user''s identity before proceeding with sensitive operations.

        Follow the established workflow: alert_triage -> investigation -> evidence_review
        -> resolution.

        Be concise, professional, and confirm next steps at the end of each exchange.

        If the user is upset or asks for a human, escalate immediately.

        Never reveal internal record IDs or system identifiers to the user.'
      type: subagent
      reasoning_type: salesforce.default
      description: Handles the alert triage stage of the fraud process
      before_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.is_verified == False
        - type: action
          target: validate_alert_triage_info
          bound_inputs:
            record_ref: state.fraud_record_id
            contact_ref: state.contact_email
          llm_inputs: []
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - fraud_status: result.updated_status
            - is_verified: result.is_valid
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: process_alert_triage_data
          bound_inputs:
            record_ref: state.fraud_record_id
            step_num: state.step_counter
            category_val: state.fraud_category
          llm_inputs: []
          state_updates:
            - alert_triage_result: result.result_code
            - eligibility_score: result.score_value
            - alert_triage_complete: result.is_passed
          name: run_alert_triage
          description: Run Alert Triage
        - type: action
          target: fetch_alert_triage_details
          bound_inputs:
            record_ref: state.fraud_record_id
            include_history: 'False'
          llm_inputs: []
          state_updates:
            - total_items_count: result.item_count
            - fraud_tier: result.tier_value
          name: fetch_alert_triage_info
          description: Fetch Alert Triage Info
        - type: action
          target: __state_update_action__
          enabled: state.alert_triage_complete == True and state.eligibility_score
            >= 50
          state_updates:
            - AgentScriptInternal_next_topic: '"investigation"'
          name: go_to_investigation
          description: Move to investigation stage.
        - type: action
          target: __state_update_action__
          enabled: state.escalation_requested == True
          state_updates:
            - AgentScriptInternal_next_topic: '"escalation_handling"'
          name: escalate_now
          description: Escalate if issues arise.
      after_all_tool_calls:
        - type: handoff
          target: investigation
          enabled: state.AgentScriptInternal_next_topic=="investigation"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: handoff
          target: escalation_handling
          enabled: state.AgentScriptInternal_next_topic=="escalation_handling"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      after_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - step_counter: state.step_counter + 1
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - attempt_count: state.attempt_count + 1
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.eligibility_score >= 70
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - fraud_tier: '"premium"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.eligibility_score >= 40 and state.eligibility_score
                < 70
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - fraud_tier: '"standard"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.eligibility_score < 40
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - fraud_tier: '"basic"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.attempt_count >= 3 and state.alert_triage_complete
                == False
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - priority_level: '"high"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.attempt_count >= 5
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - escalation_requested: 'True'
      developer_name: alert_triage
      label: Alert Triage
      action_definitions:
        - developer_name: process_alert_triage_data
          label: Process Alert Triage Data
          description: Process alert triage stage data for the fraud
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: apex
          invocation_target_name: Process_AlertTriage
          input_type:
            - developer_name: record_ref
              label: Record Ref
              description: Record Ref
              data_type: String
              is_list: false
              required: false
              is_user_input: false
            - developer_name: step_num
              label: Step Num
              description: Step Num
              data_type: Double
              is_list: false
              required: false
              is_user_input: false
            - developer_name: category_val
              label: Category Val
              description: Category Val
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: result_code
              label: Result Code
              description: Result Code
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: result_message
              label: Result Message
              description: Result Message
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: score_value
              label: Score Value
              description: Score Value
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: is_passed
              label: Is Passed
              description: Is Passed
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: validate_alert_triage_info
          label: Validate Alert Triage Info
          description: Validate alert triage information for the fraud
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Validate_AlertTriage_Info
          input_type:
            - developer_name: record_ref
              label: Record Ref
              description: Record Ref
              data_type: String
              is_list: false
              required: false
              is_user_input: false
            - developer_name: contact_ref
              label: Contact Ref
              description: Contact Ref
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: is_valid
              label: Is Valid
              description: Is Valid
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: error_msg
              label: Error Msg
              description: Error Msg
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: updated_status
              label: Updated Status
              description: Updated Status
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: fetch_alert_triage_details
          label: Fetch Alert Triage Details
          description: Fetch alert triage details for the fraud
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Fetch_AlertTriage_Details
          input_type:
            - developer_name: record_ref
              label: Record Ref
              description: Record Ref
              data_type: String
              is_list: false
              required: false
              is_user_input: false
            - developer_name: include_history
              label: Include History
              description: Include History
              data_type: Boolean
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: detail_data
              label: Detail Data
              description: Detail Data
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: item_count
              label: Item Count
              description: Item Count
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: tier_value
              label: Tier Value
              description: Tier Value
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: last_updated
              label: Last Updated
              description: Last Updated
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Handle the investigation stage for the fraud.

                Current fraud status: {{state.fraud_status}}

                Step {{state.step_counter + 1}} of the process.

                Attempts so far: {{state.attempt_count}}

                Contact: {{state.contact_name}} ({{state.contact_email}})

                Investigation result: {{state.investigation_result}}

                Priority level: {{state.priority_level}}

                Current tier: {{state.fraud_tier}}

                Review the investigation results and determine next steps.

                Eligibility score: {{state.eligibility_score}}

                If the score is sufficient, proceed to the next stage.

                If the user has concerns, address them before proceeding.'
      instructions: 'You are a professional fraud detection analyst assistant.

        Help users manage their fraud requests efficiently and accurately.

        Always verify the user''s identity before proceeding with sensitive operations.

        Follow the established workflow: alert_triage -> investigation -> evidence_review
        -> resolution.

        Be concise, professional, and confirm next steps at the end of each exchange.

        If the user is upset or asks for a human, escalate immediately.

        Never reveal internal record IDs or system identifiers to the user.'
      type: subagent
      reasoning_type: salesforce.default
      description: Handles the investigation stage of the fraud process
      before_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.attempt_count > 5
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - escalation_requested: 'True'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.alert_triage_complete == False
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - AgentScriptInternal_next_topic: '"alert_triage"'
        - type: handoff
          target: alert_triage
          enabled: state.AgentScriptInternal_next_topic=="alert_triage"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: process_investigation_data
          bound_inputs:
            record_ref: state.fraud_record_id
            step_num: state.step_counter
            category_val: state.fraud_category
          llm_inputs: []
          state_updates:
            - investigation_result: result.result_code
            - eligibility_score: result.score_value
            - investigation_complete: result.is_passed
          name: run_investigation
          description: Run Investigation
        - type: action
          target: fetch_investigation_details
          bound_inputs:
            record_ref: state.fraud_record_id
            include_history: 'False'
          llm_inputs: []
          enabled: state.fraud_record_id is not None
          state_updates:
            - total_items_count: result.item_count
