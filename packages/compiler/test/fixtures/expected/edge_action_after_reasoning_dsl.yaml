schema_version: '2.0'
global_configuration:
  developer_name: EdgeActionAfterReasoning
  label: Edge Action After Reasoning
  description: Tests after_reasoning with run @actions, conditionals, and transition
    to
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: admin@example.com
  context_variables:
    - developer_name: customer_id
      label: Customer Id
      description: Customer ID
      data_type: string
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages: []
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: interaction_logged
      label: Interaction Logged
      description: Whether the interaction was logged
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: satisfaction_score
      label: Satisfaction Score
      description: Customer satisfaction score
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: needs_followup
      label: Needs Followup
      description: Whether followup is needed
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: resolved
      label: Resolved
      description: Whether the issue was resolved
      data_type: boolean
      is_list: false
      default: false
      visibility: Internal
    - developer_name: case_id
      label: Case Id
      description: Case ID
      data_type: string
      is_list: false
      visibility: Internal
  initial_node: main
  nodes:
    - instructions: You are a post-processing agent that performs cleanup after reasoning.
      type: subagent
      reasoning_type: salesforce.default
      description: Route to appropriate topic
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"service"'
          name: go_to_service
          description: Main service topic with after_reasoning cleanup
      after_all_tool_calls:
        - type: handoff
          target: service
          enabled: state.AgentScriptInternal_next_topic=="service"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: main
      label: Main
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Help the customer resolve their issue.'
      instructions: You are a post-processing agent that performs cleanup after reasoning.
      type: subagent
      reasoning_type: salesforce.default
      description: Main service topic with after_reasoning cleanup
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: resolve_case
          bound_inputs: {}
          llm_inputs:
            - case_id
            - notes
          state_updates:
            - resolved: result.resolved
            - case_id: result.case_id
          name: resolve
          description: Resolve
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '''__human__'''
          name: escalate_to_human
          description: Escalate to human
      after_all_tool_calls:
        - type: handoff
          target: __human__
          enabled: state.AgentScriptInternal_next_topic == '__human__'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      after_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: log_interaction
          bound_inputs:
            customer_id: variables.customer_id
            resolution_status: '"completed"'
          llm_inputs: []
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - interaction_logged: result.logged
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.resolved == True
        - type: action
          target: send_survey
          bound_inputs:
            customer_id: variables.customer_id
          llm_inputs: []
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates: []
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - AgentScriptInternal_next_topic: '"farewell"'
        - type: handoff
          target: farewell
          enabled: state.AgentScriptInternal_next_topic=="farewell"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.resolved == False and state.needs_followup
                == True
        - type: action
          target: schedule_followup
          bound_inputs:
            case_id: state.case_id
            priority: '"high"'
          llm_inputs: []
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates: []
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.resolved == False
        - type: action
          target: __state_update_action__
          enabled: (state.AgentScriptInternal_next_topic=="__EMPTY__") and (state.AgentScriptInternal_condition)
          state_updates:
            - AgentScriptInternal_next_topic: '"followup"'
        - type: handoff
          target: followup
          enabled: state.AgentScriptInternal_next_topic=="followup"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: service
      label: Service
      action_definitions:
        - developer_name: log_interaction
          label: Log Interaction
          description: Log the interaction
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Log_Interaction
          input_type:
            - developer_name: customer_id
              label: Customer Id
              description: Customer Id
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: resolution_status
              label: Resolution Status
              description: Resolution Status
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: logged
              label: Logged
              description: Logged
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: schedule_followup
          label: Schedule Followup
          description: Schedule a followup
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Schedule_Followup
          input_type:
            - developer_name: case_id
              label: Case Id
              description: Case Id
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: priority
              label: Priority
              description: Priority
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: scheduled
              label: Scheduled
              description: Scheduled
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: send_survey
          label: Send Survey
          description: Send satisfaction survey
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Send_Survey
          input_type:
            - developer_name: customer_id
              label: Customer Id
              description: Customer Id
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: sent
              label: Sent
              description: Sent
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: resolve_case
          label: Resolve Case
          description: Resolve the case
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Resolve_Case
          input_type:
            - developer_name: case_id
              label: Case Id
              description: Case Id
              data_type: String
              is_list: false
              required: true
              is_user_input: false
            - developer_name: notes
              label: Notes
              description: Notes
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: resolved
              label: Resolved
              description: Resolved
              data_type: Boolean
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: case_id
              label: Case Id
              description: Case Id
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Thank the customer for their time and let them know the issue is resolved.'
      instructions: You are a post-processing agent that performs cleanup after reasoning.
      type: subagent
      reasoning_type: salesforce.default
      description: Thank the customer and end the conversation
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools: []
      developer_name: farewell
      label: Farewell
      action_definitions: []
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                Let the customer know a followup has been scheduled.'
      instructions: You are a post-processing agent that performs cleanup after reasoning.
      type: subagent
      reasoning_type: salesforce.default
      description: Handle followup for unresolved issues
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '''__human__'''
          name: escalate_to_human
          description: Escalate to human agent
      after_all_tool_calls:
        - type: handoff
          target: __human__
          enabled: state.AgentScriptInternal_next_topic == '__human__'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: followup
      label: Followup
      action_definitions: []
  surfaces: []
