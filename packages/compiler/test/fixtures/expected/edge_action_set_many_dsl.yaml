schema_version: '2.0'
global_configuration:
  developer_name: EdgeActionSetMany
  label: Edge Action Set Many
  description: Tests setting 3+ output variables from one action
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  default_agent_user: admin@example.com
  context_variables:
    - developer_name: customer_id
      label: Customer Id
      description: Customer ID
      data_type: string
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages: []
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: ''''''
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: first_name
      label: First Name
      description: Customer first name
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: last_name
      label: Last Name
      description: Customer last name
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: email
      label: Email
      description: Customer email
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: phone
      label: Phone
      description: Customer phone
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: tier
      label: Tier
      description: Customer tier
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: balance
      label: Balance
      description: Account balance
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: order_id
      label: Order Id
      description: Order ID
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: order_status
      label: Order Status
      description: Order status
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: order_total
      label: Order Total
      description: Order total
      data_type: number
      is_list: false
      default: 0
      visibility: Internal
    - developer_name: ship_date
      label: Ship Date
      description: Shipping date
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: tracking
      label: Tracking
      description: Tracking number
      data_type: string
      is_list: false
      visibility: Internal
  initial_node: main
  nodes:
    - before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_agent_instructions: ''''''
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: 'template::{{state.AgentScriptInternal_agent_instructions}}

                You have the customer profile loaded. Help them with order inquiries.

                Use action.get_order to look up order details.'
      instructions: You are a data retrieval agent.
      type: subagent
      reasoning_type: salesforce.default
      description: Retrieve and set multiple output variables from actions
      before_reasoning:
        - type: action
          target: __state_update_action__
          enabled: 'True'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
          target: get_customer_profile
          bound_inputs:
            customer_id: variables.customer_id
          llm_inputs: []
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - first_name: result.first_name
            - last_name: result.last_name
            - email: result.email
            - phone: result.phone
            - tier: result.tier
            - balance: result.balance
      focus_prompt: '{{state.AgentScriptInternal_agent_instructions}}'
      tools:
        - type: action
          target: get_order_details
          bound_inputs: {}
          llm_inputs:
            - order_id
          state_updates:
            - order_status: result.status
            - order_total: result.total
            - ship_date: result.ship_date
            - tracking: result.tracking_number
          name: get_order
          description: Get Order
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '''__human__'''
          name: escalate_to_human
          description: Escalate to human agent
      after_all_tool_calls:
        - type: handoff
          target: __human__
          enabled: state.AgentScriptInternal_next_topic == '__human__'
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
      developer_name: main
      label: Main
      action_definitions:
        - developer_name: get_customer_profile
          label: Get Customer Profile
          description: Get full customer profile
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Get_Customer_Profile
          input_type:
            - developer_name: customer_id
              label: Customer Id
              description: Customer Id
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: first_name
              label: First Name
              description: First Name
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: last_name
              label: Last Name
              description: Last Name
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: email
              label: Email
              description: Email
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: phone
              label: Phone
              description: Phone
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: tier
              label: Tier
              description: Tier
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: balance
              label: Balance
              description: Balance
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: get_order_details
          label: Get Order Details
          description: Get order details
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Get_Order_Details
          input_type:
            - developer_name: order_id
              label: Order Id
              description: Order Id
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: status
              label: Status
              description: Status
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: total
              label: Total
              description: Total
              data_type: Double
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: ship_date
              label: Ship Date
              description: Ship Date
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
            - developer_name: tracking_number
              label: Tracking Number
              description: Tracking Number
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
  surfaces: []
